<style>
/**
 * One Piece Gaiden - Estilos del Sistema de Cartas
 * Compatible con MyBB
 */

/* Reset y base */
.card-game-container * {
    box-sizing: border-box;
}

/* Variables CSS para facilitar la personalización */
:root {
    --card-game-primary: #2c3e50;
    --card-game-secondary: #3498db;
    --card-game-success: #27ae60;
    --card-game-warning: #f39c12;
    --card-game-error: #e74c3c;
    --card-game-background: #ecf0f1;
    --card-game-text: #2c3e50;
    --card-game-border: #bdc3c7;
    --card-game-shadow: rgba(0, 0, 0, 0.1);
    --card-game-legendary: linear-gradient(45deg, #ff6b6b, #ffa500, #ffff00, #00ff00, #00bfff, #8a2be2);
}

/* Header del juego */
.game-header {
    background: linear-gradient(135deg, var(--card-game-primary) 0%, var(--card-game-secondary) 100%);
    color: white;
    padding: 2rem;
    border-radius: 15px;
    margin-bottom: 2rem;
    text-align: center;
}

.game-header h1 {
    margin: 0 0 1rem 0;
    font-size: 2.5rem;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.player-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
}

.money-display, .collection-stats {
    background: rgba(255, 255, 255, 0.2);
    padding: 0.8rem 1.5rem;
    border-radius: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    backdrop-filter: blur(10px);
}

.money-icon::before {
    content: '?';
    margin-right: 0.5rem;
}

/* Navegación principal */
.game-navigation {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
}

.nav-btn {
    background: white;
    border: 2px solid var(--card-game-border);
    padding: 1rem 2rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--card-game-text);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.nav-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transition: left 0.5s;
}

.nav-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px var(--card-game-shadow);
    border-color: var(--card-game-secondary);
}

.nav-btn:hover::before {
    left: 100%;
}

.nav-btn.active {
    background: var(--card-game-secondary);
    color: white;
    border-color: var(--card-game-secondary);
}

/* Secciones del juego */
.game-section {
    display: none;
    animation: fadeIn 0.3s ease;
}

.game-section.active {
    display: block;
}

.game-section h2 {
    text-align: center;
    color: var(--card-game-text);
    margin-bottom: 2rem;
    font-size: 2rem;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Contenedor de packs */
.packs-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    padding: 1rem;
}

.pack-item {
    background: white;
    border-radius: 15px;
    padding: 2rem;
    text-align: center;
    box-shadow: 0 5px 20px var(--card-game-shadow);
    transition: all 0.3s ease;
    border: 2px solid transparent;
}

.pack-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    border-color: var(--card-game-secondary);
}

.pack-image-container {
    margin-bottom: 1.5rem;
    overflow: hidden;
    border-radius: 10px;
}

.pack-image {
    width: 100%;
    max-width: 200px;
    height: auto;
    border-radius: 10px;
    transition: transform 0.3s ease;
}

.pack-item:hover .pack-image {
    transform: scale(1.05);
}

.pack-name {
    font-size: 1.4rem;
    font-weight: bold;
    color: var(--card-game-text);
    margin-bottom: 1rem;
}

.pack-price {
    font-size: 1.2rem;
    color: var(--card-game-success);
    font-weight: bold;
    margin-bottom: 1rem;
}

.pack-description {
    color: #666;
    font-size: 0.9rem;
    margin: 1rem 0;
    line-height: 1.4;
}

.buy-pack-btn {
    background: linear-gradient(135deg, var(--card-game-success) 0%, #2ecc71 100%);
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: bold;
    width: 100%;
    transition: all 0.3s ease;
}

.buy-pack-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
}

/* Filtros de colección */
.collection-filters {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
}

.collection-filters select {
    background: white;
    border: 2px solid var(--card-game-border);
    padding: 0.8rem 1rem;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    min-width: 150px;
}

.collection-filters select:focus {
    outline: none;
    border-color: var(--card-game-secondary);
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
}

.collection-filters select:hover {
    border-color: var(--card-game-secondary);
}

/* Grid de colección */
.collection-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    padding: 1rem;
}

.card-item {
    background: white;
    border-radius: 15px;
    padding: 1rem;
    text-align: center;
    box-shadow: 0 3px 15px var(--card-game-shadow);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
}

.card-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
    border-color: var(--card-game-secondary);
}

.card-image {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 1rem;
}

.card-name {
    font-weight: bold;
    color: var(--card-game-text);
    margin-bottom: 0.5rem;
    font-size: 1rem;
}

.card-rarity {
    color: var(--card-game-warning);
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
}

.card-count {
    background: var(--card-game-secondary);
    color: white;
    padding: 0.3rem 0.8rem;
    border-radius: 15px;
    font-size: 0.8rem;
    font-weight: bold;
    display: inline-block;
}

/* Cartas no poseídas */
.card-item.not-owned {
    opacity: 0.6;
    cursor: not-allowed;
}

.card-item.not-owned:hover {
    transform: none;
    border-color: transparent;
}

.card-item.not-owned .card-name {
    color: #999;
}

/* Efectos especiales para cartas legendarias */
.card-item.legendary-5-star:not(.not-owned) {
    background: linear-gradient(45deg, #fff 30%, #f0f0f0 50%, #fff 70%);
    border: 2px solid transparent;
    background-size: 200% 200%;
    animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.card-item.legendary-5-star:not(.not-owned):hover {
    animation: legendaryHover 0.5s ease;
    border-color: #ffd700;
}

@keyframes legendaryHover {
    0%, 100% { transform: translateY(-3px) scale(1); }
    50% { transform: translateY(-5px) scale(1.02); }
}

/* Grid de inventario */
.inventory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
    padding: 1rem;
}

.inventory-pack {
    background: white;
    border-radius: 15px;
    padding: 1.5rem;
    text-align: center;
    box-shadow: 0 3px 15px var(--card-game-shadow);
    transition: all 0.3s ease;
}

.inventory-pack:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
}

.inventory-pack-image-container {
    margin-bottom: 1rem;
    overflow: hidden;
    border-radius: 10px;
}

.inventory-pack-image {
    width: 100%;
    max-width: 180px;
    height: auto;
    border-radius: 10px;
}

.inventory-pack-name {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--card-game-text);
    margin-bottom: 0.5rem;
}

.inventory-pack-count {
    color: #666;
    margin: 1rem 0;
}

.open-pack-btn {
    background: linear-gradient(135deg, var(--card-game-error) 0%, #c0392b 100%);
    color: white;
    border: none;
    padding: 1rem 1.5rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    transition: all 0.3s ease;
}

.open-pack-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
}

.empty-inventory {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: #666;
    font-size: 1.2rem;
}

/* Modales */
.modal {
    display: none;
    position: fixed;
    z-index: 10000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.modal.show {
    opacity: 1;
}

.modal-content {
    background: white;
    padding: 2rem;
    border-radius: 20px;
    max-width: 90vw;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    transform: scale(0.8);
    transition: transform 0.3s ease;
}

.modal.show .modal-content {
    transform: scale(1);
}

.close-modal {
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    font-size: 2rem;
    cursor: pointer;
    color: #666;
    z-index: 1;
    background: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 10px var(--card-game-shadow);
}

.close-modal:hover {
    color: var(--card-game-error);
    transform: scale(1.1);
}

/* Modal de apertura de sobres */
.pack-opening-container {
    text-align: center;
    min-width: 300px;
}

.pack-results h3 {
    color: var(--card-game-text);
    margin-bottom: 2rem;
    font-size: 2rem;
}

.cards-revealed {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
}

.revealed-card {
    background: white;
    border-radius: 15px;
    padding: 1rem;
    box-shadow: 0 3px 15px var(--card-game-shadow);
    transition: all 0.3s ease;
    animation: cardReveal 0.6s ease;
}

@keyframes cardReveal {
    from {
        opacity: 0;
        transform: translateY(20px) rotateY(90deg);
    }
    to {
        opacity: 1;
        transform: translateY(0) rotateY(0deg);
    }
}

.revealed-card:hover {
    transform: translateY(-3px);
}

.revealed-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 0.5rem;
}

.revealed-card-name {
    font-weight: bold;
    color: var(--card-game-text);
    margin-bottom: 0.5rem;
}

.revealed-card-rarity {
    color: var(--card-game-warning);
    font-size: 0.9rem;
}

/* Efectos especiales para cartas reveladas legendarias */
.revealed-card.legendary-5-star {
    background: linear-gradient(45deg, #fff 30%, #f0f0f0 50%, #fff 70%);
    background-size: 200% 200%;
    animation: cardReveal 0.6s ease, shimmer 3s ease-in-out infinite 0.6s;
    border: 2px solid #ffd700;
}

.close-modal-button {
    background: var(--card-game-secondary);
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: bold;
    transition: all 0.3s ease;
}

.close-modal-button:hover {
    background: #2980b9;
    transform: translateY(-2px);
}

/* Modal de detalle de carta */
.card-detail-container {
    display: flex;
    gap: 2rem;
    min-width: 600px;
    align-items: flex-start;
}

.card-display {
    flex-shrink: 0;
}

.card-flip-container {
    width: 250px;
    height: 350px;
    perspective: 1000px;
}

.card-flip-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

.card-flip-container:hover .card-flip-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 15px;
    overflow: hidden;
}

.card-back {
    transform: rotateY(180deg);
}

.card-front img, .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-info {
    flex: 1;
    min-width: 300px;
}

.card-info h3 {
    color: var(--card-game-text);
    margin-bottom: 1rem;
    font-size: 1.8rem;
}

.card-pack, .card-rarity, .card-type {
    margin: 0.8rem 0;
    font-size: 1rem;
    color: #666;
}

.card-pack span, .card-rarity span, .card-type span {
    font-weight: bold;
    color: var(--card-game-text);
}

.card-description {
    background: #f8f9fa;
    padding: 1rem;
    border-radius: 10px;
    margin: 1rem 0;
    font-style: italic;
    color: #555;
    line-height: 1.4;
}

.card-stats {
    margin-top: 1.5rem;
}

.stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0.5rem 0;
    padding: 0.5rem;
    background: #f8f9fa;
    border-radius: 8px;
}

.stat-label {
    font-weight: bold;
    color: var(--card-game-text);
}

/* Notificaciones */
.notification-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10001;
    pointer-events: none;
}

.notification {
    background: white;
    padding: 1rem 1.5rem;
    border-radius: 10px;
    margin-bottom: 0.5rem;
    box-shadow: 0 5px 15px var(--card-game-shadow);
    border-left: 4px solid var(--card-game-secondary);
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.3s ease;
    pointer-events: auto;
    max-width: 300px;
}

.notification.show {
    opacity: 1;
    transform: translateX(0);
}

.notification.success {
    border-left-color: var(--card-game-success);
    color: var(--card-game-success);
}

.notification.error {
    border-left-color: var(--card-game-error);
    color: var(--card-game-error);
}

.notification.warning {
    border-left-color: var(--card-game-warning);
    color: var(--card-game-warning);
}

/* Mensajes de error */
.error-message {
    text-align: center;
    padding: 3rem;
    color: var(--card-game-error);
    font-size: 1.2rem;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 5px 20px var(--card-game-shadow);
}

/* Responsive */
@media (max-width: 768px) {
    .game-header {
        padding: 1.5rem;
    }
    
    .game-header h1 {
        font-size: 2rem;
    }
    
    .player-stats {
        flex-direction: column;
        gap: 1rem;
    }
    
    .game-navigation {
        flex-direction: column;
        gap: 0.5rem;
    }
    
    .nav-btn {
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
    }
    
    .packs-container {
        grid-template-columns: 1fr;
        gap: 1rem;
    }
    
    .collection-filters {
        flex-direction: column;
        align-items: center;
    }
    
    .collection-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
    }
    
    .inventory-grid {
        grid-template-columns: 1fr;
    }
    
    .card-detail-container {
        flex-direction: column;
        min-width: auto;
        align-items: center;
    }
    
    .card-flip-container {
        width: 200px;
        height: 280px;
    }
    
    .card-info {
        min-width: auto;
        width: 100%;
    }
    
    .cards-revealed {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }
    
    .revealed-card img {
        height: 120px;
    }
    
    .notification-container {
        left: 10px;
        right: 10px;
        top: 10px;
    }
    
    .notification {
        max-width: none;
    }
}

/* Animaciones adicionales */
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

.pulse {
    animation: pulse 2s infinite;
}

/* Utilidades */
.hidden {
    display: none !important;
}

.loading {
    opacity: 0.5;
    pointer-events: none;
}

/* Mejoras de accesibilidad */
.nav-btn:focus,
.buy-pack-btn:focus,
.open-pack-btn:focus,
.close-modal-button:focus {
    outline: 2px solid var(--card-game-secondary);
    outline-offset: 2px;
}

/* Smooth scrolling para modal */
.modal-content {
    scroll-behavior: smooth;
}

/* Estilos adicionales para compatibilidad */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
}

.card-game-container {
    max-width: 1200px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(10px);
}

/* Efectos especiales para cartas legendarias */
.legendary-effect {
    background: linear-gradient(45deg, #ff6b6b, #ffa500, #ffff00, #00ff00, #00bfff, #8a2be2);
    background-size: 300% 300%;
    animation: rainbow 2s ease infinite;
}

@keyframes rainbow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
</style>
