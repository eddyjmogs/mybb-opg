<html>

<head>
  <title>Consola Súper Secreta</title>
  {$headerinclude}
</head>

<body>
  {$header}
  <div class="fondo-blanco">
    <if $fid=='' then>
      User ID:<br><input class="textbox" type="number" name="name" min="100" max="2000" required id='fid'><br><br>
		
      Accion:<br>
      <select id="accion">
        <option value="T1">T1</option>
         <option value="T2">T2</option>
	    <option value="T3">T3</option>
		<option value="T4">T4</option>
		<option value="T5">T5</option>
		<option value="T6">T6</option>
		<option value="T7">T7</option>
		<option value="T8">T8</option>
		<option value="T9">T9</option>
		<option value="T10">T10</option>
      </select><br><br>
      <button onclick=onClickAccion()>Ir</button>
      <br><br>
    </if>
	
	<if $fid != '' then>
		User ID:<br><input class="textbox" type="number" name="name" required id='fid' value={$fid} disabled><br>
		Acción:<br>
        <select id="accion" disabled>
          <option value="{$accion}">{$accion}</option>
        </select><br>
	
		<p>Nombre de cuenta: <a href="/op/ficha.php?uid={$fid}" target="_blank">{$ficha['nombre']}</a></p>
		<hr>
		ID del Tema: <br><input class="textbox" type="text" name="tid" id="tid" required><br>
		Usuarios (Máximo 6):<br><input class="textbox" type="number" name="usuarios" min="1" max="6" value='1' required id='usuarios'><br>
		
		Nivel Narrador:<br>
		<select id="nivel_narrador">
		  <option value="Aprendiz">Aprendiz</option>
		  <option value="Estudioso">Estudioso</option>
		  <option value="Ilustre">Ilustre</option>
		  <option value="Erudito">Erudito</option>
		</select><br><br>

		<input onclick="entregarRecompensa()" class="button" value="Entregar" style=" width: 93px; font-size: 22px; ">
	</if>
	  	
  </div>
  {$footer}
</body>
<if $log_var !='' then><script>alert(`{$log_var}`);</script></if>
{$reload_script}
<script>
	function entregarRecompensa() {
		$.post("/op/staff/entregar_recompensas_narradores.php", { ficha_id: '{$fid}', accion: '{$accion}', tid: $('#tid').val(), usuarios: $('#usuarios').val(), nivel_narrador: $('#nivel_narrador').val() }, function( data ) {
			alert('¡Entregada recompensa!');
			console.log(data);
			window.location = "/op/staff/log_entregas.php";
		}); 
	}
	
  function onClickAccion() {
    const fid = document.getElementById('fid').value;
    const accion = document.getElementById('accion').value;
    // const usuarios = document.getElementById('usuarios').value;
    // const nivel_narrador = document.getElementById('nivel_narrador').value;
    if (fid && accion) {
      window.location.href = window.location.pathname + '?fid=' + fid + '&accion=' + accion;
    }
  }
</script>

</html>
