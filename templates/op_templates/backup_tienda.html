<script>

let saldoActual = {$ficha['berries']};
let saldoRestante = {$ficha['berries']};
let comprasTotal = '0';
let listaDeCompras = {};
saldoActual = saldoActual.toLocaleString('es-es');
	
$('#saldoActual').html(saldoActual);
$('#saldoRestante').html(saldoActual);
$('#comprasTotal').html(comprasTotal);

const objetos = {$objetos_json};
const objetosArray = {$objetos_array_json};
	
console.log(objetos);
console.log(objetosArray);
	
const subcategorias = { 
	// armas_de_filo: true
};
	
for (let i = 0; i < objetosArray.length; i++) {
	const objeto = objetos[objetosArray[i]][0];
	objeto.categoria = objeto.categoria.toLowerCase();
	const subcategoria = objeto.subcategoria.toLowerCase().split(' ').join('_');
	const tier = objeto.tier;
	let imagen = subcategoria + "_" + tier + "_One_Piece_Gaiden_Foro_Rol.jpg";
	if (subcategoria == 'cofres') {
		imagen = subcategoria + "_" + tier + "_One_Piece_Gaiden_Foro_Rol.gif";
	}
	
	if (!subcategorias[subcategoria]) {
		subcategorias[subcategoria] = true;
		$('#objetos_' + objeto.categoria).append(`
			<div id="` + subcategoria + `_area">
				<div id="` + subcategoria + `_categoria">
					<div class="objeto_categoria">` + objeto.subcategoria.toUpperCase() + `</div>
					<div class="barra_categoria"></div>
				</div>

				<div id="` + subcategoria + `_objetos" class="objetos_lista">
					
				</div>
			</div>
		`);
	}
	
	$('#' + subcategoria + "_objetos").append(`
		<div class="item-outer" id="` + objeto.objeto_id + `">
			<div class="item-nombre"><a href="/op/staff/objetos_modificar.php?objeto_id=` + objeto.objeto_id + `">` + objeto.nombre + `</a></div>
			<div class="item-image">
				
				<div class="tooltip">
					<img id=imagen-item src="/images/op/iconos/` + imagen + `" />
					<div class="tooltiptext item-tooltip">
						<div style="font-size: 15px;font-family: moonGetHeavy;letter-spacing: 1px;text-align: center;background-color: #faa500;border-top-left-radius: 6px;border: 0px;border-top-right-radius: 6px;padding: 3px;text-shadow: 1px 1px 3px black;">` + objeto.nombre + `</div>
<!-- 								<div><img src=""></div> -->
						<div style="font-family: InterRegular;padding: 5px;text-align: justify;">` + objeto.descripcion + `</div>
						<div style=" height: 1px; background-color: #faa500; padding: 0px 14px; margin: 0px 5px 2px; "></div>
						<div style=" font-family: InterRegular; padding: 0px 5px; display: flex; flex-direction: row; justify-content: space-between; ">
							<div>ID: <span>` + objeto.objeto_id + `</span></div>
							<div><span class="itemBerries">` + parseInt(objeto.berries).toLocaleString('es-es') + `</span>B</div>
						</div>
						<div style="font-size: 9px;font-family: moonGetHeavy;letter-spacing: 1px;text-align: center;background-color: #faa500;border-bottom-left-radius: 6px;border: 0px;border-bottom-right-radius: 6px;padding: 3px;text-shadow: 1px 1px 3px black;">` + objeto.subcategoria + ` - Tier ` + objeto.tier + `</div>
					</div>
				</div>

				
			</div>
			<div class="item-price">` + parseInt(objeto.berries).toLocaleString('es-es') + `B</div>
		</div>
	`);
	
}
	
$('#imagen-item').hover(function() {
	
});
	
let testItem = null;	
	
$('.item-outer').on('click', function() {
	
	// testItem = $(this);
	let objeto = objetos[$(this)[0].id][0];
	
	if ($(this).hasClass('item-active')) {
		$(this).removeClass('item-active');
		
		
		let cantidad = $('#compra-' + objeto.objeto_id + ' .itemCantidad').text();
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) - (parseInt(objeto.berries) * cantidad);
		saldoRestante = saldoRestante + (parseInt(objeto.berries) * cantidad);
		console.log(saldoRestante);
		comprasTotal = comprasTotal.toLocaleString('es-es');

		$('#comprasTotal').html(comprasTotal);
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		$('#compra-' + objeto.objeto_id).remove();
		if (comprasTotal == '0') {
			$('#button-comprar').css('background-color', 'gray');
			// $('#button-comprar').css('border', '1px solid #535353');
		}
		delete listaDeCompras[objeto.objeto_id];
	} else {	
		
		if (saldoRestante - parseInt(objeto.berries) >= 0) {
			
			if (comprasTotal == '0') {
				$('#button-comprar').css('background-color', '#9664e0');
			}
			
			comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) + parseInt(objeto.berries);
			saldoRestante = saldoRestante - parseInt(objeto.berries);
			comprasTotal = comprasTotal.toLocaleString('es-es');

			$('#comprasTotal').html(comprasTotal);
			$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));

			$(this).addClass('item-active');
			
			listaDeCompras[objeto.objeto_id] = { cantidad: 1 };
			$('#comprasTotalBox').append(`

				<div id="compra-` + objeto.objeto_id + `" style=" height: 55px; border-bottom: 1px solid black; border-top: 1px solid black; background: linear-gradient(#009819, #003400); display: flex; flex-direction: row;">
					<div style="display: flex;flex-direction: column;margin: 5px 5px;">
						<div onclick="incrementarItem('compra-` + objeto.objeto_id + `')" class="incrementar-item">
							<i class="fa fa-angle-double-up" aria-hidden="true" style=" font-size: 17px; color: #f2f2f2; position: relative; "></i>
						</div>
						<div onclick="decrementarItem('compra-` + objeto.objeto_id + `')" class="decrementar-item">
							<i class="fa fa-angle-double-down" aria-hidden="true" style=" font-size: 17px; color: #f2f2f2; position: relative; "></i>
						</div>
					</div>
					<div style=" font-size: 20px; font-family: moonGetHeavy; color: white; text-shadow: 1px 1px 5px black; margin-top: 10px; margin-left: 5px; ">x<span class="itemCantidad">1</span></div>
					<div style="font-size: 16px;font-family: moonGetHeavy;color: white;text-shadow: 1px 1px 5px black;text-align: center;width: 173px;height: 50px;align-content: center;">
						` + objeto.nombre + `
					</div>
				</div>
			`);
		}

		// objetos[testItem[0].id][0]
	}
	
	// alert( "Handler for `click` called." );
});
	
function incrementarItem(item) {
	let itemCantidadId = '#' + item +  ' .itemCantidad';
	let itemId = item.replace('compra-', '');
	let itemCantidad = parseInt($(itemCantidadId).text());
	
	let berries = parseInt(objetos[itemId][0].berries);

	if (itemCantidad < 10 && (saldoRestante - berries >= 0)) {
		saldoRestante = saldoRestante - berries;
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) + berries;
		comprasTotal = comprasTotal.toLocaleString('es-es');
		$('#comprasTotal').html(comprasTotal);
		$(itemCantidadId).text(itemCantidad + 1);
		listaDeCompras[itemId]['cantidad'] = listaDeCompras[itemId]['cantidad'] + 1;
	}
	
}
	
function decrementarItem(item) {
	let itemCantidadId = '#' + item +  ' .itemCantidad';
	let itemId = item.replace('compra-', '');
	let itemCantidad = parseInt($(itemCantidadId).text());
	
	let berries = parseInt(objetos[itemId][0].berries);
	
	if (itemCantidad > 1) {
		saldoRestante = saldoRestante + berries;
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) - berries;
		comprasTotal = comprasTotal.toLocaleString('es-es');
		$('#comprasTotal').html(comprasTotal);
		
		$(itemCantidadId).text(itemCantidad - 1);
		listaDeCompras[itemId]['cantidad'] = listaDeCompras[itemId]['cantidad'] - 1;
	}
}
	
function comprarItems() {
	if (comprasTotal != '0') {
		
		if (confirm('¿Estás de acuerdo con esta compra de ' + comprasTotal + ' berries?')) {

			$.post("/op/tienda.php", { 
				accion: 'comprar',
				comprasTotal: parseInt(comprasTotal.replace(/\./g, '')),
				listaDeCompras: listaDeCompras,
				listaDeComprasKeys: Object.keys(listaDeCompras)
			}, function( data ) { 
				console.log(data);
				alert('¡Compra realizada! Serás redirigido a la página del inventario.');
				window.location = "/op/inventario.php";
			});
		}
		
		
	}
}
	
function clickTipo(tipo) {
	$('.tienda_tipos').removeClass('tienda_tipos_active');

	if (tipo == 'consumibles') {
		$('#objetos_consumibles').css('display', 'block');
		$('#objetos_armas').css('display', 'none');
		$('#objetos_utensilios').css('display', 'none');
		$('#objetos_estructuras').css('display', 'none');
		
		$('#consumibles').addClass('tienda_tipos_active');
	}

	if (tipo == 'armas') {
		$('#objetos_consumibles').css('display', 'none');
		$('#objetos_armas').css('display', 'block');
		$('#objetos_utensilios').css('display', 'none');
		$('#objetos_estructuras').css('display', 'none');
		
		$('#armas').addClass('tienda_tipos_active');
	}

	if (tipo == 'utensilios') {
		$('#objetos_consumibles').css('display', 'none');
		$('#objetos_armas').css('display', 'none');
		$('#objetos_utensilios').css('display', 'block');
		$('#objetos_estructuras').css('display', 'none');
		
		$('#utensilios').addClass('tienda_tipos_active');
	}

	if (tipo == 'estructuras') {
		$('#objetos_consumibles').css('display', 'none');
		$('#objetos_armas').css('display', 'none');
		$('#objetos_utensilios').css('display', 'none');
		$('#objetos_estructuras').css('display', 'block');
		
		$('#estructuras').addClass('tienda_tipos_active');
	}
	
}	
	
	/* if saldo restante + thing is less than 0, do not add. */
</script>

</html>
