<script>
let oficios = {$ficha['oficios']};
let oficio1 = "{$ficha['oficio1']}";
let oficio2 = "{$ficha['oficio2']}";
let has_estudioso = "{$has_estudioso}";
let has_erudito = "{$has_erudito}";
const modoVista = '{$modo_vista}' == '1' ? true : false;	
	
let objetos_json = {$objetos_json};
let objetos_array_json = {$objetos_array_json};
let materiales_json = {$materiales_json};
let materiales_array_json = {$materiales_array_json};
let inventario_json = {$inventario_json};
let inventario_array_json = {$inventario_array_json};
let objetos_recetas_json = {$objetos_recetas_json};
let objetos_recetas_array_json = {$objetos_recetas_array_json};
	
let nivel = {$ficha['nivel']};
const puntos_oficio = {$ficha['puntos_oficio']};
const berries = {$ficha['berries']};

$('#berries').html(parseInt(berries).toLocaleString('es-es'));
$('#puntosOficio').html(parseInt(puntos_oficio).toLocaleString('es-es'));

// NPCs del usuario (si existen)
let npcs_json = {$npcs_json};
let npcs_array_json = {$npcs_array_json};

// DEBUG: Mostrar datos de materiales y kits en consola
console.log('=== DEBUG CRAFTEO ===');
console.log('Materiales Array:', materiales_array_json);
console.log('Materiales JSON:', materiales_json);
console.log('Objetos Array:', objetos_array_json);
console.log('Inventario Array:', inventario_array_json);
console.log('Inventario JSON:', inventario_json);
console.log('====================');

// Estado de crafteos activos (desde backend)
let playerCrafteo = {$player_crafteo_json};
let npcsCrafteando = {$npcs_crafteando_json};

// Keep originals to be able to restore when switching back to player
const original_objetos_json = JSON.parse(JSON.stringify(objetos_json));
const original_objetos_array_json = JSON.parse(JSON.stringify(objetos_array_json));

// UI: selector de actor (personaje / NPCs)
let selectedActor = { type: 'player', npcId: '' };
function renderActorSelector() {
    // Mostrar el selector SOLO si existe al menos un NPC con oficios definidos
    let hasNpcWithOficio = false;
    for (let i = 0; i < npcs_array_json.length; i++) {
        let npcKey = npcs_array_json[i];
        let npc = npcs_json[npcKey] ? npcs_json[npcKey][0] : null;
        if (!npc) continue;
        if (npc.oficios && npc.oficios.trim() != '') { hasNpcWithOficio = true; break; }
    }

    // Si no hay NPCs con oficio, eliminar contenedor si existe y no renderizar nada
    if (!hasNpcWithOficio) {
        $('.selector-actores-container').remove();
        return;
    }

    let html = `<div class="selector-actores-container" style="margin-top: 8px; display:flex; gap:6px; align-items:center;">
        <div style="font-family: InterRegular; font-size: 14px;">Craftear como:</div>`;

    // Añadir botón Personaje sólo si no tiene crafteo activo
    if (!playerCrafteo) {
        html += `<button id="actor_player" class="crear-button">Personaje</button>`;
    } else {
        html += `<div class="crear-button" style="opacity:0.5;pointer-events:none;">Personaje (creando...)</div>`;
    }

    for (let i = 0; i < npcs_array_json.length; i++) {
        let npcKey = npcs_array_json[i];
        let npc = npcs_json[npcKey] ? npcs_json[npcKey][0] : null;
        if (!npc) continue;
        // Sólo mostrar NPC si tiene oficios definidos
        let hasOficios = npc.oficios && npc.oficios.trim() != '';
        if (!hasOficios) continue;
        // Si este NPC está ya crafteando, ocultar su pestaña
        if (npcsCrafteando && Array.isArray(npcsCrafteando) && npcsCrafteando.includes(npcKey)) {
            continue; // omitimos el botón
        }
        html += `<button data-npcid="${npcKey}" class="crear-button actor-npc" style="padding:6px 10px;">${npc.nombre}</button>`;
    }

    html += `</div>`;

    // Mostrar botón "Ver crafteos en curso" si hay crafteos activos
    if (playerCrafteo || (npcsCrafteando && Array.isArray(npcsCrafteando) && npcsCrafteando.length > 0)) {
        html += `<div style="margin-top:8px;"><button id="ver_crafteos" class="crear-button" style="background:#9b19d1; padding:6px 10px;">Ver crafteos en curso</button></div>`;
    }

    // Evitar duplicados: remover contenedor previo y añadir el nuevo
    $('.selector-actores-container').remove();
    $('.secondBackground .thirdBackground').first().prepend(html);

    // Handlers (delegated to support dynamic elements)
    $(document).on('click', '#actor_player', function(){ 
        selectedActor = { type: 'player', npcId: '' }; 
        $('.actor-npc').removeClass('selected'); 
        $(this).addClass('selected'); 
        // restore original objetos and re-render
        objetos_json = original_objetos_json;
        objetos_array_json = original_objetos_array_json;
        setActiveOficiosFromActor();
        renderItems();
    });

    // Handler para ver crafteos en curso
    $(document).on('click', '#ver_crafteos', function() {
        window.location.href = '/op/crafteo.php';
    });

    $(document).on('click', '.actor-npc', function(){ 
        let npcId = $(this).data('npcid'); 
        selectedActor = { type: 'npc', npcId: npcId }; 
        $('.actor-npc').removeClass('selected'); 
        $('#actor_player').removeClass('selected'); 
        $(this).addClass('selected'); 
        // Request objetos filtered by NPC from backend
        $.post('/op/crafteo.php', { accion: 'get_objects_for_actor', actor: 'npc', npcId: npcId }, function(data) {
            if (data && data.objetos) {
                objetos_json = data.objetos;
                objetos_array_json = data.objetos_array;
                setActiveOficiosFromActor();
                renderItems();
            }
        }, 'json');
    });

    // Default selection: si el player no está crafteando, seleccionarlo, si no seleccionar el primer NPC disponible
    if (!playerCrafteo) {
        $('#actor_player').addClass('selected');
    } else {
        let firstNpcBtn = $('.actor-npc').first();
        if (firstNpcBtn.length) {
            firstNpcBtn.addClass('selected');
            firstNpcBtn.click();
        }
    }
}

renderActorSelector();
// Active oficios used to filter which items are shown according to selected actor
let activeOficios = oficios;
// Oficios currently mostrados en la UI (puede ser de jugador o de NPC)
let displayedOficios = oficios;

function applyActorFilter() {
	if (!activeOficios) {
		$('.item-outer').closest('div').show();
		return;
	}
	$('.item-outer').each(function() {
		let itemOficio = $(this).data('oficio');
		let itemOficioNivel = parseInt($(this).data('oficio-nivel')) || 0;
		if (!itemOficio) { $(this).closest('div').show(); return; }

		let show = false;
		// Verifica si el oficio principal está habilitado
		if (activeOficios[itemOficio] && (parseInt(activeOficios[itemOficio].nivel || 0) >= itemOficioNivel)) {
			show = true;
		} else {
			// Verifica si alguna especialización (suboficio) coincide y tiene nivel suficiente
			for (const key in activeOficios) {
				if (activeOficios[key] && activeOficios[key].sub) {
					for (const subKey in activeOficios[key].sub) {
						// Para suboficios, sumar +1 al nivel para la comprobación
						let subNivel = parseInt(activeOficios[key].sub[subKey] || 0) + 1;
						if (subKey === itemOficio && subNivel >= itemOficioNivel) {
							show = true;
							break;
						}
					}
				}
				if (show) break;
			}
		}
		if (show) {
			$(this).closest('div').show();
		} else {
			$(this).closest('div').hide();
		}
	});
}

// Render items using current objetos_json/objetos_array_json
function renderItems() {
	// Clear tiers
	for (let t = 1; t <= 5; t++) { $('#tier-' + t).empty(); }

	for (let i = 0; i < objetos_array_json.length; i++) {
		let objetoId = objetos_array_json[i];
		let objeto = objetos_json[objetoId][0];
		objeto.categoria = objeto.categoria.toLowerCase();
		const subcategoria = objeto.subcategoria.toLowerCase().split(' ').join('_');
		const tier = objeto.tier;
		const imagen_id = objeto.imagen_id;
		let oficio = objeto.oficio;
		const imagen_avatar = objeto.imagen_avatar;
		let imagen_nombre = subcategoria + "_" + imagen_id + "_One_Piece_Gaiden_Foro_Rol.jpg";
		let objetoNombre = objeto.nombre;
		let requisitos = '';
		let escalado = '';
		let dano = '';
		let efecto = '';
		let bloqueo = '';
		let alcance = '';
		if (objeto.requisitos) { requisitos = `<div style="font-family: InterRegular;padding: 5px;text-align: justify;border-bottom: 1px solid #5e5e5e;">` + objeto.requisitos + `</div>`; }
		if (objeto.escalado) { escalado = `<div style="font-family: InterRegular;padding: 5px;text-align: justify;border-bottom: 1px solid #5e5e5e;">` + objeto.escalado + `</div>`; }
		if (objeto.dano) { dano = `<div style="font-family: InterRegular;padding: 5px;text-align: center;border-top: 1px solid #5e5e5e;">` + objeto.dano + ` de daño</div>`; }
		if (objeto.efecto) { efecto = `<div style="font-family: InterRegular;padding: 5px;text-align: center;border-top: 1px solid #5e5e5e;">` + objeto.efecto + `</div>`; }
		if (objeto.bloqueo) { bloqueo = `<div style="font-family: InterRegular;padding: 5px;text-align: center;border-top: 1px solid #5e5e5e;">` + objeto.bloqueo + `</div>`; }
		if (objeto.alcance) { alcance = `<div style="font-family: InterRegular;padding: 5px;text-align: center;border-top: 1px solid #5e5e5e;">` + objeto.alcance + `</div>`; }
		let colorTier = '#faa500';
		if (tier == '1') { colorTier = '#808080'; }
		if (tier == '2') { colorTier = '#4dfe45'; }
		if (tier == '3') { colorTier = '#457bfe'; }
		if (tier == '4') { colorTier = '#cf44ff'; }
		if (tier == '5') { colorTier = '#febb46'; }
		if (imagen_avatar != '') { imagen = imagen_avatar; }
		let crafteo = ``;
		let imagenGris = '';
		let fondoGris = '';
		let berriesCostoDescontado = ((parseInt(objeto.berriesCrafteo) * berriesDescontado(objeto.oficio))).toLocaleString('es-es');
		
		// Mapeo de especializaciones a oficios base para buscar kits
		function getOficioBaseParaKit(oficio) {
			const mapeo = {
				'Chef': 'Cocinero',
				'Aprovisionador': 'Cocinero',
				'Herrero': 'Artesano',
				'Modista': 'Artesano',
				'Doctor': 'Médico',
				'Farmacólogo': 'Médico',
				'Astillero': 'Carpintero',
				'Constructor': 'Carpintero',
				'Ingeniero': 'Inventor',
				'Biólogo': 'Inventor',
				'Mayorista': 'Recolector',
				'Agreste': 'Recolector',
				'Periodista': 'Investigador',
				'Arqueólogo': 'Investigador',
				'Comerciante': 'Mercader',
				'Contrabandista': 'Mercader'
			};
			return mapeo[oficio] || oficio;
		}
		
		// Buscar kits disponibles para este oficio (incluyendo oficio base si es especialización)
		let kitsDisponibles = [];
		let oficioParaBuscar = getOficioBaseParaKit(objeto.oficio);
		
		for (let j = 0; j < materiales_array_json.length; j++) {
			let materialId = materiales_array_json[j];
			let material = materiales_json[materialId] ? materiales_json[materialId][0] : null;
			if (material && (material.subcategoria.toLowerCase() === objeto.oficio.toLowerCase() || material.subcategoria.toLowerCase() === oficioParaBuscar.toLowerCase())) {
				kitsDisponibles.push({
					id: materialId,
					nombre: material.nombre,
					tier: material.tier,
					descuento: parseInt(material.tier) * 10 // 10%, 20%, 30%, etc.
				});
			}
		}
		
		if (objeto.desbloqueado == 0 || inventario_json[objetoId] && (berries - parseInt(berriesCostoDescontado) >= 0)) {
			// Botón de crafteo normal
			crafteo = `
				<div id="creacion" style=" text-align: center;border-top: 1px solid #5e5e5e;">
					<div class="crear-button" onclick="craftearItem('` + objetoId + `')">
						¡Craftear este objeto!<br>Coste ` + berriesCostoDescontado + ` B | Duración ` + ((objeto.tiempo_creacion * getTiempoCreacion(objeto.oficio) * getTiempoCreacionVirtud())).toFixed(2) + ` horas
					</div>

function setActiveOficiosFromActor() {
	if (selectedActor.type === 'player') {
		activeOficios = null; // Mostrar todos los objetos para el personaje
		displayedOficios = oficios;
	} else {
		const npc = npcs_json[selectedActor.npcId] ? npcs_json[selectedActor.npcId][0] : null;
		if (npc) {
			try {
				activeOficios = (typeof npc.oficios === 'string') ? JSON.parse(npc.oficios) : npc.oficios;
				// Si el NPC tiene más de un oficio, aseguramos que displayedOficios tenga ambos
				if (activeOficios && typeof activeOficios === 'object') {
					displayedOficios = {};
					const keys = Object.keys(activeOficios);
					if (keys.length > 0) displayedOficios[keys[0]] = activeOficios[keys[0]];
					if (keys.length > 1) displayedOficios[keys[1]] = activeOficios[keys[1]];
					// Si solo tiene uno, igual funciona
				} else {
					displayedOficios = activeOficios;
				}
			} catch (e) {
				activeOficios = null; // Fallback: mostrar todos si error
				displayedOficios = oficios;
			}
		} else {
			activeOficios = null;
			displayedOficios = oficios;
		}
	}
	applyActorFilter();
	renderOficioBoxes();
}

function berriesDescontado(oficio) {
	let nivelMax = 0;

    if (oficio == 'Cocinero' || oficio == 'Chef' || oficio == 'Aprovisionador') {
		
		if (oficios['Cocinero']?.sub['Aprovisionador']) {
            if (oficios['Cocinero']?.sub['Aprovisionador'] > nivelMax) {
                nivelMax = oficios['Cocinero']?.sub['Aprovisionador'];
            }  
        }

    }

    if (oficio == 'Artesano' || oficio == 'Herrero' || oficio == 'Modista') {

        if (oficios['Artesano']?.sub['Modista']) {
            if (oficios['Artesano']?.sub['Modista'] > nivelMax) {
                nivelMax = oficios['Artesano']?.sub['Modista'];
            }  
        }

    }

    if (oficio == 'Médico' || oficio == 'Doctor' || oficio == 'Farmacólogo') {
			
		if (oficios['Médico']?.sub['Doctor']) {
            if (oficios['Médico']?.sub['Doctor'] > nivelMax) {
                nivelMax = oficios['Médico']?.sub['Doctor'];
            }  
        }

    }

    if (oficio == 'Carpintero' || oficio == 'Astillero' || oficio == 'Constructor') {
			
		if (oficios['Carpintero']?.sub['Astillero']) {
            if (oficios['Carpintero']?.sub['Astillero'] > nivelMax) {
                nivelMax = oficios['Carpintero']?.sub['Astillero'];
            }  
        }

    }

    if (oficio == 'Inventor' || oficio == 'Ingeniero' || oficio == 'Biólogo') {
			
		if (oficios['Inventor']?.sub['Biólogo']) {
			if (oficios['Inventor']?.sub['Biólogo'] > nivelMax) {
				nivelMax = oficios['Inventor']?.sub['Biólogo'];
			}  
		}

    }

    return getDescuento(nivelMax);

}

function getDescuento(nivel) {
    if (nivel == 1) {
        return 0.95;
    } else if (nivel == 2) {
        return 0.90;
    } else if (nivel == 3) {
        return 0.80;
    } else {
        return 1;
    }
}
			
function getTiempoCreacionVirtud() {
  
    if (has_estudioso) {
        return 0.8;
    } else if (has_erudito) {
        return 0.9; 
    } else {
        return 1;
    }

}

function getCantidadMaximaCrafteo() {
	let recolectorNivel = 0;
	let agresteNivel = 0;
	
	if (oficios['Recolector']) {
		recolectorNivel = oficios['Recolector'].nivel || 0;
		
		if (oficios['Recolector'].sub && oficios['Recolector'].sub['Agreste']) {
			agresteNivel = oficios['Recolector'].sub['Agreste'];
		}
	}
	
	// Base: 1 item, Recolector nivel 2+: 2 items
	let cantidadMax = (recolectorNivel >= 2) ? 2 : 1;
	
	// Agreste aumenta la cantidad: nivel 1 = 3, nivel 2 = 5, nivel 3 = 10
	if (agresteNivel == 3) {
		cantidadMax = 10;
	} else if (agresteNivel == 2) {
		cantidadMax = 5;
	} else if (agresteNivel == 1) {
		cantidadMax = 3;
	}
	
	return cantidadMax;
}

function craftearItem(objetoId) {
	let cantidadMax = getCantidadMaximaCrafteo();
	
	if (cantidadMax > 1) {
		let cantidad = prompt('¿Cuántas unidades quieres craftear? (Máximo: ' + cantidadMax + ')', cantidadMax);
		
		if (cantidad === null) return; // Cancelado
		
		cantidad = parseInt(cantidad);
		
		if (isNaN(cantidad) || cantidad < 1 || cantidad > cantidadMax) {
			alert('Por favor ingresa un número válido entre 1 y ' + cantidadMax);
			return;
		}
		
		let actorPayload = {}; if (selectedActor.type === 'npc') { actorPayload = { actor: 'npc', npcId: selectedActor.npcId }; }
			if (confirm('¿Estás seguro que quieres craftear ' + cantidad + ' unidad(es) de este item?' + (selectedActor.type==='npc' ? '\n(Realizado por tu NPC)' : ''))) {
				$.post("/op/crafteo.php", Object.assign({ accion: 'craftear', objetoId: objetoId, cantidadCraftear: cantidad }, actorPayload), function( data ) { alert('¡Objeto en proceso de crafteo!'); location.reload(); });
