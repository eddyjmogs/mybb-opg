<script>
var TF={
    filtroActual:{tipos:[],tiers:[],categorias:[],fecha:null},
    todasLasTecnicas:[],
    armasSeleccionadas:[null, null, null],
    tecnicaSeleccionada:null,
    nivelPersonaje:0,
    modoCombate:'ataque',
    PREFIJOS_ARMAS: ['', 'secundaria-', 'terciaria-'],
    NOMBRES_ARMAS: ['PRINCIPAL', 'SECUNDARIA', 'TERCIARIA'],
    
    init:function(){
        var self=this;
        if(document.readyState==='loading'){
            document.addEventListener('DOMContentLoaded',function(){
                setTimeout(function(){self.setup()},500);
            });
        }else{
            setTimeout(function(){self.setup()},500);
        }
    },
    setup:function(){
        this.cargarNivelPersonaje();
        this.initAtributos();
        this.cargarAtributosActuales();
        this.cargarArmas();
        this.cargarArmasSecundarias();
        this.cargarTecnicas();
        this.initFiltros();
    },
    
    cargarNivelPersonaje:function(){
        var nivelBaseEl=document.getElementById('atributo-base-NIV');
        var nivelFinalEl=document.getElementById('atributo-final-NIV');
        
        if(nivelBaseEl && nivelFinalEl){
            // Obtener el nivel del personaje desde la variable global o elemento DOM
            var nivel=parseInt("{$nivel}")||0;
            this.nivelPersonaje=nivel;
            nivelBaseEl.textContent=nivel;
            var modEl=document.getElementById('modificador-NIV');
            var mod=modEl?parseInt(modEl.value||modEl.textContent||0):0;
            nivelFinalEl.textContent=nivel+mod;
        }
    },
    
    obtenerAtributoFinal:function(stat){
        var el=document.getElementById('atributo-final-'+stat);
        return el?parseInt(el.textContent||0):0;
    },
    
    obtenerNivel:function(){
        var nivelEl = document.getElementById('atributo-final-NIV');
        var nivel = parseInt(nivelEl ? nivelEl.textContent || '0' : '0', 10);
        return nivel;
    },
    
    initAtributos:function(){
        var stats=['NIV','FUE','AGI','PUN','DES','RES','REF','VOL'];
        var self=this;
        for(var i=0;i<stats.length;i++){
            var stat=stats[i];
            var modEl=document.getElementById('modificador-'+stat);
            if(modEl){
                var input = document.createElement('input');
                input.type = 'text';
                input.id = modEl.id;
                input.value = modEl.textContent || '0';
                input.style.cssText='width:76px;height:19px;text-align:center;background:rgba(255,255,255,0.8);border:1px solid #ccc;border-radius:3px;font-family:inherit;font-size:inherit;padding:0px;margin:0px;';
                
                // Reemplazar el div con el input
                modEl.parentNode.replaceChild(input, modEl);
                
                // Agregar eventos al nuevo input
                input.addEventListener('input',function(e){
                    var val=e.target.value.replace(/[^0-9+\-]/g,'');
                    var signo='',num=val;
                    if(val.charAt(0)==='+' || val.charAt(0)==='-'){
                        signo=val.charAt(0);
                        num=val.substring(1);
                    }
                    num=num.replace(/[+\-]/g,'');
                    if(num.length>5)num=num.substring(0,5);
                    val=signo+num;
                    if(val==='+'||val==='-')val=signo+'0';
                    e.target.value=val;
                    self.actualizarAtributoFinal(e.target.id.split('-')[1]);
                });
                input.addEventListener('blur',function(e){
                    var val=e.target.value||'0';
                    if(val===''||val==='+'||val==='-')e.target.value='0';
                    self.actualizarAtributoFinal(e.target.id.split('-')[1]);
                });
            }
        }
        setTimeout(function(){self.actualizarGolpeBasico()},100);
    },
    
    actualizarAtributoFinal:function(stat){
        var baseEl=document.getElementById('atributo-base-'+stat);
        var modEl=document.getElementById('modificador-'+stat);
        var finalEl=document.getElementById('atributo-final-'+stat);
        if(!baseEl||!modEl||!finalEl)return;
        var base=parseInt(baseEl.textContent||0);
        var mod=parseInt(modEl.value||modEl.textContent||0);
        var final=base+mod;
        finalEl.textContent=final;        this.actualizarGolpeBasico();
        this.actualizarDanoTecnica();
        // Actualizar información de todas las armas
        for(var i = 0; i < 3; i++){
            if(this.armasSeleccionadas[i]){
                this.actualizarInfoArma(i);
            }
        }
    },
    
    cargarAtributosActuales:function(){
        var attrs={
            FUE:parseInt("{$fuerza_completa}")||0,
            AGI:parseInt("{$agilidad_completa}")||0,
            PUN:parseInt("{$punteria_completa}")||0,
            DES:parseInt("{$destreza_completa}")||0,
            RES:parseInt("{$resistencia_completa}")||0,
            REF:parseInt("{$reflejos_completa}")||0,
            VOL:parseInt("{$voluntad_completa}")||0
        };
        for(var stat in attrs){
            var baseEl=document.getElementById('atributo-base-'+stat);
            var finalEl=document.getElementById('atributo-final-'+stat);
            var modEl=document.getElementById('modificador-'+stat);
            if(baseEl && finalEl && modEl){
                baseEl.textContent=attrs[stat];
                var mod=parseInt(modEl.value||modEl.textContent||0);
                finalEl.textContent=attrs[stat]+mod;
            }
        }
        this.actualizarGolpeBasico();
    },
    
    cargarArmas:function(){
        this.cargarArmasEnSelector('arma-seleccionada');
    },
    
    cargarArmasSecundarias:function(){
        this.cargarArmasEnSelector('arma-secundaria');
        this.cargarArmasEnSelector('arma-terciaria');
    },
    
    cargarArmasEnSelector:function(selectorId){
        var sel=document.getElementById(selectorId);
        if(!sel)return;
        sel.innerHTML='<option value="">Sin arma</option>';
        if(typeof objetos_array_json==='undefined')return;
        
        var armas=[];
        for(var i=0;i<objetos_array_json.length;i++){
            var id=objetos_array_json[i];
            if(id==='LLST001')continue;
            var obj=objetos_json[id]?objetos_json[id][0]:null;
            if(obj && obj.categoria && obj.categoria.toLowerCase()==='armas'){
                armas.push({id:id,objeto:obj});
            }
        }
        
        for(var j=0;j<armas.length;j++){
            var opt=document.createElement('option');
            opt.value=armas[j].id;
            opt.textContent=(armas[j].objeto.editado==='1'?armas[j].objeto.apodo:armas[j].objeto.nombre)+' (ID: '+armas[j].id+')';
            sel.appendChild(opt);
        }
    },
      seleccionarArma:function(id, indice){
        indice = indice || 0; // Default a arma principal
        var prefijos = ['', 'secundaria-', 'terciaria-'];
        var prefijo = prefijos[indice];
        var info=document.getElementById('arma-' + prefijo + 'info');
        
        if(!id || !info){
            if(info)info.style.display='none';
            this.armasSeleccionadas[indice]=null;
            this.actualizarGolpeBasico();
            this.actualizarVisibilidadBotonEquipadas();
            return;
        }
        if(!objetos_json[id])return;
        var obj=objetos_json[id][0];
        if(obj){
            this.armasSeleccionadas[indice]=obj;
            this.actualizarInfoArma(indice);
            info.style.display='block';
            this.actualizarGolpeBasico();
            this.actualizarVisibilidadBotonEquipadas();
        }
    },
    
    actualizarVisibilidadBotonEquipadas:function(){
        var btnMostrarEquipadas = document.getElementById('btn-mostrar-equipadas');
        if(!btnMostrarEquipadas) return;
        
        var tieneArmas = this.armasSeleccionadas[0] || this.armasSeleccionadas[1] || this.armasSeleccionadas[2];
        btnMostrarEquipadas.style.display = tieneArmas ? 'inline-block' : 'none';
    },
    
    actualizarInfoArma:function(indice){
        var obj = this.armasSeleccionadas[indice];
        if(!obj) return;
        
        var prefijo = this.PREFIJOS_ARMAS[indice];
        var elementos = this.obtenerElementosArma(prefijo);
        
        if(elementos.nombre) elementos.nombre.textContent = obj.editado==='1' ? obj.apodo : obj.nombre;
        
        if(elementos.dano){
            var calc = this.calcularDanoArma(obj);
            var etiqueta = this.modoCombate === 'defensa' ? 'Bloqueo:' : 'Daño:';
            var valorMostrar = this.obtenerValorMostrarArma(obj, calc);
            elementos.dano.innerHTML = '<strong>'+etiqueta+'</strong> '+valorMostrar;
        }
        
        if(elementos.imagen){
            elementos.imagen.src = this.obtenerImagenArma(obj, '');
            elementos.imagen.style.display = 'block';
        }
    },
    
    obtenerElementosArma:function(prefijo){
        return {
            nombre: document.getElementById('arma-' + prefijo + 'nombre'),
            dano: document.getElementById('arma-' + prefijo + 'dano'),
            imagen: document.getElementById('arma-' + prefijo + 'imagen')
        };
    },
    
    obtenerValorMostrarArma:function(obj, calc){
        if(this.modoCombate === 'defensa' && obj.bloqueo){
            if(calc.calculado){
                return calc.valor + ' <span style="color:#5bc0de;">('+calc.texto+' = '+calc.valor+' total)</span>';
            } else {
                return obj.bloqueo;
            }
        } else if(this.modoCombate === 'ataque' && obj.dano){
            if(calc.calculado){
                return calc.valor + ' <span style="color:#ff7e00;">('+calc.texto+' = '+calc.valor+' total)</span>';
            } else {
                return obj.dano;
            }
        } else {
            return 'No disponible';
        }
    },
      mostrarSegundaArma:function(){
        var container = document.getElementById('arma-secundaria-container');
        var btn = document.getElementById('btn-agregar-segunda');
        var btnTercera = document.getElementById('btn-agregar-tercera');
        var btnMostrarEquipadas = document.getElementById('btn-mostrar-equipadas');
        
        if(container) container.style.display = 'block';
        if(btn) btn.style.display = 'none';
        if(btnTercera) btnTercera.style.display = 'inline-block';
        if(btnMostrarEquipadas) btnMostrarEquipadas.style.display = 'inline-block';
    },
      mostrarTerceraArma:function(){
        var container = document.getElementById('arma-terciaria-container');
        var btn = document.getElementById('btn-agregar-tercera');
        
        if(container) container.style.display = 'block';
        if(btn) btn.style.display = 'none';
    },
    
    mostrarArmasEquipadas:function(){
        var container = document.getElementById('armas-equipadas-container');
        var armasContainer = document.getElementById('armas-container');
        var lista = document.getElementById('lista-armas-equipadas');
        
        if(!container || !armasContainer || !lista) return;
        
        armasContainer.style.display = 'none';
        container.style.display = 'block';
        lista.innerHTML = '';
        
        var armasEquipadas = this.obtenerArmasEquipadas();
        
        if(armasEquipadas.length === 0){
            lista.innerHTML = '<div style="text-align: center; color: #666; font-family: moonGetHeavy; font-size: 14px;">No hay armas equipadas</div>';
            return;
        }
        
        for(var i = 0; i < armasEquipadas.length; i++){
            lista.appendChild(this.crearElementoArmaEquipada(armasEquipadas[i]));
        }
    },
    
    obtenerArmasEquipadas:function(){
        var armasEquipadas = [];
        for(var i = 0; i < 3; i++){
            if(this.armasSeleccionadas[i]){
                armasEquipadas.push({
                    arma: this.armasSeleccionadas[i], 
                    nombre: this.NOMBRES_ARMAS[i]
                });
            }
        }
        return armasEquipadas;
    },
    
    crearElementoArmaEquipada:function(item){
        var armaDiv = document.createElement('div');
        armaDiv.style.cssText = 'display: flex; align-items: center; background-color: rgba(255,255,255,0.9); border-radius: 5px; padding: 0px; border: 1px solid #ddd;';
        
        var imagen = document.createElement('img');
        imagen.src = this.obtenerImagenArma(item.arma, item.arma.id || '');
        imagen.style.cssText = 'width: 50px; height: 50px; object-fit: cover; border-radius: 5px; margin-right: 10px;';
        imagen.onerror = function(){ this.style.display = 'none'; };
        
        var info = document.createElement('div');
        info.style.cssText = 'flex: 1; text-align: left;';
        
        var titulo = document.createElement('div');
        titulo.style.cssText = 'font-family: moonGetHeavy; font-size: 10px; color: #0055bb; margin-bottom: 0px;';
        titulo.textContent = item.nombre + ' - ' + (item.arma.id || 'SIN ID');
        
        var nombre = document.createElement('div');
        nombre.style.cssText = 'font-family: moonGetHeavy; font-size: 10px; font-weight: bold; margin-bottom: 0px;';
        nombre.textContent = item.arma.nombre || 'Arma sin nombre';
        
        info.appendChild(titulo);
        info.appendChild(nombre);
        armaDiv.appendChild(imagen);
        armaDiv.appendChild(info);
        
        return armaDiv;
    },
    
    ocultarArmasEquipadas:function(){
        var container = document.getElementById('armas-equipadas-container');
        var armasContainer = document.getElementById('armas-container');
        
        if(container) container.style.display = 'none';
        if(armasContainer) armasContainer.style.display = 'block';
    },
    
    calcularDanoArma:function(arma){
        if(!arma) return {texto:'Sin arma',valor:0,calculado:false};
        
        // Si estamos en modo defensa, intentar usar bloqueo en lugar de daño
        var texto = '';
        if(this.modoCombate === 'defensa' && arma.bloqueo){
            texto = arma.bloqueo;
        } else if(arma.dano){
            texto = arma.dano;
        } else {
            return {texto:'Sin valor',valor:0,calculado:false};
        }
        
        var calc=texto;
        var attrs={
            FUE:this.obtenerAtributoFinal('FUE'),
            RES:this.obtenerAtributoFinal('RES'),
            DES:this.obtenerAtributoFinal('DES'),
            PUN:this.obtenerAtributoFinal('PUN'),
            AGI:this.obtenerAtributoFinal('AGI'),
            REF:this.obtenerAtributoFinal('REF'),
            VOL:this.obtenerAtributoFinal('VOL'),
            NIV:this.obtenerNivel()
        };
        
        // Patrón actualizado para soportar tanto 'x' como '×' (símbolo de multiplicación)
        var patron=/\[([A-Z]{3})[x×](\d+(?:[,.]?\d+)?)\]/g;
        var match,total=0,hasCalc=false;
        
        while((match=patron.exec(texto))!==null){
            var stat=match[1];
            var mult=parseFloat(match[2].replace(',','.'));
            if(attrs[stat]!==undefined && !isNaN(mult)){
                var val=Math.floor(attrs[stat]*mult);
                total+=val;
                hasCalc=true;
                calc=calc.replace(match[0],val.toString());
            }
        }
        
        // Después de procesar las fórmulas, sumar todos los números en la cadena resultante
        var nums=calc.match(/\b\d+\b/g);
        if(nums){
            total = 0; // Reiniciar total para recalcular con todos los números
            for(var k=0;k<nums.length;k++){
                var num=parseInt(nums[k],10);
                if(!isNaN(num)){
                    total+=num;
                }
            }
            hasCalc = true; // Marcar como calculado si encontramos números
        }
        
        return{texto:calc,valor:total,calculado:hasCalc};
    },
    
    obtenerImagenArma:function(obj,id){
        if(obj.imagen_avatar)return obj.imagen_avatar;
        var sub=obj.subcategoria?obj.subcategoria.toLowerCase().split(' ').join('_'):'arma';
        var imgId=obj.imagen_id||'1';
        var nombre=sub+"_"+imgId+"_One_Piece_Gaiden_Foro_Rol.jpg";
        var gifs=['cofres','akuma_no_mi','materiales','tecnicas','documentos','recetas'];
        var especiales=['EANM001','LLST001','THR001','EPA001','KMP001','VCD001','VCZ001'];
        if(gifs.indexOf(sub)!==-1||especiales.indexOf(id)!==-1){
            nombre=sub+"_"+imgId+"_One_Piece_Gaiden_Foro_Rol.gif";
        }
        return'/images/op/iconos/'+nombre;
    },      actualizarGolpeBasico:function(){
        var dano=document.querySelector('#golpe-basico-dano');
        var tipo=document.querySelector('#golpe-basico-tipo');
        var indicador=document.querySelector('#indicador-armas');
        if(!dano||!tipo)return;
        
        var armasActivas = this.armasSeleccionadas.filter(function(arma) { return arma !== null; });
        var numArmas = armasActivas.length;
        
        // Actualizar indicador de número de armas
        if(indicador){
            if(numArmas > 1){
                indicador.textContent = numArmas;
                indicador.style.display = 'block';
            } else {
                indicador.style.display = 'none';
            }
        }
        
        if(numArmas === 0){
            // Sin armas, usar FUE base (o RES si es modo defensa)
            var valorBase = this.modoCombate === 'defensa' ? this.obtenerAtributoFinal('RES') : this.obtenerAtributoFinal('FUE');
            dano.textContent = valorBase || '0';
            var textoTipo = this.modoCombate === 'defensa' ? 'DAÑO MITIGADO' : 'DE DAÑO CONTUNDENTE';
            tipo.textContent = textoTipo;
        } else {
            var danoTotal = 0;
            var tiposDano = [];
            var multiplicador = 1.0; // 100% para una sola arma
            
            if(numArmas === 2) multiplicador = 0.75; // 75% para dos armas
            else if(numArmas === 3) multiplicador = 0.60; // 60% para tres armas
              for(var i = 0; i < armasActivas.length; i++){
                var arma = armasActivas[i];
                var calc = this.calcularDanoArma(arma);
                var danoBase;
                
                // En modo defensa, intentar usar bloqueo, si no existe usar RES
                if(this.modoCombate === 'defensa'){
                    if(calc.calculado && calc.valor > 0){
                        danoBase = calc.valor;
                    } else if(arma.bloqueo && !calc.calculado){
                        // Si hay bloqueo pero no es calculado, intentar parsear números
                        var nums = arma.bloqueo.match(/\b\d+\b/g);
                        if(nums && nums.length > 0){
                            danoBase = parseInt(nums[0], 10);
                        } else {
                            danoBase = this.obtenerAtributoFinal('RES');
                        }
                    } else {
                        danoBase = this.obtenerAtributoFinal('RES');
                    }
                } else {
                    // Modo ataque (comportamiento original)
                    if(calc.calculado && calc.valor > 0){
                        danoBase = calc.valor;
                    } else if(arma.dano && !calc.calculado){
                        // Si hay daño pero no es calculado, intentar parsear números
                        var nums = arma.dano.match(/\b\d+\b/g);
                        if(nums && nums.length > 0){
                            danoBase = parseInt(nums[0], 10);
                        } else {
                            danoBase = this.obtenerAtributoFinal('FUE');
                        }
                    } else {
                        danoBase = this.obtenerAtributoFinal('FUE');
                    }
                }
                
                danoTotal += danoBase * multiplicador;
                
                var tipoDano = this.obtenerTipoDanoArma(arma);
                if(tiposDano.indexOf(tipoDano) === -1) tiposDano.push(tipoDano);
            }
            
            // Aplicar Math.floor al total final para mantener la precisión
            danoTotal = Math.floor(danoTotal);
            
            dano.textContent = danoTotal;
              // Mostrar los tipos de daño
            if(this.modoCombate === 'defensa'){
                tipo.textContent = 'DAÑO MITIGADO';
            } else {
                var prefijo = 'DE DAÑO ';
                var textoTipo = prefijo;
                if(tiposDano.length === 1){
                    textoTipo += tiposDano[0].toUpperCase();
                } else {
                    textoTipo += tiposDano.join('/').toUpperCase();
                }
                tipo.textContent = textoTipo;
            }
        }
        
        this.actualizarDanoTotal();
    },
    
    obtenerTipoDanoArma:function(arma){
        if(!arma)return'contundente';
        if(arma.dano){
            var texto=arma.dano.toLowerCase();
            if(texto.indexOf('cortante')!==-1)return'cortante';
            if(texto.indexOf('perforante')!==-1)return'perforante';
            if(texto.indexOf('contundente')!==-1)return'contundente';
            if(texto.indexOf('sónico')!==-1)return'sónico';
        }
        return'contundente';
    },
    
    cargarTecnicas:function(){
        var sel=document.getElementById('tecnica-seleccionada');
        if(!sel)return;
        sel.innerHTML='<option value="">Sin técnica</option>';
        var tecnicas=document.querySelectorAll('.tecnica_spoiler');
        if(!tecnicas.length)return;
        var found=[];
        for(var i=0;i<tecnicas.length;i++){
            var datos=this.extraerDatosTecnica(tecnicas[i]);
            if(datos && datos.nombre){
                found.push({elemento:tecnicas[i],datos:datos,indice:i});
            }
        }
        found.sort(function(a,b){return a.datos.nombre.localeCompare(b.datos.nombre)});
        for(var j=0;j<found.length;j++){
            var opt=document.createElement('option');
            opt.value=found[j].indice;
            opt.textContent=found[j].datos.nombre+' (Tier '+found[j].datos.tier+')';
            sel.appendChild(opt);
        }
    },
    
    seleccionarTecnica:function(indice){
        var info=document.getElementById('tecnica-info');
        if(!indice||!info){
            if(info)info.style.display='none';
            this.tecnicaSeleccionada=null;
            this.actualizarDanoTecnica();
            return;
        }
        
        var tecnicas = document.querySelectorAll('.tecnica_spoiler');
        var el=tecnicas[parseInt(indice,10)];
        if(!el)return;

        var datos=this.extraerDatosTecnica(el);
        if(datos){
            this.tecnicaSeleccionada={elemento:el,datos:datos};
            var nomEl=document.getElementById('tecnica-nombre-display');
            var tipoEl=document.getElementById('tecnica-tipo-display');
            if(nomEl)nomEl.textContent=datos.nombre;
            if(tipoEl){
                var texto='Tier '+datos.tier;
                if(datos.rama)texto+=' - '+datos.rama;
                if(datos.tipoCompleto)texto+=' ('+datos.tipoCompleto+')';
                tipoEl.textContent=texto;
            }
            info.style.display='block';
            this.actualizarDanoTecnica();
        }
    },
    
    extraerDatosTecnica:function(el){
        var nomEl=el.querySelector('.tecnica_spoiler_button');
        var nombre=nomEl?(nomEl.textContent||'').trim():'';
        if(!nombre){
            var campos=el.querySelectorAll('.tecnica_field');
            if(campos.length>0)nombre=(campos[0].textContent||'').trim();
        }
        var campos=el.querySelectorAll('.tecnica_field');
        if(campos.length<4){
            return nombre?{nombre:nombre,rama:'',tipoCompleto:'',tier:0,esTecnica:true,esOfensiva:false,esDefensiva:false,esUtilidad:false,esAmbiental:false,esActiva:false,esMantenida:false,fecha:''}:null;
        }
        var rama=(campos[1].textContent||'').trim();
        var tipoCompleto=(campos[2].textContent||'').trim().toLowerCase();
        var tierTexto=(campos[3].textContent||'').trim();
        var tierMatch=tierTexto.match(/tier\s*(\d+)/i);
        var tier=tierMatch?parseInt(tierMatch[1],10):0;
        
        // Extraer fecha si existe (campo 5)
        var fecha = campos.length > 4 ? (campos[4].textContent || '').trim() : '';
        
        // Verificar si es defensiva por tipo o por efecto de bloqueo básico
        var esDefensivaPorTipo = tipoCompleto.indexOf('defensiva')!==-1;
        var esDefensivaPorBloqueo = false;
        
        // Comprobar si el efecto comienza con [Bloqueo Básico]
        var efectoEl = el.querySelector('.tecnica_efecto');
        if(efectoEl){
            var efectoTexto = (efectoEl.textContent || efectoEl.innerHTML || '').trim();
            esDefensivaPorBloqueo = efectoTexto.indexOf('[Bloqueo Básico]') === 0;
        }
        
        var esDefensiva = esDefensivaPorTipo || esDefensivaPorBloqueo;
        
        return{
            nombre:nombre,
            rama:rama,
            tipoCompleto:tipoCompleto,
            tier:tier,
            fecha:fecha,
            esTecnica:tipoCompleto.indexOf('pasiva')===-1,
            esOfensiva:tipoCompleto.indexOf('ofensiva')!==-1,
            esDefensiva:esDefensiva,
            esUtilidad:tipoCompleto.indexOf('utilidad')!==-1,
            esAmbiental:tipoCompleto.indexOf('ambiental')!==-1,
            esActiva:tipoCompleto.indexOf('activa')!==-1,
            esMantenida:tipoCompleto.indexOf('mantenida')!==-1
        };
    },
    
    extraerDanoTecnica:function(el){
        var efectoEl=el.querySelector('.tecnica_efecto');
        if(!efectoEl)return null;
        
        var info={formula:null,tipo:'especial',valorBase:0};
        
        var tooltips=efectoEl.querySelectorAll('.tec-tooltip');
        
        for(var i=0;i<tooltips.length;i++){
            var tt=tooltips[i].querySelector('.stat-tooltiptext');
            if(tt){
                var formula=tt.textContent||'';
                if(this.procesarFormula(formula, info, tooltips[i])) break;
            }
            
            var tt2=tooltips[i].querySelector('.tec-tooltiptext');
            if(tt2){
                var formula=tt2.textContent||'';
                if(this.procesarFormula(formula, info, tooltips[i])) break;
            }
            
            var directText = tooltips[i].textContent || '';
            if(this.procesarFormula(directText, info, tooltips[i])) break;
        }
        
        if(!info.formula){
            var todoElTexto = efectoEl.textContent || '';
            this.procesarFormula(todoElTexto, info, efectoEl);
        }
        
        var texto=(efectoEl.innerHTML||efectoEl.textContent||'').toLowerCase();
        if(texto.indexOf('daño cortante')!==-1)info.tipo='cortante';
        else if(texto.indexOf('daño perforante')!==-1)info.tipo='perforante';
        else if(texto.indexOf('daño contundente')!==-1)info.tipo='contundente';
        
        return info;
    },
    
    procesarFormula:function(texto, info, elemento){
        if(!texto) return false;
        
        var match1 = texto.match(/\[\d+(?:,\d+)?xNivel\]/);
        if(match1){
            info.formula = texto;
            var strong = elemento.querySelector('strong');
            if(strong){
                info.valorBase = parseFloat((strong.textContent||'0').replace(',','.'))||0;
            }
            return true;
        }
        
        var match2 = texto.match(/\[[A-Z]{3}x[\d,\.]+\]/);
        if(match2){
            info.formula = texto;
            var strong = elemento.querySelector('strong');
            if(strong){
                info.valorBase = parseFloat((strong.textContent||'0').replace(',','.'))||0;
            }
            return true;
        }
        
        return false;
    },
    
    calcularDanoTecnicaCompleto:function(el){
        var info=this.extraerDanoTecnica(el);
        if(!info||!info.formula)return{texto:'Sin daño',valor:0,calculado:false,tipo:'especial'};
        
        var nivel = this.obtenerNivel();
        var total = 0;
        var calc = info.formula;
        var hasCalc = false;
        
        var patronNivel = /\[(\d+(?:,\d+)?)xNivel\]/g;
        var match;
        
        while((match = patronNivel.exec(info.formula)) !== null){
            var multiplicador = parseFloat(match[1].replace(',', '.'));
            if(!isNaN(multiplicador) && nivel > 0){
                var val = Math.floor(multiplicador * nivel);
                total += val;
                hasCalc = true;
                calc = calc.replace(match[0], val.toString());
            }
        }
        
        var nums = calc.match(/\b\d+\b/g);
        if(nums && !hasCalc){
            for(var k = 0; k < nums.length; k++){
                var num = parseInt(nums[k], 10);
                if(!isNaN(num)){
                    total += num;
                }
            }
        }
        
        return {texto:calc, valor:hasCalc ? total : info.valorBase, calculado:hasCalc, tipo:info.tipo};
    },
    
    actualizarDanoTecnica:function(){
        var valorEl=document.getElementById('dano-tecnica-valor');
        var descEl=document.getElementById('dano-tecnica-descripcion');
        if(!valorEl||!descEl)return;
        if(!this.tecnicaSeleccionada){
            valorEl.textContent='0';
            descEl.textContent='SELECCIONE TÉCNICA';
            this.actualizarDanoTotal();
            return;
        }
        
        var calc=this.calcularDanoTecnicaCompleto(this.tecnicaSeleccionada.elemento);
        
        // Verificar si la técnica es defensiva
        if(this.tecnicaSeleccionada.datos.esDefensiva){
            valorEl.textContent=calc.valor || 0;
            descEl.textContent='DE DAÑO MITIGADO';
        }else if(calc.calculado||calc.valor>0){
            valorEl.textContent=calc.valor;
            descEl.textContent='DE DAÑO '+calc.tipo.toUpperCase();
        }else{
            valorEl.textContent='0';
            descEl.textContent='TÉCNICA SIN DAÑO';
        }
        this.actualizarDanoTotal();
    },
    
    initFiltros:function(){
        var tecnicas=document.querySelectorAll('.tecnica_spoiler');
        this.todasLasTecnicas=[];
        for(var i=0;i<tecnicas.length;i++){
            var datos=this.extraerDatosTecnica(tecnicas[i]);
            this.todasLasTecnicas.push({elemento:tecnicas[i],datos:datos});
        }
    },
    
    filtrarTier:function(tier){
        var btn=document.getElementById('btn-t'+tier);
        if(!btn)return;
        var idx=this.filtroActual.tiers.indexOf(tier);
        if(idx>-1){
            this.filtroActual.tiers.splice(idx,1);
            btn.style.backgroundColor='#666666';
        }else{
            this.filtroActual.tiers.push(tier);
            btn.style.backgroundColor='#000000';
        }
        this.aplicarFiltros();
    },
    
    filtrarCategoria:function(categoria){
        var btn=document.getElementById('btn-'+categoria);
        if(!btn)return;
        var idx=this.filtroActual.categorias.indexOf(categoria);
        if(idx>-1){
            this.filtroActual.categorias.splice(idx,1);
            btn.style.backgroundColor='#666666';
        }else{
            this.filtroActual.categorias.push(categoria);
            btn.style.backgroundColor='#000000';
        }
        this.aplicarFiltros();
    },
    
    filtrarPorFecha:function(fechaInput){
        this.filtroActual.fecha = fechaInput;
        this.aplicarFiltros();
    },
    
    parsearFecha:function(fechaTexto){
        if(!fechaTexto) return null;
        
        // Intentar parsear formatos: d/m/yyyy, dd/mm/yyyy, d/m/yy, dd/mm/yy
        var partes = fechaTexto.split('/');
        if(partes.length === 3){
            var dia = parseInt(partes[0], 10);
            var mes = parseInt(partes[1], 10) - 1; // JavaScript usa meses base 0
            var ano = parseInt(partes[2], 10);
            
            // Si el año es de 2 dígitos, asumir 20xx
            if(ano < 100) ano += 2000;
            
            var fecha = new Date(ano, mes, dia);
            // Verificar si la fecha es válida
            if(fecha.getFullYear() === ano && fecha.getMonth() === mes && fecha.getDate() === dia){
                return fecha;
            }
        }
        
        return null;
    },
    
    aplicarFiltros:function(){
        if(!this.todasLasTecnicas.length)this.initFiltros();
        var visibles=0;
        for(var i=0;i<this.todasLasTecnicas.length;i++){
            var el=this.todasLasTecnicas[i].elemento;
            var datos=this.todasLasTecnicas[i].datos;
            var mostrar = this.evaluarFiltros(datos);
            el.style.display=mostrar?'block':'none';
            if(mostrar)visibles++;
        }
        this.mostrarSinResultados(visibles===0);
    },
    
    evaluarFiltros:function(datos){
        if(!datos) return true;
        
        if(this.filtroActual.tiers.length>0){
            var tierOk=this.filtroActual.tiers.indexOf(datos.tier)!==-1;
            if(!tierOk)return false;
        }
        
        if(this.filtroActual.categorias.length>0){
            var catOk=false;
            for(var l=0;l<this.filtroActual.categorias.length;l++){
                var cat=this.filtroActual.categorias[l];
                switch(cat){
                    case'pasiva':if(!datos.esTecnica)catOk=true;break;
                    case'activa':if(datos.esActiva)catOk=true;break;
                    case'mantenida':if(datos.esMantenida)catOk=true;break;
                    case'ofensiva':if(datos.esOfensiva)catOk=true;break;
                    case'defensiva':if(datos.esDefensiva)catOk=true;break;
                }
                if(catOk)break;
            }
            if(!catOk)return false;
        }
        
        // Filtro por fecha: mostrar solo técnicas obtenidas antes de la fecha indicada
        if(this.filtroActual.fecha){
            var fechaTecnica = this.parsearFecha(datos.fecha);
            var fechaFiltro = this.parsearFecha(this.filtroActual.fecha);
            
            if(fechaFiltro && fechaTecnica){
                if(fechaTecnica >= fechaFiltro){
                    return false; // Ocultar si la técnica es de la fecha filtro o posterior
                }
            } else if(fechaFiltro && !fechaTecnica){
                return false; // Si hay filtro de fecha pero la técnica no tiene fecha, ocultarla
            }
        }
        
        return true;
    },
    
    mostrarSinResultados:function(mostrar){
        var msg=document.getElementById('mensaje-sin-resultados');
        if(mostrar){
            if(!msg){
                msg=document.createElement('div');
                msg.id='mensaje-sin-resultados';
                msg.style.cssText='text-align:center;padding:40px;font-family:moonGetHeavy;font-size:16px;color:#666;';
                msg.textContent='No se encontraron técnicas con los filtros seleccionados';
                var caja=document.getElementById('tecnicas-caja');
                if(caja)caja.appendChild(msg);
            }
            msg.style.display='block';
        }else{
            if(msg)msg.style.display='none';
        }
    },
    
    actualizarDanoTotal:function(){
        var valorEl=document.getElementById('dano-total-valor');
        var descEl=document.getElementById('dano-total-descripcion');
        if(!valorEl||!descEl)return;
        
        var golpeBasico=parseInt(document.getElementById('golpe-basico-dano').textContent||0);
        var danoTecnica=parseInt(document.getElementById('dano-tecnica-valor').textContent||0);
        
        var total;
        
        // Si estamos en modo defensa
        if(this.modoCombate === 'defensa'){
            total=golpeBasico;
            if(this.tecnicaSeleccionada && this.tecnicaSeleccionada.datos.esDefensiva){
                total+=danoTecnica; // En defensa, sumar técnicas defensivas
                descEl.textContent='BLOQUEO + TÉCNICA';
            } else if(danoTecnica > 0){
                descEl.textContent='BLOQUEO (TÉCNICA OFENSIVA)';
            } else {
                descEl.textContent='SOLO BLOQUEO';
            }
        } else {
            // Modo ataque (comportamiento original)
            if(this.tecnicaSeleccionada && this.tecnicaSeleccionada.datos.esDefensiva){
                total=golpeBasico;
                descEl.textContent='(TÉCNICA DEFENSIVA)';
            }else{
                total=golpeBasico+danoTecnica;
                if(danoTecnica>0){
                    descEl.textContent='DAÑO COMBINADO';
                }else{
                    descEl.textContent='SOLO GOLPE BÁSICO';
                }
            }
        }
        
        valorEl.textContent=total;
    },
    
    cambiarModoCombate:function(modo){
        this.modoCombate = modo;
        
        // Actualizar elementos visuales si es necesario
        var golpeBasicoTipo = document.getElementById('golpe-basico-tipo');
        if(golpeBasicoTipo){
            if(modo === 'defensa'){
                // En modo defensa, actualizar el texto para indicar que es bloqueo
                var textoActual = golpeBasicoTipo.textContent;
                if(!textoActual.includes('BLOQUEO')){
                    golpeBasicoTipo.textContent = textoActual.replace('DAÑO', 'BLOQUEO');
                }
            } else {
                // En modo ataque, asegurar que dice daño
                var textoActual = golpeBasicoTipo.textContent;
                if(textoActual.includes('BLOQUEO')){
                    golpeBasicoTipo.textContent = textoActual.replace('BLOQUEO', 'DAÑO');
                }
            }
        }
        
        // Actualizar información de todas las armas para mostrar daño/bloqueo correctamente
        for(var i = 0; i < 3; i++){
            if(this.armasSeleccionadas[i]){
                this.actualizarInfoArma(i);
            }
        }
        
        // Recalcular todo
        this.actualizarGolpeBasico();
        this.actualizarDanoTecnica();
        this.actualizarDanoTotal();
    }
};

TF.init();
</script>
