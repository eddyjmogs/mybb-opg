<html>

<head>
  <title>Modificar ficha</title>
  {$headerinclude}
</head>

<body>
  {$header}
  <div>
    <if $fid=='' then>
      User ID:<br><input type="number" name="fid" required id='fid'><br><br>
      Accion:<br>
      <select id="accion">
	
		<option value="Modificar faccion">Modificar facción</option>
		<option value="Modificar raza">Modificar raza</option>
		<option value="Modificar karma positivo">Modificar karma positivo</option>
		<option value="Modificar karma negativo">Modificar karma negativo</option>
      </select><br><br>
      <button onclick=onClickAccion()>Apachúrrame papi</button>
      <br><br>
    </if>
	<if $fid !='' && $accion != '' then>
      <form method="post" action="/sg/admin/modificar_ficha.php" name="modificar_ficha" id="modificar_ficha">
        <div style="display: none">
           <input type="text" id="fid" name="ficha_id" value="{$fid}">
		   <input type="text" id="nombre" name="nombre" value="{$ficha['nombre']}">
        </div>
        User ID:<br><input type="number" required id='fid' value={$fid} disabled><br><br>
        Accion:<br>
        <select disabled>
          <option value="{$accion}">{$accion}</option>
        </select><br>
        <p>Nombre de cuenta: <a href="/sg/ficha.php?action=profile&uid={$fid}" target="_blank">{$ficha['nombre']}</a></p>
        
		<if $accion == 'Modificar faccion' then>
			Facción:<br>
			<select name="faccion" id="faccion">
			  <option value="pirata">Pirata</option>
			  <option value="marine">Marine</option>
			  <option value="cipher_pol">Cipher Pol</option>
			  <option value="revolucionario">Revolucionario</option>
			  <option value="civil">Civil</option>
			  <option value="cazarrecompensas">Cazarrecompensas</option>
			</select><br>
		</if>
		  
		<if $accion == 'Modificar raza' then>
			Maestría primaria:<br>
			<select name="raza" id="raza">
				<option value="SEN">Senjutsu</option>
				<option value="FUI">Fūinjutsu</option>
				<option value="KEK">Kekkaijutsu</option>
			</select><br><br>
		</if>
		
		
		  
        Miembro de Staff: <input type="text" name="staff" required><br>
        Razon: <input type="text" name="razon" required><br><br>
        <input type="submit" value="Guardar">
      </form>
    </if>
  </div>
  {$footer}
</body>
<if $log_var !='' then><script>alert(`{$log_var}`);</script></if>
{$reload_script}
<script>
  function onClickAccion() {
    const fid = document.getElementById('fid').value;
    const accion = document.getElementById('accion').value;
    if (fid && accion) {
      window.location.href = window.location.pathname + '?fid=' + fid + '&accion=' + accion;
    }
  }
</script>

</html>
