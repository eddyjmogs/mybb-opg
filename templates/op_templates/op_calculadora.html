<html>
<head>
  <title>Calculadora de Stats</title>
  {$headerinclude}
  <style>
    .calculadora-container {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      border-radius: 20px;
      padding: 40px;
      margin: 20px auto;
      max-width: 1200px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .calculadora-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .titulo-principal {
      text-align: center;
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    /* Centrar el último elemento cuando es impar */
    .stat-item:nth-child(7) {
      grid-column: 1 / -1;
      width: 280px;
      margin: 0 auto;
      justify-self: center;
    }

    .stat-item {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 25px;
      text-align: center;
      transition: all 0.4s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .stat-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      filter: blur(3px) brightness(0.7);
      opacity: 0.3;
      z-index: -1;
      transition: all 0.3s ease;
    }

    .stat-item:hover::before {
      filter: blur(0px) brightness(0.5);
      opacity: 0.5;
    }

    /* Fondos específicos para cada estadística */
    .stat-item:nth-child(1)::before {
      background-image: url('https://i.pinimg.com/736x/e7/d2/6f/e7d26f722a10110cdc415d6bedf57e93.jpg');
    }

    .stat-item:nth-child(2)::before {
      background-image: url('https://i.pinimg.com/736x/04/83/c3/0483c305aa8476cddfc539099f1182f6.jpg');
    }

    .stat-item:nth-child(3)::before {
      background-image: url('https://i.pinimg.com/736x/d0/29/17/d029173962c524c1e3dafee6b2f83f91.jpg');
    }

    .stat-item:nth-child(4)::before {
      background-image: url('https://i.pinimg.com/736x/5b/b0/9a/5bb09ac8c0ef2adfad8397dc5f6ee49c.jpg');
    }

    .stat-item:nth-child(5)::before {
      background-image: url('https://i.pinimg.com/736x/4d/f6/0f/4df60f9174dd0aec28a86f432c733fe8.jpg');
    }

    .stat-item:nth-child(6)::before {
      background-image: url('https://i.pinimg.com/736x/97/3c/82/973c82c656d3c21fdc9c3c2e65b2aa7a.jpg');
    }

    .stat-item:nth-child(7)::before {
      background-image: url('https://i.pinimg.com/736x/97/0c/60/970c602b2b49e4c20246ac4257aec305.jpg');
    }

    .stat-item:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    }

    .stat-label {
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 15px;
      font-size: 20px;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      position: relative;
      z-index: 1;
    }

    .stat-input {
      width: 90px;
      height: 40px;
      border: 3px solid #3498db;
      border-radius: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(5px);
      position: relative;
      z-index: 1;
    }

    .stat-input:focus {
      outline: none;
      border-color: #e74c3c;
      box-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
      transform: scale(1.08);
      background: rgba(255,255,255,1);
    }

    .results-section {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 35px;
      margin: 30px 0;
      position: relative;
      z-index: 1;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .result-item {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      padding: 25px 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      animation: pulse 2s infinite alternate;
      position: relative;
      overflow: hidden;
    }

    .result-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.03); }
    }

    .result-label {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    .result-value {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 12px;
      width: 100px;
      text-align: center;
      font-weight: bold;
      color: #fff;
      font-size: 18px;
      backdrop-filter: blur(5px);
    }

    .nivel-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .nivel-item {
      background: linear-gradient(135deg, #8e44ad, #9b59b6);
      color: white;
      padding: 25px 35px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }

    .nivel-item::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
      border-radius: 20px;
      z-index: -1;
      animation: rainbow 3s linear infinite;
    }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .nivel-input {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      padding: 12px;
      width: 80px;
      text-align: center;
      font-weight: bold;
      color: #fff;
      font-size: 20px;
      backdrop-filter: blur(5px);
    }

    .stats-total {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      padding: 25px 35px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      position: relative;
    }

    .stats-total::before {
      content: '⚡';
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 24px;
      animation: bounce 1s infinite;
    }

    .reset-button {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      border: none;
      padding: 18px 40px;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin: 30px auto;
      display: block;
      position: relative;
      overflow: hidden;
    }

    .reset-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
    }

    .reset-button:hover::before {
      width: 300px;
      height: 300px;
    }

    .reset-button:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .pirate-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(45deg, #ff6b35, #f7941d);
      border-radius: 50%;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: bounce 2s infinite;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .pirate-icon::before {
      content: '⚓';
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-15px); }
      60% { transform: translateY(-8px); }
    }

    .fondo-blanco {
      background: transparent;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .calculadora-container {
        margin: 10px;
        padding: 25px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .stat-item {
        min-height: 120px;
        padding: 25px 20px;
      }
      
      .stat-label {
        font-size: 18px;
      }
      
      .stat-input {
        width: 80px;
        height: 45px;
        font-size: 20px;
      }
      
      .nivel-section {
        flex-direction: column;
        gap: 20px;
      }
      
      .titulo-principal {
        font-size: 26px;
      }
    }

    @media (max-width: 480px) {
      .calculadora-container {
        padding: 20px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .stat-item {
        min-height: 100px;
        padding: 20px 15px;
      }
      
      .results-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  {$header}
  <div class="fondo-blanco">
    <div class="calculadora-container">
      <div class="pirate-icon"></div>
      <div class="titulo-principal">⚔️ Calculadora de Estadísticas ⚔️</div>
      
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">Fuerza</div>
          <input class="stat-input" onchange="modifyAttributes(0);" type="number" id="fuerza" min="0" value="0">
        </div>
        <div class="stat-item">
          <div class="stat-label">Resistencia</div>
          <input class="stat-input" onchange="modifyAttributes(0);" type="number" id="resistencia" min="0" value="0">
        </div>
        <div class="stat-item">
          <div class="stat-label">Destreza</div>
          <input class="stat-input" onchange="modifyAttributes(0);" type="number" id="destreza" min="0" value="0">
        </div>
        <div class="stat-item">
          <div class="stat-label">Agilidad</div>
          <input class="stat-input" onchange="modifyAttributes(0);" type="number" id="agilidad" min="0" value="0">
        </div>
        <div class="stat-item">
          <div class="stat-label">Puntería</div>
          <input class="stat-input" onchange="modifyAttributes(0);" type="number" id="punteria" min="0" value="0">
        </div>
        <div class="stat-item">
          <div class="stat-label">Reflejos</div>
          <input class="stat-input" onchange="modifyAttributes(0);" type="number" id="reflejos" min="0" value="0">
        </div>
        <div class="stat-item">
          <div class="stat-label">Voluntad</div>
          <input class="stat-input" onchange="modifyAttributes(0);" type="number" id="voluntad" min="0" value="0">
        </div>
      </div>

      <div class="results-section">
        <div class="results-grid">
          <div class="result-item">
            <div class="result-label">Vitalidad</div>
            <input class="result-value" type="text" value="0" id="vitalidad" name="vitalidad" readonly="">
          </div>
          <div class="result-item">
            <div class="result-label">Energía</div>
            <input class="result-value" type="text" value="0" id="energia" name="energia" readonly="">
          </div>
          <div class="result-item">
            <div class="result-label">Haki</div>
            <input class="result-value" type="text" value="0" id="haki" name="haki" readonly="">
          </div>
        </div>
      </div>

      <div class="nivel-section">
        <div class="nivel-item">
          <div class="result-label">Nivel</div>
          <input class="nivel-input" onchange="modifyAttributes(this.value);" type="text" id="nivel" name="nivel" value="1">
        </div>
        <div class="stats-total">
          <div class="result-label">Stats Totales</div>
          <input class="nivel-input" type="text" readonly="" id="estadisticas" value="0">
        </div>
      </div>

      <button class="reset-button" onclick="resetStats()">Resetear Calculadora</button>
    </div>
  </div>

  {$footer}
</body>

<script>
// ...existing code...
/* Función para calcular vida del personaje */
function calcVitalidad(fuerza, resistencia, destreza, agilidad, punteria, reflejos, voluntad) {
  return ((fuerza * 6) + (resistencia * 15) + (destreza * 4) + (agilidad * 3) + (punteria * 2) + (reflejos * 1) + (voluntad * 1));
}
  
function calcEnergia(fuerza, resistencia, destreza, agilidad, punteria, reflejos, voluntad) {
  return (fuerza * 2) + (resistencia * 4) + (destreza * 4) + (agilidad * 5) + (punteria * 5) + (reflejos * 1) + (voluntad * 1);
}

function calcHaki(voluntad) {
  return (voluntad * 10);
}

function modifyAttributes() {
  let statsSum = ((parseInt(fuerza.value) + parseInt(resistencia.value) + parseInt(destreza.value) + parseInt(agilidad.value) + parseInt(punteria.value) + parseInt(reflejos.value) + parseInt(voluntad.value)));
  
  if (statsSum < 60) { nivel.value = 1; }  
  if (statsSum >= 70) { nivel.value = 2; }
  if (statsSum >= 80) { nivel.value = 3; }
  if (statsSum >= 90) { nivel.value = 4; }
  if (statsSum >= 100) { nivel.value = 5; }
  if (statsSum >= 110) { nivel.value = 6; }
  if (statsSum >= 120) { nivel.value = 7; }
  if (statsSum >= 130) { nivel.value = 8; }
  if (statsSum >= 140) { nivel.value = 9; }
  if (statsSum >= 160) { nivel.value = 10; }
  if (statsSum >= 170) { nivel.value = 11; }
  if (statsSum >= 180) { nivel.value = 12; }
  if (statsSum >= 190) { nivel.value = 13; }
  if (statsSum >= 200) { nivel.value = 14; }
  if (statsSum >= 210) { nivel.value = 15; }
  if (statsSum >= 220) { nivel.value = 16; }
  if (statsSum >= 230) { nivel.value = 17; }
  if (statsSum >= 240) { nivel.value = 18; }
  if (statsSum >= 250) { nivel.value = 19; }
  if (statsSum >= 270) { nivel.value = 20; }
  if (statsSum >= 280) { nivel.value = 21; }
  if (statsSum >= 290) { nivel.value = 22; }
  if (statsSum >= 300) { nivel.value = 23; }
  if (statsSum >= 310) { nivel.value = 24; }
  if (statsSum >= 320) { nivel.value = 25; }
  
    if (statsSum >= 330) { nivel.value = 26; }
    if (statsSum >= 340) { nivel.value = 27; }
    if (statsSum >= 350) { nivel.value = 28; }
    if (statsSum >= 360) { nivel.value = 29; }
    if (statsSum >= 380) { nivel.value = 30; }
    if (statsSum >= 390) { nivel.value = 31; }
    if (statsSum >= 400) { nivel.value = 32; }
    if (statsSum >= 410) { nivel.value = 33; }
    if (statsSum >= 420) { nivel.value = 34; }
    if (statsSum >= 430) { nivel.value = 35; }
    if (statsSum >= 440) { nivel.value = 36; }
    if (statsSum >= 450) { nivel.value = 37; }
    if (statsSum >= 460) { nivel.value = 38; }
    if (statsSum >= 470) { nivel.value = 39; }
    if (statsSum >= 490) { nivel.value = 40; }
    if (statsSum >= 500) { nivel.value = 41; }
    if (statsSum >= 510) { nivel.value = 42; }
    if (statsSum >= 520) { nivel.value = 43; }
    if (statsSum >= 530) { nivel.value = 44; }
    if (statsSum >= 540) { nivel.value = 45; }
    if (statsSum >= 550) { nivel.value = 46; }
    if (statsSum >= 560) { nivel.value = 47; }
    if (statsSum >= 570) { nivel.value = 48; }
    if (statsSum >= 580) { nivel.value = 49; }
    if (statsSum >= 600) { nivel.value = 50; }
    
  vitalidad.value = calcVitalidad(parseInt(fuerza.value), parseInt(resistencia.value), parseInt(destreza.value), parseInt(agilidad.value), parseInt(punteria.value), parseInt(reflejos.value), parseInt(voluntad.value));
  energia.value = calcEnergia(parseInt(fuerza.value), parseInt(resistencia.value), parseInt(destreza.value), parseInt(agilidad.value), parseInt(punteria.value), parseInt(reflejos.value), parseInt(voluntad.value));
  haki.value = calcHaki(parseInt(voluntad.value));

  estadisticas.value = (parseInt(fuerza.value) + parseInt(resistencia.value) + parseInt(destreza.value) + parseInt(agilidad.value) + parseInt(punteria.value) + parseInt(reflejos.value) + parseInt(voluntad.value));
}

let fuerza = document.getElementById('fuerza');
let resistencia = document.getElementById('resistencia');
let destreza = document.getElementById('destreza');
let agilidad = document.getElementById('agilidad');
let punteria = document.getElementById('punteria');
let reflejos = document.getElementById('reflejos');
let voluntad = document.getElementById('voluntad');

let vitalidad = document.getElementById('vitalidad');
let energia = document.getElementById('energia');
let haki = document.getElementById('haki');

let nivel = document.getElementById('nivel');
let estadisticas = document.getElementById('estadisticas');

function resetStats() {
  fuerza.value = 0;
  resistencia.value = 0;
  destreza.value = 0;
  agilidad.value = 0;
  punteria.value = 0;
  reflejos.value = 0;
  voluntad.value = 0;

  vitalidad.value = 0;
  energia.value = 0;
  haki.value = 0;

  nivel.value = 1;
  estadisticas.value = 0;
  modifyAttributes();
}
</script>

</html>
