	<style>
	/* The Modal (background) */
	.modal {
	  display: none; /* Hidden by default */
	  position: fixed; /* Stay in place */
	  z-index: 1; /* Sit on top */
	  left: 0;
	  top: 0;
	  width: 100%; /* Full width */
	  height: 100%; /* Full height */
	  overflow: auto; /* Enable scroll if needed */
	  background-color: rgb(0,0,0); /* Fallback color */
	  background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
	}

	/* Modal Content */
	.modal-content {
        position: relative;
        background-image: url(/images/op/uploads/LibroNpcs_One_Piece_Gaiden_Foro_Rol.png);
        margin: 0 auto 0 calc(50% - 600px + 20px); /* Ajustado para desplazar 20px a la derecha */
        padding: 0;
        width: 1200px; /* Aumentado de 1200px (5% más) */
        -webkit-animation-name: animatetop;
        -webkit-animation-duration: 0.4s;
        animation-name: animatetop;
        animation-duration: 0.4s;
        height: 644px; /* Aumentado de 644px (5% más) */

        background-size: 100% 100%; /* Para asegurar que la imagen de fondo se ajuste correctamente */
		background-position: -0px 0; /* Desplaza la imagen 20px hacia la izquierda */
	}

	/* Add Animation */
	@-webkit-keyframes animatetop {
	  from {top:-300px; opacity:0} 
	  to {top:0; opacity:1}

	  from {top:-300px; opacity:0}
