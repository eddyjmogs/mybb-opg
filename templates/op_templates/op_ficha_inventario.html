	if (berries.length > 6) {

	} else if (berries.length > 3) {
		return berries.slice(0, -3) + ' K';
	} else {

	}
}

function openInventarioModal(edit_objeto_id) {
	<if $is_owner || $g_is_staff then>
	$('#myModal').html(`

function cambiarObjeto(edit_objeto_id) { 
	let customInventario1 = $('#customInventario1').val();
	let customInventario2 = $('#customInventario2').val();
	
	if (customInventario1 && customInventario2) {
		if (confirm('Estás a punto de editar este objeto para agregarle un nombre y una imagen. Esto solo puedes hacerlo una vez por objeto. ¿Quieres seguir adelante?')) {
			 $.post("/op/inventario.php", { edit_objeto_id: edit_objeto_id, edit_nombre: customInventario1, edit_imagen: customInventario2 }, function( data ) { location.reload(); });
		}
	}
}

// También necesitamos modificar la función abrirSelectorEquipamiento para bolsas y ropa:
function abrirSelectorEquipamiento(tipo) {
    tipoEquipamientoSeleccionado = tipo;
    var modal = document.getElementById('modalSelectorEquipamiento');
    var titulo = document.getElementById('tituloSelectorEquipamiento');
    var lista = document.getElementById('listaEquipamientoDisponible');
    
    titulo.textContent = 'SELECCIONAR ' + tipo.toUpperCase();
    lista.innerHTML = '';
    
    // Obtener IDs de objetos ya equipados
    var objetosEquipadosIds = [];
    Object.values(objetosEquipados.espacios).forEach(function(equipado) {
        objetosEquipadosIds.push(equipado.objetoId);
    });
    
    // También incluir objetos equipados en bolsa y ropa (excepto el tipo actual)
    if (objetosEquipados.bolsa && tipo !== 'equipajes') {
        objetosEquipadosIds.push(objetosEquipados.bolsa);
    }
    if (objetosEquipados.ropa && tipo !== 'ropa y armaduras') {
        objetosEquipadosIds.push(objetosEquipados.ropa);
    }
    
    objetos_array_json.forEach(function(objetoId) {
        var objeto = objetos_json[objetoId][0];
        var subcategoria = objeto.subcategoria.toLowerCase();
        
        // Permitir ESPECIAL MT en el slot de ropa además de ropa y armaduras
        var puedeEquipar = false;
        if (tipo === 'ropa y armaduras') {
            puedeEquipar = (subcategoria === tipo || subcategoria === 'especial mt');
        } else {
            puedeEquipar = (subcategoria === tipo);
        }
        
        if (puedeEquipar) {
            var subcategoria_formatted = subcategoria.split(' ').join('_');
            var imagen_id = objeto.imagen_id;
            
            var imagen_nombre = subcategoria_formatted + "_" + imagen_id + "_One_Piece_Gaiden_Foro_Rol.jpg";
            if (subcategoria_formatted === 'cofres' || subcategoria_formatted === 'akuma_no_mi' || objetoId === 'EANM001' || 
                objetoId === 'LLST001' || objetoId === 'THR001' || subcategoria_formatted === 'materiales' || 
                subcategoria_formatted === 'tecnicas' || objetoId === 'EPA001' || objetoId === 'KMP001' || 
                objetoId === 'VCD001' || objetoId === 'VCZ001' || subcategoria_formatted === 'documentos' || 
                subcategoria_formatted === 'recetas') {
                imagen_nombre = subcategoria_formatted + "_" + imagen_id + "_One_Piece_Gaiden_Foro_Rol.gif";
            }
            
            var imagen = '/images/op/iconos/' + imagen_nombre;
            if (objeto.imagen_avatar !== '') {
                imagen = objeto.imagen_avatar;
            }
            
            // Verificar si el objeto ya está equipado
            var yaEquipado = objetosEquipadosIds.includes(objetoId);
            
            // Estilos base para el objeto
            var estilosBase = 'width: 120px; height: 150px; border: 2px solid; border-radius: 8px; padding: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.3s;';
            
            // Aplicar estilos según si está equipado o no
            var estilos, onclickAction;
            
            if (yaEquipado) {
                // Objeto ya equipado - estilo rojo y no clickeable
                estilos = estilosBase + 'border-color: #dc3545; background-color: rgba(220, 53, 69, 0.1); opacity: 0.6; cursor: not-allowed;';
                onclickAction = 'mostrarMensajeEquipamiento(\'Este objeto ya está equipado en otro lugar.\');';
            } else {
                // Objeto disponible - estilo normal
                estilos = estilosBase + 'border-color: #0055bb; background-color: rgba(0, 85, 187, 0.05);';
                onclickAction = 'equiparItem(\'' + objetoId + '\');';
            }
            
            var objetoDiv = document.createElement('div');
            objetoDiv.style.cssText = estilos;
            objetoDiv.setAttribute('onclick', onclickAction);
            
            if (!yaEquipado) {
                objetoDiv.setAttribute('onmouseover', 'this.style.borderColor=\'#003d82\'; this.style.backgroundColor=\'rgba(0, 85, 187, 0.1)\';');
                objetoDiv.setAttribute('onmouseout', 'this.style.borderColor=\'#0055bb\'; this.style.backgroundColor=\'rgba(0, 85, 187, 0.05)\';');
            }
            
            // Indicador visual si está equipado
            var indicadorEquipado = yaEquipado ? '<div style="position: absolute; top: 5px; right: 5px; background-color: #dc3545; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold;">✕</div>' : '';
            
            objetoDiv.innerHTML = 
                '<div style="position: relative; width: 100%;">' +
                    indicadorEquipado +
                    '<img src="' + imagen + '" style="width: 60px; height: 60px; object-fit: cover; border-radius: 4px;">' +
                '</div>' +
                '<div style="font-family: \'moonGetHeavy\'; font-size: 10px; margin-top: 8px; color: ' + (yaEquipado ? '#dc3545' : '#0055bb') + '; line-height: 12px;">' +
                    (objeto.apodo !== '' ? objeto.apodo.substring(0, 15) : objeto.nombre.substring(0, 15)) +
                '</div>' +
                '<div style="font-family: \'moonGetHeavy\'; font-size: 8px; color: ' + (yaEquipado ? '#dc3545' : '#666') + '; margin-top: 2px;">' +
                    '+' + extraerEspaciosDelEfecto(objeto.efecto, objeto.dano) + ' Espacios' +
                '</div>' +
                (yaEquipado ? '<div style="font-family: \'moonGetHeavy\'; font-size: 7px; color: #dc3545; margin-top: 2px;">YA EQUIPADO</div>' : '');
            
            lista.appendChild(objetoDiv);
        }
    });
    
    modal.style.display = 'block';
}
