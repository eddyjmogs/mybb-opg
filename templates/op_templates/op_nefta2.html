<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Gaiden - Sistema de Cartas Coleccionables</title>
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="cartas.css">
    
    <style>
        /* Estilos adicionales inline por compatibilidad */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .card-game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <!-- Contenedor principal del juego -->
    <div class="card-game-container">
        
        <!-- Header del juego -->
        <header class="game-header">
            <h1>?‍☠️ One Piece Gaiden - Colección de Cartas ?‍☠️</h1>
            <div class="player-stats">
                <div class="money-display">
                    <span class="money-icon"></span>
                    <span id="player-money">999999</span> Berries
                </div>
                <div class="collection-stats">
                    ? Colección: <span id="cards-collected">0</span>/<span id="total-cards">0</span>
                </div>
            </div>
        </header>

        <!-- Navegación principal -->
        <nav class="game-navigation">
            <button class="nav-btn active" onclick="showSection('shop')">
                ? Tienda de Sobres
            </button>
            <button class="nav-btn" onclick="showSection('inventory')">
                ? Mi Inventario
            </button>
            <button class="nav-btn" onclick="showSection('collection')">
                ? Mi Colección
            </button>
            <button class="nav-btn" onclick="resetPlayerData()">
                ? Reiniciar Datos
            </button>
        </nav>

        <!-- Sección: Tienda de Sobres -->
        <section id="shop-section" class="game-section active">
            <h2>? Tienda de Sobres</h2>
            <div id="packs-container" class="packs-container">
                <!-- Los packs se cargarán dinámicamente aquí -->
            </div>
        </section>

        <!-- Sección: Inventario -->
        <section id="inventory-section" class="game-section">
            <h2>? Mi Inventario de Sobres</h2>
            <div id="inventory-container" class="inventory-grid">
                <!-- Los sobres del inventario se cargarán aquí -->
            </div>
        </section>

        <!-- Sección: Colección de Cartas -->
        <section id="collection-section" class="game-section">
            <h2>? Mi Colección de Cartas</h2>
            
            <!-- Filtros de colección -->
            <div class="collection-filters">
                <select id="filter-pack" onchange="filterCollection()">
                    <option value="all">Todos los Packs</option>
                </select>
                
                <select id="filter-rarity" onchange="filterCollection()">
                    <option value="all">Todas las Rarezas</option>
                    <option value="1">⭐ 1 Estrella</option>
                    <option value="2">⭐⭐ 2 Estrellas</option>
                    <option value="3">⭐⭐⭐ 3 Estrellas</option>
                    <option value="4">⭐⭐⭐⭐ 4 Estrellas</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5 Estrellas</option>
                </select>
                
                <select id="filter-type" onchange="filterCollection()">
                    <option value="all">Todos los Tipos</option>
                    <option value="normal">Normal</option>
                    <option value="especial">Especial</option>
                </select>
                
                <select id="filter-owned" onchange="filterCollection()">
                    <option value="all">Todas</option>
                    <option value="owned">Solo Poseídas</option>
                    <option value="missing">Solo Faltantes</option>
                </select>
            </div>
            
            <!-- Grid de colección -->
            <div id="collection-container" class="collection-grid">
                <!-- Las cartas se cargarán aquí dinámicamente -->
            </div>
        </section>

    </div>

    <!-- Modal para apertura de sobres -->
    <div id="pack-opening-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="pack-opening-container">
                <h3>✨ Abriendo Sobre ✨</h3>
                <div id="pack-animation-container">
                    <!-- Animación del sobre se mostrará aquí -->
                </div>
                <div class="pack-results">
                    <h3>? ¡Cartas Obtenidas! ?</h3>
                    <div id="cards-revealed-container" class="cards-revealed">
                        <!-- Cartas reveladas aparecerán aquí -->
                    </div>
                </div>
                <button class="close-modal-button" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal para detalle de carta -->
    <div id="card-detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="card-detail-container">
                <!-- Detalles de la carta se cargarán aquí -->
            </div>
        </div>
    </div>

    <!-- Contenedor de notificaciones -->
    <div id="notification-container" class="notification-container">
        <!-- Notificaciones aparecerán aquí -->
    </div>

    <!-- Scripts externos -->
    <script src="cartas.js"></script>
    
    <!-- Script principal del juego -->
    <script type="text/javascript">
    (function() {
        'use strict';
        
        console.log('Iniciando carga del sistema de cartas...');
        
        // Esperar a que el DOM esté completamente cargado
        function initCardGame() {
            console.log('Inicializando CardGame...');
            
            // Verificar compatibilidad con MyBB
            if (typeof MyBB !== 'undefined') {
                console.log('MyBB detectado - Inicializando modo compatible');
            }
            
            // Verificar que los datos externos estén cargados
            if (typeof window.CardGameData === 'undefined' || typeof window.CardGameConfig === 'undefined') {
                console.error('Error: No se han cargado los datos de cartas. Verifica que cartas.js esté cargado.');
                return;
            }
            
            // Objeto principal del juego
            var CardGame = {
                initialized: false,
                playerData: {
                    money: 999999,
                    cards: {},
                    inventory: {}
                },
                
                // Usar configuración externa
                config: window.CardGameConfig,
                
                // Usar base de datos externa
                packsData: window.CardGameData,
                
                // Función para determinar si una carta es legendaria (especial + 5 estrellas)
                isLegendaryCard: function(card) {
                    return card.type === 'especial' && card.rarity === 5;
                },
                
                // Aplicar efecto iridiscente a elementos
                applyIridescentEffect: function(element, card) {
                    if (this.isLegendaryCard(card)) {
                        element.classList.add('legendary-5-star');
                        element.style.background = 'linear-gradient(45deg, #ff6b6b, #ffa500, #ffff00, #00ff00, #00bfff, #8a2be2)';
                        element.style.backgroundSize = '300% 300%';
                        element.style.animation = 'rainbow 2s ease infinite';
                    }
                },
                
                // Inicialización
                init: function() {
                    if (this.initialized) return;
                    
                    try {
                        this.loadPlayerData();
                        this.initializeUI();
                        this.initialized = true;
                        console.log('Sistema de cartas inicializado correctamente');
                    } catch (e) {
                        console.error('Error al inicializar el sistema de cartas:', e);
                    }
                },
                
                // Cargar datos del jugador
                loadPlayerData: function() {
                    try {
                        var saved = localStorage.getItem('cardGamePlayerData');
                        if (saved) {
                            this.playerData = JSON.parse(saved);
                        }
                    } catch (e) {
                        console.warn('No se pudieron cargar los datos guardados:', e);
                    }
                    this.updateUI();
                },
                
                // Guardar datos
                savePlayerData: function() {
                    try {
                        localStorage.setItem('cardGamePlayerData', JSON.stringify(this.playerData));
                    } catch (e) {
                        console.error('Error al guardar datos:', e);
                    }
                },
                
                // Resetear datos
                resetPlayerData: function() {
                    this.playerData = {
                        money: 999999,
                        cards: {},
                        inventory: {}
                    };
                    this.savePlayerData();
                    this.updateUI();
                    this.showNotification('¡Datos reiniciados!', 'success');
                },
                
                // Inicializar UI
                initializeUI: function() {
                    this.updateUI();
                    this.loadShop();
                    this.loadCollectionFilters();
                },
                
                // Actualizar interfaz
                updateUI: function() {
                    var moneyElement = document.getElementById('player-money');
                    if (moneyElement) {
                        moneyElement.textContent = this.playerData.money.toLocaleString();
                    }
                    this.updateCollectionStats();
                },
                
                // Actualizar estadísticas
                updateCollectionStats: function() {
                    var collectedElement = document.getElementById('cards-collected');
                    var totalElement = document.getElementById('total-cards');
                    
                    if (collectedElement && totalElement) {
                        var collected = Object.keys(this.playerData.cards).length;
                        var total = this.getTotalCardsCount();
                        collectedElement.textContent = collected;
                        totalElement.textContent = total;
                    }
                },
                
                // Total de cartas
                getTotalCardsCount: function() {
                    var total = 0;
                    for (var packId in this.packsData) {
                        total += Object.keys(this.packsData[packId].cards).length;
                    }
                    return total;
                },
                
                // Cargar tienda
                loadShop: function() {
                    var container = document.getElementById('packs-container');
                    if (!container) return;
                    
                    container.innerHTML = '';
                    
                    for (var packId in this.packsData) {
                        var pack = this.packsData[packId];
                        container.appendChild(this.createPackElement(pack));
                    }
                },
                
                // Crear elemento de pack
                createPackElement: function(pack) {
                    var packDiv = document.createElement('div');
                    packDiv.className = 'pack-item';
                    
                    packDiv.innerHTML = 
                        '<div class="pack-image-container">' +
                        '<img src="' + pack.image + '" alt="' + pack.name + '" class="pack-image">' +
                        '</div>' +
                        '<div class="pack-name">' + pack.name + '</div>' +
                        '<div class="pack-price">' + pack.price.toLocaleString() + ' Berries</div>' +
                        '<div class="pack-description">' + pack.description + '</div>' +
                        '<button class="buy-pack-btn" onclick="CardGame.buyPack(\'' + pack.id + '\')">Comprar Pack</button>';
                    
                    return packDiv;
                },
                
                // Comprar pack
                buyPack: function(packId) {
                    var pack = this.packsData[packId];
                    if (!pack) return;
                    
                    if (this.playerData.money < pack.price) {
                        this.showNotification('¡No tienes suficientes Berries!', 'error');
                        return;
                    }
                    
                    this.playerData.money -= pack.price;
                    
                    if (!this.playerData.inventory[packId]) {
                        this.playerData.inventory[packId] = 0;
                    }
                    this.playerData.inventory[packId]++;
                    
                    this.savePlayerData();
                    this.updateUI();
                    this.showNotification('¡Pack comprado! Ve a tu inventario para abrirlo.', 'success');
                },
                
                // Cargar inventario
                loadInventory: function() {
                    var container = document.getElementById('inventory-container');
                    if (!container) return;
                    
                    container.innerHTML = '';
                    
                    var hasItems = false;
                    for (var packId in this.playerData.inventory) {
                        if (this.playerData.inventory[packId] > 0) {
                            hasItems = true;
                            var pack = this.packsData[packId];
                            if (pack) {
                                container.appendChild(this.createInventoryElement(pack, this.playerData.inventory[packId]));
                            }
                        }
                    }
                    
                    if (!hasItems) {
                        container.innerHTML = '<div class="empty-inventory">No tienes sobres en tu inventario. ¡Ve a la tienda a comprar algunos!</div>';
                    }
                },
                
                // Crear elemento de inventario
                createInventoryElement: function(pack, count) {
                    var div = document.createElement('div');
                    div.className = 'inventory-pack';
                    
                    div.innerHTML = 
                        '<div class="inventory-pack-image-container">' +
                        '<img src="' + pack.image + '" alt="' + pack.name + '" class="inventory-pack-image">' +
                        '</div>' +
                        '<div class="inventory-pack-name">' + pack.name + '</div>' +
                        '<div class="inventory-pack-count">Cantidad: ' + count + '</div>' +
                        '<button class="open-pack-btn" onclick="CardGame.openPack(\'' + pack.id + '\')">Abrir Pack</button>';
                    
                    return div;
                },
                
                // Abrir pack
                openPack: function(packId) {
                    if (!this.playerData.inventory[packId] || this.playerData.inventory[packId] <= 0) {
                        this.showNotification('¡No tienes este pack!', 'error');
                        return;
                    }
                    
                    var pack = this.packsData[packId];
                    this.playerData.inventory[packId]--;
                    
                    this.executePackOpening(pack);
                },
                
                // Ejecutar apertura del pack
                executePackOpening: function(pack) {
                    var drawnCards = this.drawCards(pack);
                    
                    for (var i = 0; i < drawnCards.length; i++) {
                        var card = drawnCards[i];
                        if (!this.playerData.cards[card.id]) {
                            this.playerData.cards[card.id] = 0;
                        }
                        this.playerData.cards[card.id]++;
                    }
                    
                    this.savePlayerData();
                    this.updateUI();
                    this.showPackOpeningModal(pack, drawnCards);
                },
                
                // Mostrar modal de apertura
                showPackOpeningModal: function(pack, drawnCards) {
                    var modal = document.getElementById('pack-opening-modal');
                    var cardsContainer = document.getElementById('cards-revealed-container');
                    
                    cardsContainer.innerHTML = '';
                    
                    for (var i = 0; i < drawnCards.length; i++) {
                        var card = drawnCards[i];
                        var cardDiv = document.createElement('div');
                        cardDiv.className = 'revealed-card';
                        if (this.isLegendaryCard(card)) {
                            cardDiv.classList.add('legendary-5-star');
                        }
                        
                        var stars = '⭐'.repeat(card.rarity);
                        cardDiv.innerHTML = 
                            '<img src="' + card.image + '" alt="' + card.name + '">' +
                            '<div class="revealed-card-name">' + card.name + '</div>' +
                            '<div class="revealed-card-rarity">' + stars + '</div>';
                        
                        cardsContainer.appendChild(cardDiv);
                    }
                    
                    modal.classList.add('show');
                },
                
                // Obtener cartas del pack
                drawCards: function(pack) {
                    var drawnCards = [];
                    var cardsArray = [];
                    
                    for (var cardId in pack.cards) {
                        cardsArray.push(pack.cards[cardId]);
                    }
                    
                    for (var i = 0; i < this.config.cardsPerPack; i++) {
                        var card = this.drawCardByRarity(cardsArray);
                        drawnCards.push(card);
                    }
                    
                    return drawnCards;
                },
                
                // Obtener carta por rareza
                drawCardByRarity: function(cards) {
                    var totalWeight = 0;
                    for (var rarity in this.config.rarityWeights) {
                        totalWeight += this.config.rarityWeights[rarity];
                    }
                    
                    var random = Math.random() * totalWeight;
                    var currentWeight = 0;
                    var selectedRarity = 1;
                    
                    for (var rarity in this.config.rarityWeights) {
                        currentWeight += this.config.rarityWeights[rarity];
                        if (random <= currentWeight) {
                            selectedRarity = parseInt(rarity);
                            break;
                        }
                    }
                    
                    var cardsOfRarity = cards.filter(function(card) {
                        return card.rarity === selectedRarity;
                    });
                    
                    if (cardsOfRarity.length === 0) {
                        cardsOfRarity = cards;
                    }
                    
                    var randomIndex = Math.floor(Math.random() * cardsOfRarity.length);
                    return cardsOfRarity[randomIndex];
                },
                
                // Cargar colección
                loadCollection: function() {
                    var container = document.getElementById('collection-container');
                    if (!container) return;
                    
                    container.innerHTML = '';
                    
                    var allCards = this.getAllCards();
                    var filteredCards = this.applyFilters(allCards);
                    
                    for (var i = 0; i < filteredCards.length; i++) {
                        container.appendChild(this.createCollectionCardElement(filteredCards[i]));
                    }
                },
                
                // Obtener todas las cartas
                getAllCards: function() {
                    var allCards = [];
                    for (var packId in this.packsData) {
                        var pack = this.packsData[packId];
                        for (var cardId in pack.cards) {
                            var card = pack.cards[cardId];
                            card.packId = packId;
                            card.packName = pack.name;
                            allCards.push(card);
                        }
                    }
                    return allCards;
                },
                
                // Aplicar filtros
                applyFilters: function(cards) {
                    var packFilter = document.getElementById('filter-pack').value;
                    var rarityFilter = document.getElementById('filter-rarity').value;
                    var typeFilter = document.getElementById('filter-type').value;
                    var ownedFilter = document.getElementById('filter-owned').value;
                    
                    return cards.filter(function(card) {
                        if (packFilter !== 'all' && card.packId !== packFilter) return false;
                        if (rarityFilter !== 'all' && card.rarity !== parseInt(rarityFilter)) return false;
                        if (typeFilter !== 'all' && card.type !== typeFilter) return false;
                        
                        var owned = CardGame.playerData.cards[card.id] > 0;
                        if (ownedFilter === 'owned' && !owned) return false;
                        if (ownedFilter === 'missing' && owned) return false;
                        
                        return true;
                    });
                },
                
                // Crear elemento de carta de colección
                createCollectionCardElement: function(card) {
                    var cardDiv = document.createElement('div');
                    var owned = this.playerData.cards[card.id] || 0;
                    var isOwned = owned > 0;
                    
                    cardDiv.className = 'card-item';
                    if (!isOwned) {
                        cardDiv.classList.add('not-owned');
                    }
                    if (this.isLegendaryCard(card) && isOwned) {
                        cardDiv.classList.add('legendary-5-star');
                    }
                    
                    var stars = '⭐'.repeat(card.rarity);
                    cardDiv.innerHTML = 
                        '<img src="' + card.image + '" alt="' + card.name + '" class="card-image">' +
                        '<div class="card-name">' + card.name + '</div>' +
                        '<div class="card-rarity">' + stars + '</div>' +
                        '<div class="card-count">x' + owned + '</div>';
                    
                    if (isOwned) {
                        cardDiv.onclick = function() {
                            CardGame.showCardDetail(card.id);
                        };
                    }
                    
                    return cardDiv;
                },
                
                // Cargar filtros de colección
                loadCollectionFilters: function() {
                    var packFilter = document.getElementById('filter-pack');
                    if (!packFilter) return;
                    
                    for (var packId in this.packsData) {
                        var option = document.createElement('option');
                        option.value = packId;
                        option.textContent = this.packsData[packId].name;
                        packFilter.appendChild(option);
                    }
                },
                
                // Filtrar colección
                filterCollection: function() {
                    this.loadCollection();
                },
                
                // Mostrar detalle de carta
                showCardDetail: function(cardId) {
                    var card = this.findCardById(cardId);
                    if (!card) return;
                    
                    var modal = document.getElementById('card-detail-modal');
                    var container = modal.querySelector('.card-detail-container');
                    
                    var stars = '⭐'.repeat(card.rarity);
                    container.innerHTML = 
                        '<div class="card-display">' +
                        '<img src="' + card.image + '" alt="' + card.name + '">' +
                        '</div>' +
                        '<div class="card-info">' +
                        '<h3>' + card.name + '</h3>' +
                        '<div class="card-pack">Pack: <span>' + card.packName + '</span></div>' +
                        '<div class="card-rarity">Rareza: <span>' + stars + '</span></div>' +
                        '<div class="card-type">Tipo: <span>' + card.type + '</span></div>' +
                        '<div class="card-description">' + card.description + '</div>' +
                        '<div class="card-count">Tienes: <span>' + (this.playerData.cards[cardId] || 0) + '</span> copias</div>' +
                        '</div>';
                    
                    modal.classList.add('show');
                },
                
                // Encontrar carta por ID
                findCardById: function(cardId) {
                    for (var packId in this.packsData) {
                        var pack = this.packsData[packId];
                        if (pack.cards[cardId]) {
                            var card = pack.cards[cardId];
                            card.packName = pack.name;
                            return card;
                        }
                    }
                    return null;
                },
                
                // Mostrar sección
                showSection: function(sectionName) {
                    var sections = document.querySelectorAll('.game-section');
                    sections.forEach(function(section) {
                        section.classList.remove('active');
                    });
                    
                    var targetSection = document.getElementById(sectionName + '-section');
                    if (targetSection) {
                        targetSection.classList.add('active');
                    }
                    
                    var navButtons = document.querySelectorAll('.nav-btn');
                    navButtons.forEach(function(btn) {
                        btn.classList.remove('active');
                    });
                    
                    var activeButton = Array.from(navButtons).find(function(btn) {
                        return btn.textContent.toLowerCase().includes(sectionName === 'shop' ? 'tienda' : 
                                                                        sectionName === 'inventory' ? 'inventario' : 'colección');
                    });
                    
                    if (activeButton) {
                        activeButton.classList.add('active');
                    }
                    
                    if (sectionName === 'inventory') {
                        this.loadInventory();
                    } else if (sectionName === 'collection') {
                        this.loadCollection();
                    }
                },
                
                // Cerrar modal
                closeModal: function() {
                    var modals = document.querySelectorAll('.modal');
                    modals.forEach(function(modal) {
                        modal.classList.remove('show');
                    });
                },
                
                // Mostrar notificación
                showNotification: function(message, type) {
                    var container = document.getElementById('notification-container');
                    if (!container) return;
                    
                    var notification = document.createElement('div');
                    notification.className = 'notification ' + type;
                    notification.textContent = message;
                    
                    container.appendChild(notification);
                    
                    setTimeout(function() {
                        notification.classList.add('show');
                    }, 10);
                    
                    setTimeout(function() {
                        notification.classList.remove('show');
                        setTimeout(function() {
                            notification.remove();
                        }, 300);
                    }, 3000);
                }
            };
            
            // Hacer CardGame global
            window.CardGame = CardGame;
            
            // Funciones globales
            window.showSection = function(sectionName) {
                CardGame.showSection(sectionName);
            };
            
            window.closeModal = function() {
                CardGame.closeModal();
            };
            
            window.resetPlayerData = function() {
                if (confirm('¿Estás seguro de que quieres reiniciar todos tus datos?')) {
                    CardGame.resetPlayerData();
                }
            };
            
            window.filterCollection = function() {
                CardGame.filterCollection();
            };
            
            // Inicializar
            setTimeout(function() {
                CardGame.init();
            }, 200);
        }
        
        // Detectar cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCardGame);
        } else {
            initCardGame();
        }
    })();
    </script>
    
    <!-- Script de inicialización -->
    <script>
        // Verificar que todo esté cargado
        window.addEventListener('load', function() {
            console.log('Página completamente cargada');
            
            // Verificar dependencias
            if (typeof window.CardGameData === 'undefined') {
                console.error('Error: cartas.js no está cargado');
                document.querySelector('.card-game-container').innerHTML = 
                    '<div class="error-message">' +
                    '<h2>⚠️ Error de Carga</h2>' +
                    '<p>No se pudo cargar la base de datos de cartas.</p>' +
                    '<p>Por favor, verifica que el archivo <strong>cartas.js</strong> esté presente.</p>' +
                    '</div>';
                return;
            }
            
            if (typeof window.CardGame === 'undefined') {
                console.error('Error: Sistema de juego no inicializado');
                setTimeout(function() {
                    if (typeof window.CardGame !== 'undefined') {
                        console.log('Sistema de juego inicializado con retraso');
                    }
                }, 1000);
            } else {
                console.log('Sistema de cartas listo');
            }
        });
        
        // Funciones de utilidad global
        function debugInfo() {
            console.log('=== DEBUG INFO ===');
            console.log('CardGameData:', typeof window.CardGameData);
            console.log('CardGameConfig:', typeof window.CardGameConfig);
            console.log('CardGame:', typeof window.CardGame);
            if (window.CardGame) {
                console.log('Player Data:', window.CardGame.playerData);
                console.log('Total Packs:', Object.keys(window.CardGame.packsData || {}).length);
            }
            console.log('=================');
        }
        
        // Hacer debugInfo accesible globalmente
        window.debugInfo = debugInfo;
        
        // Prevenir pérdida de datos al cerrar
        window.addEventListener('beforeunload', function() {
            if (window.CardGame && window.CardGame.savePlayerData) {
                window.CardGame.savePlayerData();
            }
        });
    </script>
</body>
</html>
