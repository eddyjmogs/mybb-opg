<html>
<head>
<title>{$mybb->settings['bbname']} - Arcos de One Pace</title>
{$headerinclude}
<style type="text/css">
    .fondo-blanco {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin: 20px auto;
      max-width: 1200px;
    }
    
    .op-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .arcos-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    
    .arco-item {
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 10px;
      position: relative;
      width: 200px;
      height: 120px;
      border-radius: 8px;
    }
    
    .arco-item:hover {
      transform: translateY(-5px);
      z-index: 100;
    }
    
    .arco-item.active {
      outline: 3px solid #e65100;
    }
    
    .arco-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }
    
    .arco-item:hover .arco-wrapper {
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    
    .arco-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.3s ease;
      border-radius: 8px;
    }
    
    /* La parte clave: un contenedor de imagen ampliada que aparece al hacer hover */
    .arco-ampliada {
      display: none;
      position: absolute;
      top: -10px;
      left: -10px;
      width: 320px;
      height: auto;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
      z-index: 150;
      padding: 10px;
    }
    
    .arco-item:hover .arco-ampliada {
      display: block;
    }
    
    .arco-ampliada img {
      width: 100%;
      height: auto;
      border-radius: 4px;
    }
    
    /* Etiqueta con el nombre del arco */
    .arco-nombre {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 5px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 20;
    }
    
    .arco-item:hover .arco-nombre {
      opacity: 1;
    }
    
    /* Etiqueta con nombre en la imagen ampliada */
    .arco-ampliada-nombre {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px;
      font-size: 14px;
      text-align: center;
      border-radius: 4px;
    }
    
    .reproductor-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    
    .reproductor-titulo {
      font-size: 24px;
      margin-bottom: 15px;
      color: #e65100;
    }
    
    .reproductor-iframe {
      width: 100%;
      max-width: 800px;
      height: 600px;
      border: none;
      border-radius: 8px;
    }
    
    .op-header-img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px auto;
      border-radius: 8px;
    }
    
    @media (max-width: 768px) {
      .reproductor-iframe {
        height: 400px;
      }
      
      .arco-item {
        width: 150px;
        height: 90px;
      }
      
      .arco-ampliada {
        width: 250px;
      }
    }
</style>
</head>
<body>
{$header}

<div class="fondo-blanco">
    <!-- Logo de One Pace en lugar del título -->
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://onepace.net/_next/static/media/logo.0bbcd6da.svg" alt="One Pace Logo" class="op-header-img">
    </div>
    
    <p style="text-align: center;">Selecciona un arco para ver sus episodios. One Pace es una versión editada de One Piece que sigue fielmente al manga.</p>    
    <div class="op-container">
      <div class="arcos-container" id="arcos-list">
        <!-- Las imágenes de arcos se generarán aquí con JavaScript -->
      </div>
      
      <div class="reproductor-container" id="reproductor">
        <h2 class="reproductor-titulo" id="arco-titulo"></h2>
        <iframe id="arco-iframe" class="reproductor-iframe" allowfullscreen></iframe>
      </div>
    </div>
</div>

    ];

    // Función para mostrar los arcos con imágenes
    function mostrarArcos(arcosAMostrar) {
      const arcosContainer = document.getElementById("arcos-list");
      arcosContainer.innerHTML = "";
      
      arcosAMostrar.forEach(function(arco) {
        // Crear contenedor de imagen
        const arcoItem = document.createElement("div");
        arcoItem.classList.add("arco-item");
        arcoItem.setAttribute("title", arco.nombre);
        arcoItem.addEventListener("click", function() { seleccionarArco(arco); });
        
        // Crear wrapper para la imagen
        const arcoWrapper = document.createElement("div");
        arcoWrapper.classList.add("arco-wrapper");
        
        // Crear imagen en miniatura
        const arcoImg = document.createElement("img");
        arcoImg.classList.add("arco-img");
        arcoImg.src = arco.imagen;
        arcoImg.alt = "Arco: " + arco.nombre;
        arcoImg.setAttribute("loading", "lazy");
        
        // Crear etiqueta con nombre
        const arcoNombre = document.createElement("div");
        arcoNombre.classList.add("arco-nombre");
        arcoNombre.textContent = arco.nombre;
        
        // Crear contenedor de imagen ampliada que aparecerá al pasar el ratón
        const arcoAmpliada = document.createElement("div");
        arcoAmpliada.classList.add("arco-ampliada");
        
        // Crear imagen ampliada (copia de la original)
        const arcoImgAmpliada = document.createElement("img");
        arcoImgAmpliada.src = arco.imagen;
        arcoImgAmpliada.alt = "Arco: " + arco.nombre;
        arcoImgAmpliada.setAttribute("loading", "lazy");
        
        // Crear etiqueta con nombre para la imagen ampliada
        const arcoNombreAmpliado = document.createElement("div");
        arcoNombreAmpliado.classList.add("arco-ampliada-nombre");
        arcoNombreAmpliado.textContent = arco.nombre;
        
        // Agregar elementos al contenedor
        arcoWrapper.appendChild(arcoImg);
        arcoWrapper.appendChild(arcoNombre);
        
        // Agregar elementos a la vista ampliada
        arcoAmpliada.appendChild(arcoImgAmpliada);
        arcoAmpliada.appendChild(arcoNombreAmpliado);
        
        // Agregar todo al contenedor principal
        arcoItem.appendChild(arcoWrapper);
        arcoItem.appendChild(arcoAmpliada);
        
        // Agregar al grid de arcos
        arcosContainer.appendChild(arcoItem);
      });
    }

    // Función para seleccionar un arco
    function seleccionarArco(arco) {
      // Marcar imagen como activa
      document.querySelectorAll('.arco-item').forEach(function(item) {
        item.classList.remove('active');
        if (item.getAttribute("title") === arco.nombre) {
          item.classList.add('active');
        }
      });
      
      // Mostrar reproductor
      const reproductorContainer = document.getElementById("reproductor");
      reproductorContainer.style.display = "flex";
      
      // Actualizar título
      document.getElementById("arco-titulo").textContent = "Arco: " + arco.nombre;
      
      // Actualizar iframe
      const iframe = document.getElementById("arco-iframe");
      iframe.src = arco.url + "?embed&style=solarized_light";
      
      // Hacer scroll al reproductor
      reproductorContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Inicializar la página
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', inicializar);
    } else {
      inicializar();
    }

    function inicializar() {
      // Mostrar todos los arcos al cargar
      mostrarArcos(arcos);
    }
// ]]>
</script>

</html>
