<script type="text/javascript">    
	    
jQuery(function($) {    
	$("#backtop").hide();    
  	$(window).scroll(function () {    
  	  if ($(this).scrollTop() > 400) {    
    	   $("#backtop").fadeIn(160);    
	  } else {    
		  $("#backtop").fadeOut(160);    
	  }    
	});    
  $('.backtop').on( "click", function () {    
	  $('html, body').animate({    
		  scrollTop: 0    
	  }, 650);    
	  return false;    
  });    
});    
</script>    
<script type="text/javascript">    
jQuery(function($) {    
    $(".leftbutton").hide();    
    $(".rightbutton").on("click", function() {    
        $(".sidebar").animate({    
            height: "hide",    
            opacity: 0    
        }, 150, function() {    
            $(".forums").animate({    
                width: "100%"    
            }, 400)    
        });    
        $(this).hide();    
        $(".leftbutton").show();    
        Cookie.set("sidebar", "collapsed", 60 * 60 * 24 * 365);    
        return false;    
    });    
    $(".leftbutton").on("click", function() {    
        $(".forums").animate({    
            width: "76%"    
        }, 400, function() {    
            $(".sidebar").animate({    
                height: "show",    
                opacity: 1    
            }, 150)    
        });    
        $(this).hide();    
        $(".rightbutton").show();    
        Cookie.set("sidebar", "expanded", 60 * 60 * 24 * 365);    
        return false;    
    });    
    if (Cookie.get("sidebar") == "collapsed") {    
        $(".rightbutton").hide();    
        $(".leftbutton").show();    
        $(".forums").css("width", "100%");    
        $(".sidebar").hide();    
    }    
    if ($(".forums").length < 1) $(".toggle-container").hide();    
});    
</script>

<script>    
	
	var _second = 1000;

	function showRemaining1(end, tagName) {
		var now = new Date();
		var distance = end - now;

		var days = Math.floor(distance / _day);
		var hours = Math.floor((distance % _day) / _hour);
		var minutes = Math.floor((distance % _hour) / _minute);
		var seconds = Math.floor((distance % _minute) / _second);

		document.getElementById(tagName).innerHTML = '';
		
		if (days == 1) {
			document.getElementById(tagName).innerHTML += days + ' día, ';
		} else {
			document.getElementById(tagName).innerHTML += days + ' días, ';
		}
