	function chooseBelica(belica, hasBelica) {
		
		let isBelica1 = belica1 == belica;

		let isBelica3 = belica3 == belica;
		let isBelica4 = belica4 == belica;
		let isBelica5 = belica5 == belica;
		let isBelica6 = belica6 == belica;
		let countBelicas = Object.keys(belicas).length;
		
		let nivelReq = 0;
		let nikaReq = 0;
		
		if (hasBelica) {
		
			if (isBelica1 && nikas >= 0 && nivel >= 3) {
				if (confirm(`Para subir el nivel a la disciplina ` + belica + ` tiene un costo de 0 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica1'); }
			} else if (isBelica2 && nikas >= 10 && nivel >= 3) {
				if (confirm(`Para subir el nivel a la disciplina ` + belica + ` tiene un costo de 10 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica2'); }
			} else if (isBelica3 && nikas >= 20 && nivel >= 3) {
				if (confirm(`Para subir el nivel a la disciplina ` + belica + ` tiene un costo de 20 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica3'); }
			} else if (isBelica4 && nikas >= 35 && nivel >= 3) {
				if (confirm(`Para subir el nivel a la disciplina ` + belica + ` tiene un costo de 35 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica4'); }
			} else if (isBelica5 && nikas >= 60 && nivel >= 3) {
				if (confirm(`Para subir el nivel a la disciplina ` + belica + ` tiene un costo de 60 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica5'); }
			} else if (isBelica6 && nikas >= 75 && nivel >= 3) {
				if (confirm(`Para subir el nivel a la disciplina ` + belica + ` tiene un costo de 75 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica6'); }
			} else {
			
				if (isBelica1) { nikaReq = 0; nivelReq = 3; }
				if (isBelica2) { nikaReq = 10; nivelReq = 3; }
				if (isBelica3) { nikaReq = 20; nivelReq = 3; }
				if (isBelica4) { nikaReq = 35; nivelReq = 3; }
				if (isBelica5) { nikaReq = 60; nivelReq = 3; }
				if (isBelica6) { nikaReq = 75; nivelReq = 3; }
		
				alert(`No cumples los requisitos para mejorar la disciplina ` + belica + `. Debes ser nivel ` + nivelReq + ` y tener ` + nikaReq + ` nikas.`);
			}
		
		} else {
		
			if (countBelicas == 1 && nikas >= 5) {
				if (confirm(`Para aprender la disciplina ` + belica + ` tiene un costo de 5 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica2'); }
			} else if (countBelicas == 2 && nikas >= 10) {
				if (confirm(`Para aprender la nivel a la disciplina ` + belica + ` tiene un costo de 10 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica3'); }
			} else if (countBelicas == 3 && nikas >= 20) {
				if (confirm(`Para aprender la nivel a la disciplina ` + belica + ` tiene un costo de 20 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica4'); }
			} else if (countBelicas == 4 && nikas >= 40) {
				if (confirm(`Para aprender la nivel a la disciplina ` + belica + ` tiene un costo de 40 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica5'); }
			} else if (countBelicas == 5 && nikas >= 50) {
				if (confirm(`Para aprender la nivel a la disciplina ` + belica + ` tiene un costo de 50 nikas. ¿Estás de acuerdo?`)) { subirBelica(belica, 'belica6'); }
			} else {
		
				if (countBelicas == 1) { nikaReq = 5; }
				if (countBelicas == 2) { nikaReq = 10; }
				if (countBelicas == 3) { nikaReq = 20; }
				if (countBelicas == 4) { nikaReq = 40; }
				if (countBelicas == 5) { nikaReq = 50; }
				alert(`No cumples los requisitos para aprender la disciplina ` + belica + `. Debes tener ` + nikaReq + ` nikas.`);
			}
		}	
	}
