<script>
	
let faccionFilterActive = false;
let tierFilterActive = false;
let currentFaccionFilter = '';
let currentTierFilter = 0;
let vistaActual = 'Pirata'; // Vista por defecto: Piratas

let NPCs = {$npcs_json};

// Debug: Ver los primeros NPCs y sus facciones
console.log('Total NPCs:', NPCs.length);
console.log('Primeros 5 NPCs:', NPCs.slice(0, 5).map(n => ({ nombre: n.nombre, faccion: n.faccion, rango: n.rango })));
console.log('Todas las facciones únicas:', [...new Set(NPCs.map(n => n.faccion))]);
console.log('NPCs de Marina:', NPCs.filter(n => n.faccion === 'Marina').length);
	
function compareReputacion(a, b) {
  return b.reputacion - a.reputacion;
}

function compareRango(a, b) {
  // Mapeo de rangos de Marina a valores numéricos (mayor número = mayor rango)
  const rangosMarinos = {
    'ReclutaM': 1,
    'SoldadoRaso': 2,
    'SargentoM': 3,
    'Suboficial': 4,
    'Alferez': 5,
    'Teniente': 6,
    'Comandante': 7,
    'CapitanMarine': 8,
    'Comodoro': 9,
    'Contralmirante': 10,
    'Vicealmirante': 11,
    'Almirante': 12,
    'AlmiranteDeFlota': 13,
    'Inspector': 14,
    'Instructor': 15
  };
  
  const rangoA = rangosMarinos[a.rango] || 0;
  const rangoB = rangosMarinos[b.rango] || 0;
  
  // Si tienen el mismo rango o no tienen rango, ordenar por reputación
  if (rangoA === rangoB) {
    return b.reputacion - a.reputacion;
  }
  
  return rangoB - rangoA;
}

function generarListaNPCs() {
  $('.npcList').empty();
  
  let npcsFiltrados = [];
  
  if (vistaActual === 'Marina') {
    // Filtrar solo Marines y ordenar por rango
    npcsFiltrados = NPCs.filter(npc => npc.faccion === 'Marina');
    console.log('Marines filtrados:', npcsFiltrados.length);
    console.log('Marines encontrados:', npcsFiltrados.map(n => ({ nombre: n.nombre, rango: n.rango })));
    npcsFiltrados.sort(compareRango);
  } else {
    // Mostrar todos los que NO son Marina, ordenados por reputación
    npcsFiltrados = NPCs.filter(npc => npc.faccion !== 'Marina');
    npcsFiltrados.sort(compareReputacion);
  }

for (let i = 0; i < npcsFiltrados.length; i++) {
	let npc = npcsFiltrados[i];
	let npcIndex = NPCs.indexOf(npc);
	let faccion = npc.faccion;
	let npcBoxBorderColor = "red";
	let clipBoxBackgroundColor = "red";
	
	if (faccion == 'Pirata') {
		npcBoxBorderColor = "#e30502";
		clipBoxBackgroundColor = "#a20000";
	}
	
	if (faccion == 'Marina') {
		npcBoxBorderColor = "#0bbefc";
		clipBoxBackgroundColor = "#003f8d";
	}
	
	if (faccion == 'Revo') {
		npcBoxBorderColor = "#ff7900";
		clipBoxBackgroundColor = "#c56103";
	}
	
	if (faccion == 'Cazador') {
		npcBoxBorderColor = "#00d600";
		clipBoxBackgroundColor = "#008500";
	}
	
	if (faccion == 'Gobierno') {
		npcBoxBorderColor = "#5500ff";
		clipBoxBackgroundColor = "#3a00ae";
	}
	
	if (faccion == 'Civil') {
		npcBoxBorderColor = "#ff00ff";
		clipBoxBackgroundColor = "#99008e";
	}
	
	let reputacion = parseInt(parseFloat(npc.reputacion));
	
	// Mapeo de rangos de Marina a nombres legibles
	const rangosMarinos = {
		'ReclutaM': 'Recluta',
		'SoldadoRaso': 'Soldado',
		'SargentoM': 'Sargento',
		'Suboficial': 'Suboficial',
		'Alferez': 'Alférez',
		'Teniente': 'Teniente',
		'Comandante': 'Comandante',
		'CapitanMarine': 'Capitán',
		'Comodoro': 'Comodoro',
		'Contralmirante': 'Contraalmirante',
		'Vicealmirante': 'Vicealmirante',
		'Almirante': 'Almirante',
		'AlmiranteDeFlota': 'Almirante de Flota',
		'Inspector': 'Inspector',
		'Instructor': 'Instructor'
	};
	
	let valorMostrar = '';
	if (vistaActual === 'Marina') {
		// Mostrar el rango en lugar de berries
		valorMostrar = rangosMarinos[npc.rango] || npc.rango || 'Sin Rango';
	} else {
		// Mostrar berries
		valorMostrar = parseInt(reputacion).toLocaleString('es-es');
	}
	
	let npcAvatar = '';
	if (vistaActual === 'Marina') {
		// Usar imagen de Marina
		npcAvatar = 'https://i.imgur.com/AmfbDlR.png';
	} else if (npc.npc == "1") {
		npcAvatar = '/images/op/uploads/WantedNPC_One_Piece_Gaiden_Foro_Rol.png';
	} else {
		npcAvatar = '/images/op/uploads/Wanted2_One_Piece_Gaiden_Foro_Rol.png';
	}
	
	let isMuerto = npc.muerto == "1";
	let muertoStyle = "";
	let muertoHtml = "";
	if (isMuerto) { muertoStyle = "filter: saturate(0.5);"; muertoHtml = '<img src="https://static.vecteezy.com/system/resources/previews/017/178/056/non_2x/red-cross-mark-on-transparent-background-free-png.png" style="width: 120px;height: 120px;position: relative;left: -121px;top: 0px;">'; }
	
	// Estilos diferentes para imágenes de personajes en Marina
	let imgPersonajeStyle = '';
	if (vistaActual === 'Marina') {
		imgPersonajeStyle = 'height: 101px; width: 120px; min-width: 122px; min-height: 103px; margin-top: 7px; margin-bottom: 7px;';
	} else {
		imgPersonajeStyle = 'height: 120px; width: 120px; min-width: 120px; min-height: 120px;';
	}
	
	$('.npcList').append(`
		 <div class="npcBox npcItem" data-faccion="` + npc.faccion +`" onclick="clickNpc(` + npcIndex +`)" style="` + muertoStyle +` margin-bottom: 12px; background-size: 100% 100%; background-image: url('` + npcAvatar + `')">
			<div style="display: flex;position: relative;margin-left: ` + (vistaActual === 'Marina' ? '14px' : '15px') + `;margin-top: 46px;">
				<img src="` + npc.avatar2 + `" style="` + imgPersonajeStyle + `" />
				` + muertoHtml + `
			</div>

			<div>
				<div class="miniNombreWanted" style="` + (vistaActual === 'Marina' ? 'margin-top: 0px; color: #0061b7;' : '') + `">
					` + npc.nombre + `
				</div>
				<div class="miniBerriesWanted" style="` + (vistaActual === 'Marina' ? 'color: #0061b7;' : '') + `">
					` + valorMostrar + `
				</div>
			</div>
		 </div>
	`);
}
}

// Generar lista inicial
generarListaNPCs();		

function cambiarVista(vista) {
	vistaActual = vista;
	
	// Actualizar botones activos
	$('#btnPiratas').removeClass('box-active');
	$('#btnMarina').removeClass('box-active');
	
	if (vista === 'Pirata') {
		$('#btnPiratas').addClass('box-active');
	} else if (vista === 'Marina') {
		$('#btnMarina').addClass('box-active');
	}
	
	// Regenerar lista
	generarListaNPCs();
}
	
const npcItems = document.querySelectorAll('.npcItem');	
	
function filterByFaccion(faccion) {

  $('.categoriaBox').removeClass("box-active");
  
  if (currentFaccionFilter == faccion && faccionFilterActive == false) {
	 faccionFilterActive = true;  
	 $('#' + faccion).addClass("box-active");
  } else {
	  faccionFilterActive = false;   
  }
	
  if (currentFaccionFilter != faccion) {
	  $('#' + faccion).addClass("box-active");
	  faccionFilterActive = true;
  }
	
  currentFaccionFilter = faccion;
  applyFilters();
}

function filterByTier(tier) {
  $('.tierBox').removeClass("box-active");

  if (currentTierFilter == tier && tierFilterActive == false) {
	 tierFilterActive = true;  
	  $('#tier' + tier).addClass("box-active");
  } else {
	  tierFilterActive = false;   
  }

  if (currentTierFilter != tier) {
	  $('#tier' + tier).addClass("box-active");
	  tierFilterActive = true;
 }
	  
  currentTierFilter = tier;
  // applyFilters();
}

function applyFilters() {
  npcItems.forEach(item => {
    const itemFaccion = item.getAttribute('data-faccion') === currentFaccionFilter;
    const itemTier = parseInt(item.getAttribute('data-tier')) === currentTierFilter;

    if (faccionFilterActive && tierFilterActive) {
      item.style.display = itemFaccion && itemTier ? 'block' : 'none';
    } else if (faccionFilterActive) {
      item.style.display = itemFaccion ? 'block' : 'none';
    } else if (tierFilterActive) {
      item.style.display = itemTier ? 'block' : 'none';
    } else {
      item.style.display = 'block'; // No hay filtros activos, mostrar todos los elementos
    }
  });
}
</script>
