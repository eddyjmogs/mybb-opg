/* Estilos para el modal de oficios */
.oficios-modal-content {
    background-color: #ffedd2;
    border: 4px solid #ffe59b;
    border-radius: 8px;
    max-width: 1500px;
    width: 95%;
    max-height: 90vh;
    margin: 2% auto;
    overflow: hidden;
    position: relative;
}

.oficios-grid {
    display: grid;
    grid-template-columns: repeat(5, 280px);
    grid-template-rows: repeat(2, auto);
    gap: 20px;
    padding: 30px;
    justify-content: center;
    align-content: center;
    max-height: 70vh;
    overflow-y: auto;
}

.oficio-card {
    background-color: white;
    border: 3px solid #ddd;
    border-radius: 10px;
    padding: 5px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    width: 280px;
    height: auto;
}

.oficio-card:hover:not(.oficio-disabled) {
    border-color: #ff7e00;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.oficio-imagen-container {
    position: relative;
    width: 280px;
    height: 100px;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 15px;
}

.oficio-imagen {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: all 0.3s ease;
}

.oficio-card:hover:not(.oficio-disabled) .oficio-imagen {
    transform: scale(1.05);
}

.oficio-nombre {
    font-family: 'moonGetHeavy';
    font-size: 18px;
    color: #333;
    margin-top: 10px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}

.oficio-disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(100%);
}

.oficio-disabled:hover {
    transform: none;
    border-color: #ddd;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.oficio-ya-aprendido {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 0, 0, 0.9);
    color: white;
    padding: 8px 15px;
    border-radius: 25px;
    font-family: 'moonGetHeavy';
    font-size: 14px;
    text-shadow: 1px 1px 2px black;
    z-index: 10;
    white-space: nowrap;
}

/* Responsive para pantallas más pequeñas */
@media (max-width: 1600px) {
    .oficios-modal-content {
        max-width: 1200px;
    }
    
    .oficios-grid {
        grid-template-columns: repeat(4, 260px);
        grid-template-rows: repeat(3, auto);
        gap: 15px;
    }
    
    .oficio-card {
        width: 260px;
    }
    
    .oficio-imagen-container {
        width: 260px;
        height: 90px;
    }
}

    }
    
    .oficio-card {
        width: 240px;
    }
    
    .oficio-imagen-container {
        width: 240px;

    }
    
    .oficio-nombre {

    }
}

@media (max-width: 768px) {

.tec-tooltip {
  position: relative;
  display: inline-block;
}

.tec-tooltiptext {
  visibility: hidden;
  width: 200px;
  background-color: #555;
  color: #fff;
  text-align: center;
  border-radius: 6px;
  padding: 5px;
  position: absolute;
  z-index: 1;
  bottom: 125%;
  left: 50%;
  margin-left: -100px;
  opacity: 0;
  transition: opacity 0.3s;
}

.tec-tooltip:hover .tec-tooltiptext {
  visibility: visible;
  opacity: 1;
}

.stat-tooltiptext {
  visibility: hidden;
  width: 120px;
  background-color: #555;
  color: #fff;
  text-align: center;
  border-radius: 6px;
  padding: 5px;
  position: absolute;
  z-index: 1;
  bottom: 125%;
  left: 50%;
  margin-left: -60px;
  opacity: 0;
  transition: opacity 0.3s;
}

.tec-tooltip:hover .stat-tooltiptext {

/* Indicador visual para objetos equipados en el inventario */
.equipped {
    border: 2px solid gold;
    position: relative;
}

.equipped::after {
    content: "✓";
    position: absolute;
    top: -8px;
    right: -8px;
    background: #0055bb;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
}
