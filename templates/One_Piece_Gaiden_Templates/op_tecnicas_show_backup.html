<html>

<head>
  <style>
    .spoiler {
/*       background: #6e23dd; */
      margin-bottom: 15px;
      margin-left: 5px;
      margin-right: 5px;
      max-width: 745px;
      cursor: pointer;
    }

    .spoiler {
      margin: 15px auto;
      cursor: pointer;
 	  background-color: #6300f6 !important;
    }

    .spoiler_content {
      padding: 5px;
      height: auto;
      display: block;
      background-color: #2c82c9;
    }

    .spoiler_title {
/*       border-bottom: 1px solid #262028; */
/*       margin: 0; */
/*       margin-bottom: 4px; */
	  background: #6e23dd;
/*       padding: 7px 5px; */
      text-align: center;
      color: #fff;
      font-family: InterMedium;
      letter-spacing: 1px;
	  font-size: 15px;
	  text-transform: uppercase;
    }
	  
    .flex-container {
      flex-wrap: wrap;
      display: flex;
      justify-content: center;
    }

    .bodycenter {
      margin: 0 auto;
    }

    .bodydesc {
      margin: 0 20px;
      text-align: center;
      color: #060f82;
    }

  </style>
  <title>Tecnicas</title>
  {$headerinclude}
</head>

<body>
  {$header}
  <table border="0" cellspacing="{$theme['borderwidth']}" cellpadding="{$theme['tablespace']}" class="tborder">
    <tr>
      <td class="thead" colspan="1"><strong></strong></td>
    </tr>
    <tr>
      <td class="trow1" valign="top">
        <div class="bodycenter">
          <div class="bodydesc">
            <h2>{$estilo}</h2>
          </div>

          <if $clan_desc then>
            <div style="background-color: #2c82c9;padding: 20px;border-radius: 2px;margin: 0px 50px;">
              <span style="font-size: 15px; color: white;">{$clan_desc}</span>
            </div>
          </if>
			
          <if $tecnicas_templ then>
            <div class="spoiler">
				<div class="spoiler_title">
					<span class="spoiler_button" style="font-size: medium;" onclick="javascript: if(parentNode.parentNode.getElementsByTagName('div')[1].style.display == 'block'){ parentNode.parentNode.getElementsByTagName('div')[1].style.display = 'none'; this.innerHTML='Técnicas'; } else { parentNode.parentNode.getElementsByTagName('div')[1].style.display = 'block'; this.innerHTML='Técnicas'; }">Técnicas</span>
				</div>
			
              <div class="spoiler_content" style="display: block;" align="center">
                {$tecnicas_templ}
              </div>
            </div><br>
          </if>
        </div>
      </td>
    </tr>
  </table>

	
	
	
	
  {$footer}
</body>

</html>

<style></style>
