<html>
<head>
  <title>One Piece Gaiden - FAQ</title>
  {$headerinclude}
  <style>
    .gemini-container{max-width:800px;margin:0 auto;padding:20px}
    .response-box{background-color:#f8f9fa;border:1px solid #ddd;border-radius:5px;padding:15px;margin-top:20px;white-space:pre-wrap}
    .loading-spinner{text-align:center;margin:20px 0}
    .progress-info{margin-top:10px;font-style:italic;color:#6c757d}
    .loading-gif{width:80px;margin:0 auto 10px;display:block}
    
    /* Estilos unificados para imágenes de Vegapunk */
    .vegapunk-button {
      cursor: pointer;
      display: block;
      margin: 0 auto 20px;
      width: 280px;
      height: auto;
      position: relative;
      transform: scale(1.2); /* Aumentar tamaño visual en un 20% */
      transform-origin: center center;
      z-index: 2; /* Asegurar que esté por encima de otros elementos */
    }

    .vegapunk-image {
      width: 280px;
      max-width: 280px;
      margin-right: 20px;
      flex: 0 0 280px;
      position: relative;
      transform: scale(1.3); /* Aumentar tamaño visual en un 30% */
      transform-origin: left center; /* Punto de origen a la izquierda para que se expanda hacia la derecha */
      z-index: 2; /* Asegurar que esté por encima del bocadillo */
    }
    
    #query-form {
      display: none;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* Estilos para el bocadillo de texto */
    .vegapunk-response-container,
    .vegapunk-intro-container,
    .loading-container {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      margin: 20px auto;
      gap: 15px;
    }
    
    .bubble-container {
      position: relative;
      flex: 1;
      max-width: 70%;
    }
    
    .speech-bubble,
    .intro-bubble {
      position: relative;
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-left: 15px;
      white-space: pre-wrap;
      flex: 1;
    }
    
    /* Estilo específico para el bocadillo de carga con fondo de Punk Records */
    .loading-bubble {
      position: relative;
      background-color: rgba(248, 249, 250, 0.85);
      background-image: url('https://static.wikia.nocookie.net/onepiece/images/d/d3/Punk_Records_Infobox.png');
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain; 
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-left: 15px;
      white-space: pre-wrap;
      flex: 1;
      min-height: 200px;
    }
    
    /* Estilos para el texto dentro del bocadillo de carga */
    .loading-bubble p {
      text-shadow: 0px 0px 5px #fff, 0px 0px 5px #fff, 0px 0px 5px #fff;
      font-weight: bold;
      color: #333;
      text-align: center;
    }
    
    .loading-bubble .progress-info {
      position: relative;
      background-color: rgba(255, 255, 255, 0.8);
      padding: 5px;
      border-radius: 5px;
      margin-top: 120px; /* Espacio para posicionar debajo de la imagen de fondo */
      text-align: center;
      font-style: italic;
      color: #6c757d;
    }
    
    .speech-bubble:before,
    .intro-bubble:before,
    .loading-bubble:before {
      content: "";
      position: absolute;
      left: -10px;
      top: 40px;
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-right: 10px solid #f8f9fa;
      z-index: 1;
    }
    
    .speech-bubble:after,
    .intro-bubble:after,
    .loading-bubble:after {
      content: "";
      position: absolute;
      left: -11px;
      top: 40px;
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-right: 10px solid #ddd;
      z-index: 0;
    }
    
    /* Ajuste específico para el triángulo del bocadillo de carga */
    .loading-bubble:before {
      border-right-color: rgba(248, 249, 250, 0.85);
    }
    
    .sources-container {
      margin-top: 15px;
      font-size: 0.9em;
      color: #666;
    }
    
    /* Estilos para la introducción de Vegapunk */
    .vegapunk-intro-container {
      display: none;
    }
    
    /* Estilo para el estado de carga con bocadillo */
    .loading-container {
      display: none;
    }
    
    /* Estilo para la sección de fuentes y botón */
    .sources-and-actions {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-top: 15px;
      gap: 20px;
    }
    
    .sources-section {
      flex: 1;
    }
    
    .actions-section {
      display: flex;
      justify-content: flex-end;
    }
    
    /* Estilos para el selector y cuadro de texto */
    .theme-selector {
      margin: 20px auto;
      max-width: 400px;
    }
    
    .theme-selector h4 {
      margin-bottom: 10px;
    }
    
    .form-group {
      margin: 20px auto;
      max-width: 100%; /* Cambiado de 500px a 100% */
      padding: 0 15px; /* Añadir un pequeño padding lateral */
    }

    #question {
      height: 80px;
      padding: 10px;
      font-size: 16px;
      width: 100%; /* Asegurar que ocupe todo el ancho */
    }
    
    #submit-query {
      margin: 10px auto;
      min-width: 200px;
    }
  </style>
</head>

<body>
  {$header}
  <div class="fondo-blanco">
    

  {$footer}
</body>
</html>
