<html>
<head>
  <title>Pago de Recompensas - One Piece Gaiden</title>
  {$headerinclude}
  <style>
    .mainBackground {
        background-color: #1a1a2e;
        min-height: 100vh;
        padding: 20px;
    }

    .secondBackground {
        background: linear-gradient(135deg, #0f3443, #16213e);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .akumaBanner {
        background: linear-gradient(90deg, transparent 0%, #ff7b00 20%, #ff9500 50%, #ff7b00 80%, transparent 100%);
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        width: 100%;
    }

    .infoPanel {
        background: linear-gradient(135deg, #2c3e50, #34495e);
        border: 3px solid #e74c3c;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        color: white;
        width: 100%;
        box-sizing: border-box;
    }

    .infoPanel h3 {
        font-family: 'moonGetHeavy';
        color: #ff7b00;
        font-size: 20px;
        margin-bottom: 15px;
        text-transform: uppercase;
    }

    .infoPanel a {
        color: #4db8ff;
        text-decoration: none;
        transition: color 0.3s;
    }

    .infoPanel a:hover {
        color: #2ecc71;
        text-decoration: underline;
    }

    .participantesGrid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .participanteCard {
        background: linear-gradient(135deg, #16a085, #1abc9c);
        border: 3px solid #0f7864;
        border-radius: 12px;
        padding: 15px;
        color: white;
    }

    .participanteCard.narrador {
        background: linear-gradient(135deg, #8e44ad, #9b59b6);
        border-color: #6c3483;
    }

    .participanteCard h4 {
        font-family: 'moonGetHeavy';
        font-size: 18px;
        margin-bottom: 10px;
        color: white;
        text-shadow: 2px 2px 4px black;
    }

    .participanteInfo {
        font-family: 'InterRegular';
        font-size: 14px;
        margin: 5px 0;
    }

    .btnPagar {
        padding: 15px 30px;
        background: linear-gradient(135deg, #27ae60, #2ecc71);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'moonGetHeavy';
        font-size: 18px;
        margin: 20px auto;
        display: block;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
    }

    .btnPagar:hover {
        background: linear-gradient(135deg, #229954, #27ae60);
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
    }

    .errorMsg {
        background: linear-gradient(135deg, #c0392b, #e74c3c);
        border: 3px solid #8b1e1e;
        border-radius: 12px;
        padding: 20px;
        color: white;
        text-align: center;
        font-family: 'moonGetHeavy';
        font-size: 18px;
        width: 100%;
        box-sizing: border-box;
    }

    .recompensasContainer {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .tierBadge {
        display: inline-flex;
        padding: 6px 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, #ff7b00, #ff9500);
        color: white;
        font-family: 'moonGetHeavy';
        font-size: 13px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        box-shadow: 0 2px 6px rgba(255, 123, 0, 0.3);
    }

    .dificultadBadge {
        display: inline-flex;
        padding: 6px 14px;
        border-radius: 999px;
        font-family: 'moonGetHeavy';
        font-size: 12px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .inframundoBadge {
        display: inline-flex;
        padding: 6px 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, #8b0000, #c41e3a);
        color: #ffcccc;
        font-family: 'moonGetHeavy';
        font-size: 12px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border: 1px solid rgba(255, 68, 68, 0.3);
        box-shadow: 0 2px 6px rgba(139, 0, 0, 0.4);
    }

    .infoBadge {
        display: inline-flex;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.8);
        font-family: 'InterRegular';
        font-size: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .tierDescripcion {
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 123, 0, 0.3);
        color: rgba(255, 255, 255, 0.85);
        font-family: 'InterRegular';
        font-size: 13px;
        line-height: 1.5;
    }

    .registroListas {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 15px;
    }

    .registroListaWrapper {
        flex: 1 1 240px;
        min-width: 240px;
    }

    .registroListas ul {
        list-style: none;
        margin: 0;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.25);
    }

    .registroListas li {
        font-size: 13px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.9);
        font-family: 'InterRegular';
    }

    .registroListas li:last-child {
        border-bottom: none;
    }

    .registroListTitle {
        font-family: 'moonGetHeavy';
        font-size: 13px;
        color: #ffb347;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
        display: inline-block;
    }

    .configSection {
        margin-bottom: 20px;
    }

    .configLabel {
        display: block;
        font-family: 'moonGetHeavy';
        color: #2ecc71;
        font-size: 14px;
        margin-bottom: 8px;
        letter-spacing: 0.4px;
    }

    .configInput {
        width: 100%;
        padding: 0px 5px;
        border-radius: 8px;
        border: 2px solid rgba(39, 174, 96, 0.4);
        background: rgba(0, 0, 0, 0.3);
        color: white;
        font-family: 'InterRegular';
        font-size: 14px;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .configInput:focus {
        outline: none;
        border-color: #2ecc71;
        box-shadow: 0 0 10px rgba(39, 174, 96, 0.3);
    }

    .configInputSmall {
        padding: 6px 8px;
        border-radius: 6px;
        border: 2px solid rgba(39, 174, 96, 0.4);
        background: rgba(0, 0, 0, 0.3);
        color: white;
        font-family: 'InterRegular';
        font-size: 13px;
        transition: all 0.3s ease;
        box-sizing: border-box;
        text-align: center;
    }

    .configInputSmall:focus {
        outline: none;
        border-color: #2ecc71;
        box-shadow: 0 0 8px rgba(39, 174, 96, 0.3);
    }

    .participantesCheckList {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 300px;
        overflow-y: auto;
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .participanteCheckItem {
        display: flex;
        align-items: center;
        padding: 10px;
        background: rgba(22, 160, 133, 0.15);
        border: 1px solid rgba(22, 160, 133, 0.3);
        border-radius: 8px;
        transition: all 0.2s ease;
        gap: 12px;
        flex-wrap: wrap;
    }

    .participanteCheckItem:hover {
        background: rgba(22, 160, 133, 0.25);
        border-color: rgba(22, 160, 133, 0.5);
    }

    .participanteCheck {
        width: 20px;
        height: 20px;
        cursor: pointer;
        margin-right: 12px;
    }

    .participanteCheckLabel {
        display: flex;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
        flex: 1;
    }

    .participanteNombre {
        font-family: 'moonGetHeavy';
        color: white;
        font-size: 15px;
    }

    .participanteStats {
        font-family: 'InterRegular';
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
    }

    .participanteExtras {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
    }
  </style>
</head>

<body>
  {$header}
  <div class="indice">
    <div class="mainBackground">
      <div class="secondBackground">
        <div class="recompensasContainer">
          <!-- Banner principal -->
          <div class="akumaBanner">
            <span style="font-family: 'moonGetHeavy'; font-size: 42px; color: white; text-shadow: 3px 3px 6px black; letter-spacing: 2px;">
              PAGO DE RECOMPENSAS
            </span>
          </div>

          {$contenido_aventura}
        </div>
      </div>
    </div>
  </div>

  {$footer}
  
  <script>
  // Función para calcular porcentaje base (replica la lógica PHP)
  // Límites: mínimo 0%, máximo 150%
  function calcularPorcentajeBase(postsValidos, postsEsperados) {
    if (postsEsperados <= 0) return 100.0;
    
    var porcentaje = 0;
    if (postsValidos <= postsEsperados) {
      porcentaje = (postsValidos / postsEsperados) * 100;
    } else {
      var postsExtra = postsValidos - postsEsperados;
      var valorPostNormal = 100 / postsEsperados;
      var valorPostExtra = valorPostNormal / 2;
      porcentaje = 100 + (postsExtra * valorPostExtra);
    }
    
    // Aplicar límites: mínimo 0%, máximo 150%
    return Math.max(0, Math.min(150, porcentaje));
  }

  // Función principal para actualizar todos los cálculos
  function actualizarTodosDatos() {
    const tierSelect = document.getElementById('tierPago');
    const porcentajeExtraInput = document.getElementById('porcentajeExtraJugador');
    const numParticipantesInput = document.getElementById('numParticipantes');
    const postsMinimosRequeridosSpan = document.getElementById('postsMinimosRequeridos');
    const postsBaseCalculoSpan = document.getElementById('postsBaseCalculo');
    const participantesCalculoSpan = document.getElementById('participantesCalculo');
    const iconoCumpleMinimoSpan = document.getElementById('iconoCumpleMinimo');
    const infoPostsValidosDiv = document.getElementById('infoPostsValidos');
    
    if (!tierSelect || !postsMinimosRequeridosSpan) {
      return;
    }
    
    console.log('[actualizarTodosDatos] Iniciando actualización de cálculos...');
    
    // Obtener opción seleccionada
    const selectedOption = tierSelect.options[tierSelect.selectedIndex];
    
    // Detectar si es una autonarrada SOLO por el valor del select
    const esAutonarrada = (selectedOption.value === 'autonarrada');
	  
    // Obtener valores actuales
    let postsEsperados = parseInt(selectedOption.getAttribute('data-posts-base')) || 0;
    const porcentajeExtra = porcentajeExtraInput ? (parseFloat(porcentajeExtraInput.value) || 0) : 0;
    let numParticipantes = numParticipantesInput ? (parseInt(numParticipantesInput.value) || 1) : 1;
    
    console.log('[actualizarTodosDatos] Tier:', selectedOption.value, 'Es autonarrada:', esAutonarrada, 'Posts esperados:', postsEsperados, 'Porcentaje extra:', porcentajeExtra);
    
    // Para autonarradas, forzar posts esperados = 1 y participantes = 1
    if (esAutonarrada) {
      postsEsperados = 1;
      numParticipantes = 1;
    }
    
    // Actualizar posts mínimos
    const postsMinimos = postsEsperados * numParticipantes;
    const postsValidos = parseInt(infoPostsValidosDiv.getAttribute('data-posts-validos')) || 0;
    const cumpleMinimo = postsValidos >= postsMinimos;
    
    postsMinimosRequeridosSpan.textContent = postsMinimos;
    postsBaseCalculoSpan.textContent = postsEsperados;
    participantesCalculoSpan.textContent = numParticipantes;
    iconoCumpleMinimoSpan.textContent = cumpleMinimo ? '✓' : '✗';
    iconoCumpleMinimoSpan.style.color = cumpleMinimo ? '#2ecc71' : '#e74c3c';
    
    // Actualizar posts mínimos individuales en cada tarjeta de narrador/jugador
    document.querySelectorAll('.posts-validos-info').forEach(function(element) {
      const postsMinimosSpan = element.querySelector('.posts-minimos-base');
      const postsValidosCantidad = element.querySelector('.posts-validos-cantidad');
      const iconoCumple = element.querySelector('.icono-cumple-minimo');
      
      if (postsMinimosSpan) {
        postsMinimosSpan.textContent = postsEsperados;
      }
      
      // Actualizar icono de cumplimiento individual
      if (iconoCumple && postsValidosCantidad) {
        const postsValidosActuales = parseInt(postsValidosCantidad.textContent) || 0;
        if (postsValidosActuales >= postsEsperados) {
          iconoCumple.textContent = '✓';
          iconoCumple.style.color = '#28a745';
        } else {
          iconoCumple.textContent = '✗';
          iconoCumple.style.color = '#dc3545';
        }
      }
    });
    
    // Actualizar porcentajes de narradores
    const narradorPorcentajes = document.querySelectorAll('.narrador-porcentaje');
    narradorPorcentajes.forEach(function(elemento) {
      const postsValidosOriginales = parseInt(elemento.getAttribute('data-posts-validos')) || 0;
      const uid = elemento.getAttribute('data-uid');
      
      // Obtener posts extras del input específico (variación de posts)
      const inputPostsExtras = document.getElementById('extra_narrador_' + uid);
      const postsExtras = inputPostsExtras ? (parseFloat(inputPostsExtras.value) || 0) : 0;
      
      // AJUSTAR posts válidos con la variación ANTES de calcular el porcentaje base
      const postsValidosAjustados = postsValidosOriginales + postsExtras;
      
      // Calcular porcentaje base con posts ajustados
      const porcentajeBase = calcularPorcentajeBase(postsValidosAjustados, postsEsperados);
      
      // Sumar porcentaje extra por jugadores
      let porcentajeFinal = porcentajeBase + porcentajeExtra;
      
      // Limitar a 200% (ya no hay reducción)
      porcentajeFinal = Math.max(0, Math.min(200, porcentajeFinal));
      
      console.log('[Narrador UID ' + uid + '] Posts originales:', postsValidosOriginales, '+ Variación:', postsExtras, '= Posts ajustados:', postsValidosAjustados, '| Porcentaje base:', porcentajeBase.toFixed(2), '+ Extra:', porcentajeExtra, '= Final:', porcentajeFinal.toFixed(2));
      
      elemento.setAttribute('data-base-porcentaje', porcentajeBase.toFixed(2));
      elemento.textContent = porcentajeFinal.toFixed(2) + '%';
      
      // Actualizar también el porcentaje en la tarjeta del narrador
      const cardElement = document.querySelector('.narrador-porcentaje-card[data-uid="' + uid + '"]');
      if (cardElement) {
        cardElement.textContent = porcentajeFinal.toFixed(2) + '%';
      }
    });
    
    // Actualizar porcentajes de jugadores
    const jugadorPorcentajes = document.querySelectorAll('.jugador-porcentaje');
    jugadorPorcentajes.forEach(function(elemento) {
      const postsValidosOriginales = parseInt(elemento.getAttribute('data-posts-validos')) || 0;
      const uid = elemento.getAttribute('data-uid');
      
      // Obtener posts extras del input específico (variación de posts)
      const inputPostsExtras = document.getElementById('extra_jugador_' + uid);
      const postsExtras = inputPostsExtras ? (parseFloat(inputPostsExtras.value) || 0) : 0;
      
      // AJUSTAR posts válidos con la variación ANTES de calcular el porcentaje base
      const postsValidosAjustados = postsValidosOriginales + postsExtras;
      
      // Calcular porcentaje base con posts ajustados
      let porcentajeFinal = calcularPorcentajeBase(postsValidosAjustados, postsEsperados);
      
      // Para jugadores, el límite también es 200% (por si en el futuro se añade porcentaje extra)
      porcentajeFinal = Math.max(0, Math.min(200, porcentajeFinal));
      
      console.log('[Jugador UID ' + uid + '] Posts originales:', postsValidosOriginales, '+ Variación:', postsExtras, '= Posts ajustados:', postsValidosAjustados, '| Porcentaje final:', porcentajeFinal.toFixed(2));
      
      elemento.setAttribute('data-base-porcentaje', porcentajeFinal.toFixed(2));
      elemento.textContent = porcentajeFinal.toFixed(2) + '%';
    });
  }
  
  // Agregar listeners cuando el documento esté listo
  document.addEventListener('DOMContentLoaded', function() {
    const tierSelect = document.getElementById('tierPago');
    const numParticipantesInput = document.getElementById('numParticipantes');
    const porcentajeExtraInput = document.getElementById('porcentajeExtraJugador');
    
    // Listeners principales
    if (tierSelect) {
      tierSelect.addEventListener('change', actualizarTodosDatos);
    }
    
    if (numParticipantesInput) {
      numParticipantesInput.addEventListener('input', actualizarTodosDatos);
      numParticipantesInput.addEventListener('change', actualizarTodosDatos);
    }
    
    if (porcentajeExtraInput) {
      porcentajeExtraInput.addEventListener('input', actualizarTodosDatos);
      porcentajeExtraInput.addEventListener('change', actualizarTodosDatos);
    }
    
    // Listeners para inputs de posts extras de narradores y selects de tier
    document.querySelectorAll('.configInputSmall[id^="extra_narrador_"]').forEach(function(input) {
      input.addEventListener('input', actualizarTodosDatos);
      input.addEventListener('change', actualizarTodosDatos);
    });
    
    // Listeners para inputs de posts extras de jugadores
    document.querySelectorAll('.configInputSmall[id^="extra_jugador_"]').forEach(function(input) {
      input.addEventListener('input', actualizarTodosDatos);
      input.addEventListener('change', actualizarTodosDatos);
    });
    
    document.querySelectorAll('.tier-narrador-select').forEach(function(select) {
      select.addEventListener('change', actualizarTodosDatos);
    });
    
    // Ejecutar actualización inicial
    actualizarTodosDatos();
  });
  
  function procesarPagoRecompensas(tid, event) {
    // Recoger configuración
    const tier = document.getElementById('tierPago').value;
    const porcentajeNarrador = document.getElementById('porcentajeExtraJugador').value;
    const numParticipantes = document.getElementById('numParticipantes').value;
    const aplicarBonificacion = document.getElementById('aplicarBonificacion').checked;
    const verificarMinimos = document.getElementById('verificarMinimos').checked;
    
    // Recoger narradores seleccionados, sus posts extras y tier
    const narradores = [];
    document.querySelectorAll('.participanteCheck[id^="narrador_"]:checked').forEach(checkbox => {
      const uid = checkbox.value;
      const extraPosts = document.getElementById('extra_narrador_' + uid).value || 0;
      const tierNarradorSelect = document.getElementById('tier_narrador_' + uid);
      const tierNarrador = tierNarradorSelect ? tierNarradorSelect.value : 'aprendiz';
      
      // Obtener el porcentaje calculado del span
      const porcentajeSpan = document.querySelector('.narrador-porcentaje[data-uid="' + uid + '"]');
      let porcentajeParticipacion = 100;
      if (porcentajeSpan) {
        // Eliminar el símbolo % antes de parsear
        const textoLimpio = porcentajeSpan.textContent.replace('%', '').trim();
        porcentajeParticipacion = parseFloat(textoLimpio) || 100;
      }
      
      console.log('Narrador UID ' + uid + ': porcentaje = ' + porcentajeParticipacion);
      
      narradores.push({
        uid: uid,
        extra_posts: parseFloat(extraPosts),
        tier_narrador: tierNarrador,
        porcentaje_participacion: porcentajeParticipacion
      });
    });
    
    // Recoger jugadores seleccionados y sus posts extras
    const jugadores = [];
    document.querySelectorAll('.participanteCheck[id^="jugador_"]:checked').forEach(checkbox => {
      const uid = checkbox.value;
      const extraPosts = document.getElementById('extra_jugador_' + uid) ? 
                         document.getElementById('extra_jugador_' + uid).value : 0;
      
      // Obtener el tipo de reputación seleccionado
      const tipoReputacionSelect = document.getElementById('tipo_reputacion_' + uid);
      const tipoReputacion = tipoReputacionSelect ? tipoReputacionSelect.value : 'positiva';
      
      // Obtener el porcentaje calculado del span
      const porcentajeSpan = document.querySelector('.jugador-porcentaje[data-uid="' + uid + '"]');
      let porcentajeParticipacion = 100;
      if (porcentajeSpan) {
        // Eliminar el símbolo % antes de parsear
        const textoLimpio = porcentajeSpan.textContent.replace('%', '').trim();
        porcentajeParticipacion = parseFloat(textoLimpio) || 100;
      }
      
      console.log('Jugador UID ' + uid + ': porcentaje = ' + porcentajeParticipacion + ', tipo_reputacion = ' + tipoReputacion);
      
      jugadores.push({
        uid: uid,
        extra_posts: parseFloat(extraPosts),
        porcentaje_participacion: porcentajeParticipacion,
        tipo_reputacion: tipoReputacion
      });
    });
    
    // Validación básica
    if (narradores.length === 0 && jugadores.length === 0) {
      alert('⚠️ Debes seleccionar al menos un participante para recibir pago.');
      return;
    }
    
    // Confirmación
    const mensaje = '¿Confirmar pago de recompensas?\n\n' +
                    'Tier: ' + tier + '\n' +
                    'Narradores: ' + narradores.length + '\n' +
                    'Jugadores: ' + jugadores.length + '\n' +
                    'Porcentaje narrador: ' + porcentajeNarrador + '%\n\n' +
                    'Esta acción procesará el pago para los participantes seleccionados.';
    
    if (!confirm(mensaje)) {
      return;
    }
    
    // Preparar datos para enviar
    const datos = {
      tid: tid,
      tier: tier,
      porcentaje_narrador: porcentajeNarrador,
      num_participantes: parseInt(numParticipantes),
      aplicar_bonificacion: aplicarBonificacion,
      verificar_minimos: verificarMinimos,
      narradores: narradores,
      jugadores: jugadores
    };
    
    console.log('Datos a procesar:', datos);
    
    // Mostrar loading
    const btnPagar = event.target;
    const textoOriginal = btnPagar.textContent;
    btnPagar.disabled = true;
    btnPagar.textContent = '⏳ PROCESANDO...';
    btnPagar.style.opacity = '0.6';
    
    // Determinar la URL correcta (mismo directorio que la página actual)
    const currentPath = window.location.pathname;
    const fetchUrl = currentPath.replace(/\/[^\/]*$/, '/recompensasAventuras.php') + '?action=procesar_pago';
    
    console.log('Enviando petición a:', fetchUrl);
    console.log('Datos:', datos);
    
    // Enviar petición AJAX
    fetch(fetchUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: JSON.stringify(datos)
    })
    .then(r => {
      console.log('Status:', r.status);
      console.log('Content-Type:', r.headers.get('content-type'));
      
      if (!r.ok) {
        throw new Error('Error HTTP: ' + r.status);
      }
      
      const contentType = r.headers.get('content-type');
      if (!contentType || !contentType.includes('application/json')) {
        return r.text().then(text => {
          console.error('Respuesta no-JSON recibida:', text.substring(0, 1000));
          console.error('URL llamada:', fetchUrl);
          throw new Error('El servidor devolvió HTML en lugar de JSON. Error: ' + text.substring(0, 200));
        });
      }
      
      return r.json();
    })
    .then(data => {
      console.log('Respuesta recibida:', data);
      btnPagar.disabled = false;
      btnPagar.textContent = textoOriginal;
      btnPagar.style.opacity = '1';
      
      if (data.ok) {
        alert('✓ Pago procesado correctamente\n\n' + 
              'Se han pagado ' + data.pagos + ' participantes.\n' +
              'Se ha creado un post en el tema con los detalles.\n' +
              'El tema ha sido cerrado.');
        // Redirigir a la calculadora de tiers
        window.location.href = 'https://onepiecegaiden.com/op/Calculadora_Tiers.php';
      } else {
        let errorMsg = '✗ Error al procesar el pago:\n\n' + (data.error || 'Error desconocido');
        if (data.trace) {
          console.error('Stack trace:', data.trace);
          errorMsg += '\n\nAvisa al Gorosei.';
        }
        alert(errorMsg);
      }
    })
    .catch(err => {
      btnPagar.disabled = false;
      btnPagar.textContent = textoOriginal;
      btnPagar.style.opacity = '1';
      alert('✗ Error de conexión:\n\n' + err.message);
    });
  }
  </script>
</body>
</html>
