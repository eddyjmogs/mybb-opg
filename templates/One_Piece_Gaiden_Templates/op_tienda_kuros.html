		}
		
		.incrementar-item {

			width: 20px;
			height: 20px;
			text-align: center;
			margin-bottom: 4px;
			cursor: pointer;
			transition: all 0.2s ease-out;
			padding: 2px 1px;
   			border-radius: 2px;
		}
		
		.decrementar-item {
			background-color: #2e2e2e;width: 20px;height: 20px;text-align: center;cursor: pointer;transition: all 0.2s ease-out;
			padding: 2px 1px;
    		border-radius: 2px;
		}
		
		.incrementar-item:hover, .decrementar-item:hover  {
			background-color: #ff8500;
		}
		
		.nikab {

			height: 20px;

			top: 4px;
		}
		
		.mainBackground { background-color: #571945; }
		.secondBackground { background-color: #430d34; }
		.thirdBackground { background-color: #2f0f26; }

$('.item-outer').on('click', function() {
	
	// testItem = $(this);
	let objeto = objetos[$(this)[0].id][0];
	
	if ($(this).hasClass('item-active')) {
		$(this).removeClass('item-active');
		
		
		let cantidad = $('#compra-' + objeto.objeto_id + ' .itemCantidad').text();
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) - (parseInt(objeto.berries) * cantidad);
		saldoRestante = saldoRestante + (parseInt(objeto.berries) * cantidad);
		console.log(saldoRestante);
		comprasTotal = comprasTotal.toLocaleString('es-es');

		$('#comprasTotal').html(comprasTotal);
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		$('#compra-' + objeto.objeto_id).remove();
		if (comprasTotal == '0') {
			$('#button-comprar').css('background-color', 'gray');
		}
		delete listaDeCompras[objeto.objeto_id];
	} else {	
		
		if (saldoRestante - parseInt(objeto.berries) >= 0) {
			
			if (comprasTotal == '0') {
				$('#button-comprar').css('background-color', '#9664e0');
			}
			
			comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) + parseInt(objeto.berries);
			saldoRestante = saldoRestante - parseInt(objeto.berries);
			comprasTotal = comprasTotal.toLocaleString('es-es');

			$('#comprasTotal').html(comprasTotal);
			$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));

function incrementarItem(item) {
	let itemCantidadId = '#' + item +  ' .itemCantidad';
	let itemId = item.replace('compra-', '');
	let itemCantidad = parseInt($(itemCantidadId).text());
	
	let berries = parseInt(objetos[itemId][0].berries);

	if (itemCantidad < 10 && (saldoRestante - berries >= 0)) {
		saldoRestante = saldoRestante - berries;
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) + berries;
		comprasTotal = comprasTotal.toLocaleString('es-es');
		$('#comprasTotal').html(comprasTotal);
		$(itemCantidadId).text(itemCantidad + 1);
		listaDeCompras[itemId]['cantidad'] = listaDeCompras[itemId]['cantidad'] + 1;
	}
	
}
	
function decrementarItem(item) {
	let itemCantidadId = '#' + item +  ' .itemCantidad';
	let itemId = item.replace('compra-', '');
	let itemCantidad = parseInt($(itemCantidadId).text());
	
	let berries = parseInt(objetos[itemId][0].berries);
	
	if (itemCantidad > 1) {
		saldoRestante = saldoRestante + berries;
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) - berries;
		comprasTotal = comprasTotal.toLocaleString('es-es');
		$('#comprasTotal').html(comprasTotal);
		
		$(itemCantidadId).text(itemCantidad - 1);
		listaDeCompras[itemId]['cantidad'] = listaDeCompras[itemId]['cantidad'] - 1;
	}
}
	
function comprarItems() {
	if (comprasTotal != '0') {
		
		if (listaDeCompras['CFR001'] && (listaDeCompras['CFR001'].cantidad + parseInt(cofre1_count) > 5)) {
			alert('Solo puedes comprar un máximo de 5 cofres básicos al mes.');
			return;
		}
		if (listaDeCompras['CFR002'] && (listaDeCompras['CFR002'].cantidad + parseInt(cofre2_count) > 5)) {
			alert('Solo puedes comprar un máximo de 5 cofres decentes al mes.');
			return;
		}
		if (listaDeCompras['CFR003'] && (listaDeCompras['CFR003'].cantidad + parseInt(cofre3_count) > 5)) {
			alert('Solo puedes comprar un máximo de 5 cofres gigantes al mes.');
			return;
		}
		if (listaDeCompras['CFR004'] && (listaDeCompras['CFR004'].cantidad + parseInt(cofre4_count) > 5)) {
			alert('Solo puedes comprar un máximo de 5 cofres cobrizos al mes.');
			return;
		}
		if (listaDeCompras['CFR005'] && (listaDeCompras['CFR005'].cantidad + parseInt(cofre5_count) > 5)) {
			alert('Solo puedes comprar un máximo de 5 cofres argénteos al mes.');
			return;
		}
		
		if (confirm('¿Estás de acuerdo con esta compra de ' + comprasTotal + ' Kuros?')) {

			$.post("/op/tienda_kuros.php", { 
				accion: 'comprar',
				comprasTotal: parseInt(comprasTotal.replace(/\./g, '')),
				listaDeCompras: listaDeCompras,
				listaDeComprasKeys: Object.keys(listaDeCompras)
			}, function( data ) { 
				console.log(data);
				alert('¡Compra realizada! Serás redirigido al índice.');
				window.location = "/op/tienda_kuros.php";
			});
		}
		
		
	}
}
	
function clickTipo(tipo) {
	$('.tienda_tipos').removeClass('tienda_tipos_active');

	if (tipo == 'items') {
		$('#objetos_items').css('display', 'block');
		$('#objetos_upgrades').css('display', 'none');
		
		$('#items').addClass('tienda_tipos_active');
	}

	if (tipo == 'upgrades') {
		$('#objetos_items').css('display', 'none');
		$('#objetos_upgrades').css('display', 'block');
		
		$('#upgrades').addClass('tienda_tipos_active');
	}
	
}
