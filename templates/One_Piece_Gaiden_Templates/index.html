<style>
    /* Estilo base para el botón de Discord */
    .discord-button-container {
        position: fixed;
        margin: 0px;
        cursor: pointer;
        border-radius: 1000px;
        color: #fff;
        font-size: 18px;
        z-index: 999; /* Mayor z-index para asegurar que esté por encima */
        text-align: center;
        left: 23px;
        bottom: 17px;
        transition: all 0.3s ease;
    }
    
    .discord-button {
        width: 66px;
        height: auto;
        transition: all 0.3s ease;
    }
    
    /* Media query para dispositivos móviles */
    @media only screen and (max-width: 768px) {
        .discord-button {
            width: 90px !important; /* Uso de !important para mayor precedencia */
        }
        
        .discord-button-container {
            left: 15px;
            bottom: 15px;
        }
    }
    
    /* Para pantallas muy pequeñas */
    @media only screen and (max-width: 480px) {
        .discord-button {
            width: 120px !important; /* Aún más grande y con !important */
        }
        
        .discord-button-container {
            left: 10px;
            bottom: 10px;
        }
    }
</style>
