	function displayModalContent(body, height, width) {
		return `
			<div class="modal-content" style=" background-color: #ffedd2; border: 4px solid #ffe59b; border-radius: 8px; height: ` + height + `px; width: ` + width + `px; ">
				<div class="modal-body" style=" display: flex; flex-direction: column; ">
					` + body + `

		`;
	}
	
	function chooseEstilo(estilo) {
