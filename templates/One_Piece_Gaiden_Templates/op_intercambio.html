<script>
	
	let intercambios_json = {$intercambios_json};
	let faccionOwn = "{$ficha['faccion']}";
	
	for (let i = 0; i < intercambios_json.length; i++) {
        let intercambioUserId = intercambios_json[i].uid;
        let nombre = intercambios_json[i].nombre;
        let timestamp = new Date(parseInt(intercambios_json[i].timestamp) * 1000).toLocaleString('es-es');
        let rNombre = intercambios_json[i].r_nombre;
        let dinero = intercambios_json[i].dinero;
        let justificacion = intercambios_json[i].razon;
        let objetosNombre = intercambios_json[i].objetos_nombre;
        
        let faccion = intercambios_json[i].faccion;
        let rFaccion = intercambios_json[i].r_faccion;
        
        if (dinero == '0' || dinero == '') {
            dinero = '';
        } else {
            dinero = parseInt(dinero).toLocaleString('es-es') + ' Berries, ';
        }
        
        let objetosLista = (dinero + objetosNombre).replace(/, $/, '');;
        
        let faccionColor = 'black';
        let rFaccionColor = 'black';
        
        if (faccion == 'Marina') { faccionColor = '#00A9FF'; }
        if (faccion == 'Pirata') { faccionColor = '#e9042a'; }
        if (faccion == 'CipherPol') { faccionColor = '#9b389d'; }
        if (faccion == 'Civil') { faccionColor = '#E5097F'; }
        if (faccion == 'Cazadores') { faccionColor = '#2D572C'; }
        if (faccion == 'Revolucionario') { faccionColor = '#B9935A'; }
        
        if (rFaccion == 'Marina') { rFaccionColor = '#00A9FF'; }
        if (rFaccion == 'Pirata') { rFaccionColor = '#e9042a'; }
        if (rFaccion == 'CipherPol') { rFaccionColor = '#9b389d'; }
        if (rFaccion == 'Civil') { rFaccionColor = '#E5097F'; }
        if (rFaccion == 'Cazadores') { rFaccionColor = '#2D572C'; }
        if (rFaccion == 'Revolucionario') { rFaccionColor = '#B9935A'; }
        
        // Detectar si la justificación necesita botón de expansión
        let needsToggle = justificacion.length > 120; // Aproximadamente 3 líneas
        let toggleButton = needsToggle ? '<button class="justificacion-toggle" onclick="toggleJustificacion(this)"></button>' : '';
        let gradientOverlay = needsToggle ? '<div class="justificacion-gradient"></div>' : '';

        // Detectar si los items necesitan botón de expansión
        let needsItemsToggle = objetosLista.length > 80; // Aproximadamente 3 líneas para items
        let itemsToggleButton = needsItemsToggle ? '<button class="items-toggle" onclick="toggleItems(this)"></button>' : '';
        let itemsGradientOverlay = needsItemsToggle ? '<div class="items-gradient"></div>' : '';

        $('#historial').append(`
            <div class="resultado-total" style="display: flex; flex-direction: row;">
                <div class="resultado-nombre"><a href='/op/ficha.php?uid=` + intercambioUserId + `' style="color: ` + faccionColor + `;" class="username_bright">` + nombre + `</a> entrega a... <br>` + timestamp + `</div>
                <div class="resultado-receptor"> <a href="/op/ficha.php?uid=` + intercambios_json[i].r_uid + `" style="color: ` + rFaccionColor + `;" class="username_bright">` + rNombre + `</a></div>
                <div class="resultado-items">
                    <div class="items-content">ID del Tema: <a href="/showthread.php?tid=` + intercambios_json[i].tid + `">` + intercambios_json[i].tid + `</a><br>` + objetosLista + `</div>
                    ` + itemsGradientOverlay + `
                    ` + itemsToggleButton + `
                </div>
                <div class="resultado-justificacion">
                    <div class="justificacion-content">` + justificacion + `</div>
                    ` + gradientOverlay + `
                    ` + toggleButton + `
                </div>
            </div>
        `);
    }
	let userId = '{$uid}';
	
    // Función para toggle de justificación
    function toggleJustificacion(button) {
        const justificacionDiv = button.parentElement;
        const isExpanded = justificacionDiv.classList.contains('expanded');
        
        if (isExpanded) {
            justificacionDiv.classList.remove('expanded');
            button.classList.remove('expanded');
        } else {
            justificacionDiv.classList.add('expanded');
            button.classList.add('expanded');
        }
        
        // Añadir efecto de pulso al expandir
        if (!isExpanded) {
            button.style.animation = 'pulse 0.6s ease-out';
            setTimeout(() => {
                button.style.animation = '';
            }, 600);
        }
    }

    // Función para toggle de items
    function toggleItems(button) {
        const itemsDiv = button.parentElement;
        const isExpanded = itemsDiv.classList.contains('expanded');
        
        if (isExpanded) {
            itemsDiv.classList.remove('expanded');
            button.classList.remove('expanded');
        } else {
            itemsDiv.classList.add('expanded');
            button.classList.add('expanded');
        }
        
        // Añadir efecto de pulso al expandir
        if (!isExpanded) {
            button.style.animation = 'pulse 0.6s ease-out';
            setTimeout(() => {
                button.style.animation = '';
            }, 600);
        }
    }

    // Función para toggle de justificación
    function toggleJustificacion(button) {
        const justificacionDiv = button.parentElement;
        const isExpanded = justificacionDiv.classList.contains('expanded');
        
        if (isExpanded) {
            justificacionDiv.classList.remove('expanded');
            button.classList.remove('expanded');
        } else {
            justificacionDiv.classList.add('expanded');
            button.classList.add('expanded');
        }
        
        // Añadir efecto de pulso al expandir
        if (!isExpanded) {
            button.style.animation = 'pulse 0.6s ease-out';
            setTimeout(() => {
                button.style.animation = '';
            }, 600);
        }
    }

	function hacerIntercambio() {
		
		if (!$('#razon').val()) {
			alert('Debes agregar la justificación del tema.');			
		} else if (!$('#idTema').val()) {
			alert('Debes agregar el ID del tema.');	   
		} else if ($('#berries').val() != '' && parseInt($('#berries').val()) < 0) {
			alert('¡No puedes enviar berries negativos, cuidao, eh!');	   	   
		} else if ($('#idTema').val() == '0') {
			alert('Ese ID de tema no existe. ¿Estás seguro de lo que haces?');	   
		} else if (userId == $('#receptor').val()) {
			alert('Te estás enviando a ti mismo, ¿Acaso estamos esquizofrénicos?');	   
		} else if ($('#razon').val().length < 30) {
			alert('La justificación debe ser mínimo 30 carácteres.');	   
		} else {
			
			
		
			if (confirm(`Estas a punto de intercambiar objetos/berries con otro personaje. ¿Estás de acuerdo?`)) {

				$.post("/op/intercambio.php", { tid: $('#idTema').val(), accion: 'chequear_tid', r_id: $('#receptor').val() }, function( data ) {
					console.log(data);
					let rFaccion = data[0].r_faccion;
					
					let faccionValida = true;
					let cancelarIntercambio = false;
					
					if (
						 (faccionOwn == 'Pirata' && (rFaccion == 'Marina' || rFaccion == 'CipherPol' || rFaccion == 'Cazadores')) ||
						 (faccionOwn == 'Marina' && (rFaccion == 'Pirata' || rFaccion == 'Revolucionario')) ||
						 (faccionOwn == 'CipherPol' && (rFaccion == 'Pirata' || rFaccion == 'Revolucionario')) ||
						 (faccionOwn == 'Revolucionario' && (rFaccion == 'Marina' || rFaccion == 'CipherPol' || rFaccion == 'Cazadores')) ||
						 (faccionOwn == 'Cazadores' && (rFaccion == 'Pirata' || rFaccion == 'Revolucionario'))
						) {
						faccionValida = false;
					}
					
					if (faccionValida == false) {
						if (confirm(`Estás intercambiando con una facción rival. \n¿Estás seguro que quieres hacer este intercambio? \n\nSi esta transacción es válida, recuerda describir con detalles tu justificación. Puedes cancelar y agregar más detalles, o confirmar. \n\nEsta transacción será revisada por un miembro del Staff.`)) {
							
						} else {
							cancelarIntercambio = true;
						}
					}
					
					if (data[0].tema_existe != '1') {
						cancelarIntercambio = true;
						alert("El ID del tema no existe, o no es un tema de rol, o no es el ID de tu tema de la tripulación.\n\nPara conseguir el ID de un tema, ve al URL de cualquier tema del foro, y el numero que sale después de '?tid=', ese es el el ID del tema.");
					}
					
					if (data[0].personajesPostearon != '1') {
						cancelarIntercambio = true;
						alert('El ID del tema mencionado no involucra a los personajes que están haciendo el intercambio.');
					}
					
					if (cancelarIntercambio == false) {
						const intercambioObj = { intercambio: 'true', razon: $('#razon').val(), items: $('#items').val(), berries: $('#berries').val(), id: userId, r_id: $('#receptor').val(), tid: $('#idTema').val()};
						$.post("/op/intercambio.php", intercambioObj, function( data ) {
							console.log(data);
							alert(data[0].mensaje_log);

							window.location = "/op/intercambio.php";
						}); 
					}
													
					
					

					
					// window.location = "/op/intercambio.php";
				}); 
				

			}		   
		}
		
	}	  
	
</script>
{$footer}
