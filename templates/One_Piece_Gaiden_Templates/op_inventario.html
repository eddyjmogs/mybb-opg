function calculateBerries(berries) {
	
	if (berries.length > 6) {
		return berries.slice(0, -6) + ' M';
	} else if (berries.length > 3) {
		return berries.slice(0, -3) + ' K';
	} else {
		return 'Infinito';
	}
}

function closeModal() {
	modal.style.display = "none";
}

$(window).click(function(e) {
	if (event.target == modal) {
		modal.style.display = "none";
	}
});
