<html>

<head>
  <title>Lista de Akumas</title>
  {$headerinclude}
  <style>
	  .akumaBanner {
		  width: 100%;
		  height: 75px;
		  background-image: url('https://i.ibb.co/cgdZ0SF/Titulo-Registro-Akumas-One-Piece-Gaiden-Foro-Rol.png');
		  background-size: contain;
		  margin-bottom: 20px;
	  }
	  
	  .filterBox {
		  display:flex; 
		  flex-direction: column;
	  }
	  
	  .tierRow {
		  display: flex;
		  flex-direction: row;
	  }
	  
	  .akumaTypeRow  {
		  display: flex;
		  flex-direction: row;
		  border: 2px solid black;
		  border-radius: 10px 10px 0px 0px;
		  cursor: pointer;
	  }
	  
	  .filterClass span {
		  font-weight: bolder;
		  color: white;
		  text-transform: uppercase;
		  display: inline-block;
		  padding: 5px 10px;
		  font-size: 20px;
		  font-family: 'moonGetHeavy';
	  }
	  
	  .categoriaBox, .tierBox {
		flex: 1; /* Hace que cada caja ocupe el mismo espacio disponible */
  		border-right: 2px solid black; /* Solo para visualización */
		text-align: center;
		background-color: #ff7b00;
	  }
	  
	  .tierBox{
		  border-bottom: 2px solid black;
	  }
	  
	  .categoriaBox:last-child {
		  border: none;
		  border-radius: 0 10px 0 0; 
	  }
	  
	  .categoriaBox:first-child {
			border-radius: 10px 0 0 0; 
	  }
	  
	  .categoriaBox:hover, .tierBox:hover {
		  background-color: #dc822a;
		  cursor: pointer;
	  }
	  
	  .box-active {
		  background-color: #ffa600;
	  }
	  
	  .tierBox:last-child {
		  border-right: 2px solid black;
	  }

  	  .tierBox:first-child {
		  border-left: 2px solid black;
	  }
	  
	  .akumaList {
		margin-top: 20px;
		display: flex;
		flex-wrap: wrap;
		flex-direction: row;
		justify-content: space-between;
		gap: 5px;
	  }
	  
	  .akumaItem {
		  display: flex;
		  cursor: pointer;
		  transition: all 0.2s ease-out;
	  }
	  
	  .akumaItem:hover {
		  filter: drop-shadow(0px 0px 4px black) brightness(1.1);
	  }
	  
	  .nameSection {
		background-color: #ffeed2;
		padding-left: 10px;
		width: 310px;
		border: 2px solid black;
		color: black;
		overflow: hidden;
		height: 50px;
		display: flex;
		align-items: center;
		flex-direction: row;
		justify-content: space-between;
	  }
	  
	  .fruitImage {
		height: 80px;
		display: inline-block;
		top: 10px;
		position: relative;
	  }
	  
	  .statusSection {
		  background-color: red;
		  display: flex;
		  align-items: center;
		  color: white;
		  padding-left: 25px;
		  padding-right: 25px;
		  border-radius: 0px 25px 25px 0px;
		  border: 2px solid black;
		  border-left: none;
		  background: rgb(214,0,0);	  
		  width: 109px;
	  }
	  
	  .statusOcupada {
		  background: linear-gradient(0deg, rgb(132 0 0) 0%, rgba(255,0,0,1) 50%, rgb(169 3 3) 100%);
	  }
	  
	  .statusLibre {
		  background: linear-gradient(0deg, rgb(0 132 49) 0%, rgb(0 255 20) 50%, rgb(0 132 49) 100%);
	  }

	  .akumaName, .akumaDscpt, .statusSection{
		  font-family: 'moonGetHeavy'
	  }
	  
	  .statusSection {
		  font-size: 20px;
	  }

	  .akumaName {
		  font-size: 17px;
	  }
	  
	  .akumaDscpt {
		  font-size: 8.5px;
	  }
	  
  </style>
	
	<style>
	/* The Modal (background) */
	.modal {
	  display: none; /* Hidden by default */
	  position: fixed; /* Stay in place */
	  z-index: 1; /* Sit on top */
	  padding-top: 225px; /* Location of the box */
	  left: 0;
	  top: 0;
	  width: 100%; /* Full width */
	  height: 100%; /* Full height */
	  overflow: auto; /* Enable scroll if needed */
	  background-color: rgb(0,0,0); /* Fallback color */
	  background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
	}

	/* Modal Content */
	.modal-content {
		position: relative;
		background-image: url(https://cdn.discordapp.com/attachments/884606837943582784/1200648429383196682/LibroBase_One_Piece_Gaiden_Foro_Rol.png);
		margin: auto;
		padding: 0;
		width: 1200px;
		-webkit-animation-name: animatetop;
		-webkit-animation-duration: 0.4s;
		animation-name: animatetop;
		animation-duration: 0.4s;
		height: 644px;
		background-repeat: no-repeat;
	}

	/* Add Animation */
	@-webkit-keyframes animatetop {
	  from {top:-300px; opacity:0} 
	  to {top:0; opacity:1}
	}

	@keyframes animatetop {
	  from {top:-300px; opacity:0}
	  to {top:0; opacity:1}
	}

	/* The Close Button */
	.close {
	  color: white;
	  float: right;
	  font-size: 28px;
	  font-weight: bold;
	}

	.close:hover,
	.close:focus {
	  color: #000;
	  text-decoration: none;
	  cursor: pointer;
	}

	.modal-header {
	  padding: 2px 16px;
	  background-color: #5cb85c;
	  color: white;
	}

	.modal-body {padding: 2px 16px;}

	</style>
</head>

<body>
  {$header}
  <div class="indice">
	<div class="mainBackground">
		<div class="secondBackground">
			<div class="thirdBackground">
				<div style=" text-align: center; "><button class="button" onclick="randomAkuma()">Arriésgate por tu Akuma</button></div><br />
				<if $g_tiene_ficha then><div style=" text-align: center; "><button class="button" onclick="randomAkumaReal()">Arriésgate por tu Akuma (Real)</button></div></if><br />
				<div class="akumaBanner">
				</div>
				<div class="filterBox">
					<div class="akumaTypeRow">
						<div id="Paramecia" onclick="filterByType('Paramecia')" class="categoriaBox filterClass">
						<span>Paramecia</span>
					</div>
					<div id="Zoan" onclick="filterByType('Zoan')" class="categoriaBox filterClass">
						<span>Zoan</span>
					</div>
					<div id="Logia" onclick="filterByType('Logia')" class="categoriaBox filterClass">
						<span>Logia</span>
					</div>
					</div>
					<div class="tierRow">
						<div id="tier1" onclick="filterByTier(1)" class="tierBox filterClass">
							<span>Tier 1</span>
						</div>
						<div id="tier2" onclick="filterByTier(2)" class="tierBox filterClass">
							<span>Tier 2</span>
						</div>
						<div id="tier3" onclick="filterByTier(3)" class="tierBox filterClass">
							<span>Tier 3</span>
						</div>
						<div id="tier4" onclick="filterByTier(4)" class="tierBox filterClass">
							<span>Tier 4</span>
						</div>
						<div id="tier5" onclick="filterByTier(5)" class="tierBox filterClass">
							<span>Tier 5</span>
						</div>
						<div id="tier6" onclick="filterByTier(6)" class="tierBox filterClass">
							<span>Tier 6</span>
						</div>
					</div>
				</div>
				<div class="akumaList">

				</div>
				<!-- The Modal -->
				<div id="myModal" class="modal">

				  <!-- Modal content -->
				  <div class="modal-content">
					<div class="modal-body" style=" display: flex; flex-direction: row; ">
						<div style="display: flex;flex-direction: column;width: 42%;margin-left: 123px;">
							<div style="position: absolute;top: 258px;transform: rotate(14deg);font-size: 11px;font-family: 'moonGetHeavy';color: black;left: 9px;" id="frutaId"></div>
							<div style="font-family: moonGetHeavy;color: black;font-size: 36px;margin: auto;text-shadow: 2px 2px 1px white;margin-top: 29px;letter-spacing: 1px;" id="frutaNombre">Beri Beri no Mi</div>
							<div style="font-family: moonGetHeavy;color: white;font-size: 17px;margin: auto;text-shadow: 2px 2px 1px black;letter-spacing: 1px;" id="frutaSubnombre">Modelo Leopardo</div>
							<div style=" margin: auto; background-color: red; margin-top: 25px; width: 483px; text-align: center; background: linear-gradient(90deg, #00748f00 0%, #418d9b 20%, #00243d 50%, #418d9b 80%, #00748f00 100%); "><div style="font-family: moonGetHeavy;color: white;font-size: 29px;margin: auto;text-shadow: 2px 2px 1px black;/* margin-top: 46px; */letter-spacing: 2px;"><span id="frutaTipo">Paramecia</span> | Tier <span id="frutaTier">3</span></div></div>
							<div style=" margin: auto; "><img id="akumaImagen" src="" style=" height: 411px; "></div></div>
							
						<div style="display: flex;flex-direction: column;width: 42%;">
							<div style="margin: auto;background-color: red;margin-top: 46px;width: 483px;text-align: center;background: linear-gradient(90deg, #00748f00 0%, #418d9b 20%, #00243d 50%, #418d9b 80%, #00748f00 100%);margin-bottom: 0px;">
								<div style="font-family: moonGetHeavy;color: white;font-size: 24px;margin: auto;text-shadow: 2px 2px 1px black;/* margin-top: 46px; */letter-spacing: 2px;">Descripción</div>
							</div>
							<div id="frutaDescripcion" style=" text-align: justify; margin-top: 11px; font-family: Arial; color: black; font-size: 15px; padding: 7px 26px; text-shadow: 1px 0px 0px #0000004d; font-weight: 600; ">
								
							</div>	
							
						</div>				 
					</div>
				  </div>

				</div>
				
			</div>
		</div>
	 </div>
  </div>
<script>
const akumas = {$akumas_json};
	
function randomAkuma() {
	alert(`{$akuma_magica} [{$akuma_categoria} - Tier {$akuma_tier}]\n{$akuma_magica_descripcion}`);
}
	
function randomAkumaReal() {
	$.post("/op/akumas.php", { akuma_aleatoria: "akuma_aleatoria" }, function( data ) {
	  alert( "¡Has elegido una Akuma aleatoria. Ve y revisa tu ficha para saber qué te tocó.");
	});
}
	
for (let i = 0; i < akumas.length; i++) {
	const nombre = akumas[i].nombre;
	const categoria = akumas[i].categoria;
	const ocupada = akumas[i].ocupada;
	const isOcupadaClass = parseInt(ocupada) ? 'statusOcupada' : 'statusLibre';
	const isOcupadaText = parseInt(ocupada) ? 'Ocupada' : 'Libre';
	
	let frutaImagen = '';
	if (categoria == 'Paramecia') {
		frutaImagen = 'https://cdn.discordapp.com/attachments/1147569274894946354/1199835659096051822/TipoParamecia_One_Piece_Gaiden_Foro_Rol.png';
	} else if (categoria == 'Logia') {
		frutaImagen = 'https://cdn.discordapp.com/attachments/1147569274894946354/1199835649520455760/TipoLogia_One_Piece_Gaiden_Foro_Rol.png';
	} else if (categoria == 'Zoan') {
		frutaImagen = 'https://cdn.discordapp.com/attachments/1147569274894946354/1199835670223536222/TipoZoan_One_Piece_Gaiden_Foro_Rol.png';
	}
	
	$('.akumaList').append(`
     <div class="akumaItem" data-tier="` + akumas[i].tier +`" data-type="` + categoria +`" onclick="clickAkuma(` + i + `)">
		<div class="nameSection">
				<div class="nameText">
					<span class="akumaName">` + nombre + `</span>
				<br>
				<span class="akumaDscpt">` + categoria + ` | Tier ` + akumas[i].tier +` | ` + akumas[i].subnombre + `</span>
			</div>
				<img src= '` + frutaImagen +`' class="fruitImage" >	
		</div>
		<div class="statusSection ` + isOcupadaClass + `">
			<div style="margin: auto;">` + isOcupadaText + `</div>
		</div>	
	</div>
`);
}	
	
const akumaItems = document.querySelectorAll('.akumaItem');
let typeFilterActive = false;
let tierFilterActive = false;
let currentTypeFilter = '';
let currentTierFilter = 0;

function filterByType(type) {
  $('.categoriaBox').removeClass("box-active");
  
  if (currentTypeFilter == type && typeFilterActive == false) {
	 typeFilterActive = true;  
	 $('#' + type).addClass("box-active");
  } else {
	  typeFilterActive = false;   
  }
	
  if (currentTypeFilter != type) {
	  $('#' + type).addClass("box-active");
	  typeFilterActive = true;
  }
	
  currentTypeFilter = type;
  applyFilters();
}

function filterByTier(tier) {
  $('.tierBox').removeClass("box-active");

  if (currentTierFilter == tier && tierFilterActive == false) {
	 tierFilterActive = true;  
	  $('#tier' + tier).addClass("box-active");
  } else {
	  tierFilterActive = false;   
  }

  if (currentTierFilter != tier) {
	  $('#tier' + tier).addClass("box-active");
	  tierFilterActive = true;
 }
	  
  currentTierFilter = tier;
  applyFilters();
}

function applyFilters() {
  akumaItems.forEach(item => {
    const itemType = item.getAttribute('data-type') === currentTypeFilter;
    const itemTier = parseInt(item.getAttribute('data-tier')) === currentTierFilter;

    if (typeFilterActive && tierFilterActive) {
      item.style.display = itemType && itemTier ? 'flex' : 'none';
    } else if (typeFilterActive) {
      item.style.display = itemType ? 'flex' : 'none';
    } else if (tierFilterActive) {
      item.style.display = itemTier ? 'flex' : 'none';
    } else {
      item.style.display = 'flex'; // No hay filtros activos, mostrar todos los elementos
    }
  });
}
</script>
	
<script>
// Get the modal
var modal = document.getElementById("myModal");

// When the user clicks on <span> (x), close the modal
function closeModal() {
	modal.style.display = "none";
}
	
function clickAkuma(id) {
	modal.style.display = "block";
	$('#frutaNombre').html(akumas[id].nombre);
	$('#frutaSubnombre').html(akumas[id].subnombre);
	$('#frutaTipo').html(akumas[id].categoria);
	$('#frutaTier').html(akumas[id].tier);
	$('#frutaDescripcion').html(akumas[id].descripcion);
	$('#frutaId').html(akumas[id].akuma_id);
	$('#akumaImagen').attr('src', akumas[id].imagen);
	// alert(akumas[id].nombre + ` [` + akumas[id].categoria + ` - Tier ` + akumas[id].tier + `]\n\n` + akumas[id].descripcion);
}

$(window).click(function(e) {
	if (event.target == modal) {
		modal.style.display = "none";
	}
});
	
</script>
	
{$footer}
</body>
</html>
