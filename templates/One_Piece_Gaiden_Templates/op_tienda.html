function calculateBerries(berries) {
	// Parse the string to a number
    const num = parseInt(berries, 10);

    // Check if the number is larger than 999999 (1 million)
    if (num > 999999) {
        const millions = Math.floor(num / 1000000); // Get the millions part
        const hundredsOfThousands = Math.floor((num % 1000000) / 100000); // Get the first decimal part of the millions
        // Format based on whether the hundredsOfThousands part is non-zero
        return hundredsOfThousands > 0 
            ? (millions + `,` + hundredsOfThousands + ` M`)
            : (millions + ` M`);
    } else if (num > 999) {
	    const millions = Math.floor(num / 1000); // Get the millions part
        const hundredsOfThousands = Math.floor((num % 1000) / 100); // Get the first decimal part of the millions
        // Format based on whether the hundredsOfThousands part is non-zero
        return hundredsOfThousands > 0 
            ? (millions + `,` + hundredsOfThousands + ` K`)
            : (millions + ` K`);
    }

    // Return the original string if not greater than 999999
    return berries;
}

for (let i = 0; i < objetos_array_json.length; i++) {

	let objetoId = objetos_array_json[i];
	if (objetoId == 'LLST001') { continue; }
	let objeto = objetos_json[objetoId][0];
	objeto.categoria = objeto.categoria.toLowerCase();
	
	if (objeto.categoria == 'materiales' && (objeto.subcategoria == oficio1 || objeto.subcategoria == oficio2)) {
		objeto.categoria = 'utensilios';

	const subcategoria = objeto.subcategoria.toLowerCase().split(' ').join('_');
	const tier = objeto.tier;

	const imagen_avatar = objeto.imagen_avatar;
	let imagen_nombre = subcategoria + "_" + imagen_id + "_One_Piece_Gaiden_Foro_Rol.jpg";
	if (subcategoria == 'cofres' || subcategoria == 'akuma_no_mi' || objetoId == 'EANM001' || objetoId == 'LLST001' || objetoId == 'THR001' || subcategoria == 'materiales' || subcategoria == 'tecnicas' || objetoId == 'EPA001' || objetoId ==  'KMP001' || objetoId == 'VCD001' || objetoId == 'VCZ001' || subcategoria == 'documentos' || subcategoria == 'recetas') {

	if (imagen_id == '2') { colorTier = '#4dfe45'; }

	if (has_pobre2) { objetoBerries = objeto.berries * 1.10; }
	if (has_pobre3) { objetoBerries = objeto.berries * 1.15; }

	$('#' + subcategoria + "_objetos").append(`<div>

						` + dano + `

						<div style="font-family: moonGetHeavy;padding: 2px 5px;display: flex;flex-direction: row;justify-content: space-between;background: ` + colorTier + `;border-top: 1px solid black;border-bottom: 1px solid black;font-size: 9px;text-shadow: 1px 1px 2px black;filter: saturate(0.7);">
							<div>` + objeto.espacios + ` Espacios</div>
							<div>ID: <span>` + objeto.objeto_id + `</span></div>
							<div><span class="itemBerries">` + parseInt(objetoBerries).toLocaleString('es-es') + `</span>B</div>
						</div>
						<div style="font-size: 9px;font-family: moonGetHeavy;letter-spacing: 1px;text-align: center;background: ` + colorTier + `;border-bottom-left-radius: 6px;border: 0px;border-bottom-right-radius: 6px;padding: 3px;text-shadow: 1px 1px 3px black;">` + objeto.subcategoria + ` - Tier ` + objeto.tier + `</div>

}
	
$('#imagen-item').hover(function() {
	
});
	
let testItem = null;	
	
$('.item-outer').on('click', function() {
	
	// testItem = $(this);
	let objeto = objetos_json[$(this)[0].id][0];
	let objetoBerries = objeto.berries;
	if (has_pobre1) { objetoBerries = objeto.berries * 1.05; }
	if (has_pobre2) { objetoBerries = objeto.berries * 1.10; }
	if (has_pobre3) { objetoBerries = objeto.berries * 1.15; }
	if ($(this).hasClass('item-active')) {
		$(this).removeClass('item-active');
		
		
		let cantidad = $('#compra-' + objeto.objeto_id + ' .itemCantidad').text();
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) - (parseInt(objetoBerries) * cantidad);
		saldoRestante = saldoRestante + (parseInt(objetoBerries) * cantidad);
		console.log(saldoRestante);
		comprasTotal = comprasTotal.toLocaleString('es-es');

		$('#comprasTotal').html(comprasTotal);
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		$('#compra-' + objeto.objeto_id).remove();
		if (comprasTotal == '0') {
			$('#button-comprar').css('background-color', 'gray');
			// $('#button-comprar').css('border', '1px solid #535353');
		}
		delete listaDeCompras[objeto.objeto_id];
	} else {	
		
		if (saldoRestante - parseInt(objetoBerries) >= 0) {
			
			if (comprasTotal == '0') {
				$('#button-comprar').css('background-color', '#9664e0');
			}
			
			comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) + parseInt(objetoBerries);
			saldoRestante = saldoRestante - parseInt(objetoBerries);
			comprasTotal = comprasTotal.toLocaleString('es-es');

			$('#comprasTotal').html(comprasTotal);
			$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));

			$(this).addClass('item-active');
			
			listaDeCompras[objeto.objeto_id] = { cantidad: 1 };

				<div id="compra-` + objeto.objeto_id + `" style=" height: 55px; border-bottom: 1px solid black; border-top: 1px solid black; background: linear-gradient(#009819, #003400); display: flex; flex-direction: row;">
					<div style="display: flex;flex-direction: column;margin: 5px 5px;">
						<div onclick="incrementarItem('compra-` + objeto.objeto_id + `')" class="incrementar-item">
							<i class="fa fa-angle-double-up" aria-hidden="true" style=" font-size: 17px; color: #f2f2f2; position: relative; "></i>
						</div>
						<div onclick="decrementarItem('compra-` + objeto.objeto_id + `')" class="decrementar-item">
							<i class="fa fa-angle-double-down" aria-hidden="true" style=" font-size: 17px; color: #f2f2f2; position: relative; "></i>
						</div>
					</div>
					<div style=" font-size: 20px; font-family: moonGetHeavy; color: white; text-shadow: 1px 1px 5px black; margin-top: 10px; margin-left: 5px; ">x<span class="itemCantidad">1</span></div>
					<div style="font-size: 16px;font-family: moonGetHeavy;color: white;text-shadow: 1px 1px 5px black;text-align: center;width: 173px;height: 50px;align-content: center;">
						` + objeto.nombre + `
					</div>

			`);
		}

		// objetos[testItem[0].id][0]
	}

});
	
function incrementarItem(item) {
	let itemCantidadId = '#' + item +  ' .itemCantidad';
	let itemId = item.replace('compra-', '');
	let itemCantidad = parseInt($(itemCantidadId).text());
	
	let berries = parseInt(objetos_json[itemId][0].berries);

	if (itemCantidad < 10 && (saldoRestante - berries >= 0)) {
		saldoRestante = saldoRestante - berries;
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) + berries;
		comprasTotal = comprasTotal.toLocaleString('es-es');
		$('#comprasTotal').html(comprasTotal);
		$(itemCantidadId).text(itemCantidad + 1);
		listaDeCompras[itemId]['cantidad'] = listaDeCompras[itemId]['cantidad'] + 1;
	}
	
}
	
function decrementarItem(item) {
	let itemCantidadId = '#' + item +  ' .itemCantidad';
	let itemId = item.replace('compra-', '');
	let itemCantidad = parseInt($(itemCantidadId).text());
	
	let berries = parseInt(objetos_json[itemId][0].berries);
	
	if (itemCantidad > 1) {
		saldoRestante = saldoRestante + berries;
		$('#saldoRestante').html(saldoRestante.toLocaleString('es-es'));
		
		comprasTotal = parseInt(comprasTotal.replace(/\./g, '')) - berries;
		comprasTotal = comprasTotal.toLocaleString('es-es');
		$('#comprasTotal').html(comprasTotal);
		
		$(itemCantidadId).text(itemCantidad - 1);
		listaDeCompras[itemId]['cantidad'] = listaDeCompras[itemId]['cantidad'] - 1;
	}
}
	
function comprarItems() {
	if (comprasTotal != '0') {
		
		if (confirm('¿Estás de acuerdo con esta compra de ' + comprasTotal + ' berries?')) {

			$.post("/op/tienda.php", { 
				accion: 'comprar',
				comprasTotal: parseInt(comprasTotal.replace(/\./g, '')),
				listaDeCompras: listaDeCompras,
				listaDeComprasKeys: Object.keys(listaDeCompras)
			}, function( data ) { 
				console.log(data);
				alert('¡Compra realizada!.');
				window.location = "/op/tienda.php";
			});
		}
		
		
	}
}
	
function clickTipo(tipo) {
	$('.tienda_tipos').removeClass('tienda_tipos_active');

	if (tipo == 'consumibles') {
		$('#objetos_consumibles').css('display', 'block');
		$('#objetos_armas').css('display', 'none');
		$('#objetos_utensilios').css('display', 'none');
		$('#objetos_estructuras').css('display', 'none');
		
		$('#consumibles').addClass('tienda_tipos_active');
	}

	if (tipo == 'armas') {
		$('#objetos_consumibles').css('display', 'none');
		$('#objetos_armas').css('display', 'block');
		$('#objetos_utensilios').css('display', 'none');
		$('#objetos_estructuras').css('display', 'none');
		
		$('#armas').addClass('tienda_tipos_active');
	}

	if (tipo == 'utensilios') {
		$('#objetos_consumibles').css('display', 'none');
		$('#objetos_armas').css('display', 'none');
		$('#objetos_utensilios').css('display', 'block');
		$('#objetos_estructuras').css('display', 'none');
		
		$('#utensilios').addClass('tienda_tipos_active');
	}

	if (tipo == 'estructuras') {
		$('#objetos_consumibles').css('display', 'none');
		$('#objetos_armas').css('display', 'none');
		$('#objetos_utensilios').css('display', 'none');
		$('#objetos_estructuras').css('display', 'block');
		
		$('#estructuras').addClass('tienda_tipos_active');
	}
	
}	
	
	/* if saldo restante + thing is less than 0, do not add. */
</script>
