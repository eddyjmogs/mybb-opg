<html>
<head>
	<title>Calendario de Adviento - One Piece Gaiden</title>
	{$headerinclude}
	<style>
		:root {
			color-scheme: dark;
		}

		body {
			margin: 0;
			font-family: 'InterRegular', Arial, sans-serif;
			color: #f5f5f5;
			min-height: 100vh;
			background: #020611 url('https://i.pinimg.com/736x/f8/da/c8/f8dac8f7509ce8f9111587c24d10451e.jpg') center/cover fixed;
			position: relative;
		}

		body::before {
			content: '';
			position: fixed;
			inset: 0;
			background: rgba(3, 8, 20, 0.82);
			backdrop-filter: blur(3px);
			z-index: -1;
		}

		.advientoLayout {
			padding: 40px 5vw 80px;
			display: flex;
			flex-direction: column;
			gap: 32px;
		}

		.heroCard {
			background: linear-gradient(120deg, rgba(19, 31, 55, 0.9), rgba(18, 90, 131, 0.85));
			border: 1px solid rgba(255, 255, 255, 0.12);
			border-radius: 24px;
			padding: 32px;
			box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
			position: relative;
			overflow: hidden;
		}

		.heroCard::after {
			content: '';
			position: absolute;
			inset: 0;
			background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.12), transparent 60%);
			pointer-events: none;
		}

		.heroTitle {
			font-family: 'moonGetHeavy', 'InterBold', sans-serif;
			font-size: clamp(28px, 4vw, 46px);
			margin: 0 0 8px;
			color: #ffd479;
			letter-spacing: 0.04em;
			text-shadow: 0 6px 12px rgba(0, 0, 0, 0.6);
		}

		.heroSubtitle {
			font-size: 16px;
			color: rgba(255, 255, 255, 0.8);
			max-width: 720px;
			line-height: 1.5;
			margin-bottom: 20px;
		}

		.calendarWrapper {
			background: rgba(6, 10, 24, 0.84);
			backdrop-filter: blur(6px);
			border-radius: 28px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			padding: 30px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.calendarHeader {
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 12px;
			margin-bottom: 24px;
		}

		.calendarHeader h2 {
			margin: 0;
			font-family: 'moonGetHeavy', sans-serif;
			font-size: 24px;
			letter-spacing: 0.08em;
			color: #8ce0ff;
		}

		.calendarMessage {
			font-size: 14px;
			color: #f0f0f0;
			opacity: 0.85;
		}

		.calendarGrid {
			position: relative;
			width: min(856px, 96vw);
			margin: 16px 16px 0;
			aspect-ratio: 428 / 925;
			border-radius: 30px;
			background: #03050c url('https://i.pinimg.com/736x/f8/da/c8/f8dac8f7509ce8f9111587c24d10451e.jpg') center/cover;
			border: 1px solid rgba(255, 255, 255, 0.15);
			box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6);
			padding: 2.5%;
			overflow: hidden;
		}

		.calendarGrid::before,
		.calendarGrid::after {
			content: '';
			position: absolute;
			inset: 0;
			border-radius: 30px;
			pointer-events: none;
		}

		.calendarGrid::before {
			border: 6px double rgba(255, 255, 255, 0.18);
			margin: 12px;
		}

		.calendarGrid::after {
			background: linear-gradient(180deg, rgba(0, 0, 0, 0.35), transparent 40%);
		}

		.dayCard {
			position: absolute;
			border: none;
			padding: 0;
			background: transparent;
			cursor: pointer;
			transition: transform 0.25s ease;
			color: inherit;
			outline: none;
			transform: rotate(var(--card-tilt, 0deg));
			transform-origin: center;
		}

		.dayCard.past:not(.opened) {
			opacity: 0.55;
			cursor: default;
		}

		.dayCard.future {
			opacity: 0.7;
		}

		.dayCard.locked {
			cursor: not-allowed;
			opacity: 0.5;
		}

		.dayCard.available:not(.opened):hover {
			transform: rotate(var(--card-tilt, 0deg)) translateY(-4px);
		}

		.doorFrame {
			perspective: 1000px;
			width: 100%;
			height: 100%;
		}

		.doorPanel {
			position: relative;
			height: 100%;
			border-radius: 12px;
			background: rgba(4, 8, 18, 0.9);
			box-shadow: 0 12px 28px rgba(0, 0, 0, 0.55);
			overflow: hidden;
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.doorPanel::after {
			pointer-events: none;
		}

		.doorBurst {
			position: absolute;
			inset: -30%;
			background: radial-gradient(circle, rgba(255, 218, 170, 0.4), rgba(255, 218, 170, 0));
			filter: blur(8px);
			opacity: 0;
			transform: scale(0.25);
			pointer-events: none;
			transition: opacity 0.3s ease, transform 0.3s ease;
			z-index: 0;
		}

		.dayCard.opening .doorBurst {
			animation: burstFlash 1.05s ease-out forwards;
		}

		.dayCard.opened .doorBurst {
			opacity: 0.18;
			transform: scale(1);
		}

		.doorFront,
		.doorInterior {
			position: absolute;
			inset: 0;
			border-radius: 12px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			transition: opacity 0.3s ease;
		}

		.doorFront {
			background: linear-gradient(140deg, rgba(120, 74, 16, 0.92), rgba(255, 211, 159, 0.85));
			border: 1px solid rgba(255, 230, 180, 0.55);
			transform-origin: left center;
			transform: rotateY(0deg);
			transition: transform 0.8s cubic-bezier(0.63, 0, 0.23, 1), box-shadow 0.3s ease;
			z-index: 2;
		}

		.doorFront::after {
			content: '';
			position: absolute;
			inset: 8px;
			border-radius: 6px;
			border: 1px dashed rgba(255, 255, 255, 0.6);
			pointer-events: none;
		}

		.dayCard.available:not(.opened) .doorFront {
			box-shadow: 0 0 20px rgba(255, 193, 94, 0.4);
		}

		.dayCard.locked .doorFront {
			filter: grayscale(0.5) brightness(0.7);
			box-shadow: none;
		}

		.doorInterior {
			background: radial-gradient(circle at 20% 20%, rgba(255, 214, 153, 0.1), rgba(2, 4, 11, 0.95));
			opacity: 0;
			border: 1px solid rgba(255, 255, 255, 0.05);
			z-index: 1;
		}

		.doorInterior::before,
		.doorInterior::after {
			content: '';
			position: absolute;
			inset: 14%;
			border-radius: 50%;
			opacity: 0;
			pointer-events: none;
		}

		.doorInterior::before {
			background: radial-gradient(circle, rgba(255, 222, 190, 0.65), rgba(9, 12, 22, 0));
			filter: blur(8px);
		}

		.doorInterior::after {
			background: conic-gradient(from 90deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0));
			filter: blur(4px);
		}

		.dayCard.opening .doorFront {
			animation: doorEpicSwing 1.05s cubic-bezier(0.63, 0, 0.23, 1) forwards;
		}

		.dayCard.opening .doorInterior::before {
			animation: interiorPulse 1.1s ease-out forwards;
		}

		.dayCard.opening .doorInterior::after {
			animation: lightRays 1s ease-out forwards;
		}

		.dayCard.opened .doorInterior {
			opacity: 1;
		}

		.dayCard.opened .doorInterior::before {
			opacity: 0.25;
		}

		.dayCard.opened .doorFront {
			transform: rotateY(-65deg) translateX(-4%);
			box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
		}

		.dayNumber {
			font-size: 44px;
			margin-bottom: 6px;
			text-shadow: 0 3px 6px rgba(0, 0, 0, 0.35);
		}

		.dayLabel {
			font-size: 13px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			opacity: 0.85;
			text-align: center;
			padding: 0 12px;
		}

		.doorShine {
			position: absolute;
			width: 150%;
			height: 4px;
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
			transform: rotate(35deg) translateY(-120px);
			left: -40%;
			animation: shineSweep 2.4s linear infinite;
		}

		.dayCard.locked .doorShine,
		.dayCard.opened .doorShine {
			display: none;
		}

		@keyframes shineSweep {
			0% {
				transform: rotate(35deg) translateY(-140px);
			}
			100% {
				transform: rotate(35deg) translateY(160px);
			}
		}

		.doorInteriorTag {
			font-size: 13px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.6);
		}

		.dayCard.opened .doorInteriorTag {
			color: rgba(255, 255, 255, 0.9);
		}

		.dayCard.available:not(.opened) .doorPanel::after {
			content: '';
			position: absolute;
			inset: 0;
			border-radius: 12px;
			box-shadow: 0 0 35px rgba(255, 210, 150, 0.35);
			animation: pulseAura 2s ease-in-out infinite;
		}

		.dayCard.opened .doorPanel::after {
			content: '';
			position: absolute;
			inset: 3px;
			border-radius: 9px;
			box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.85);
		}

		.dayCard.opening .doorPanel::after {
			content: '';
			position: absolute;
			inset: 0;
			border-radius: 12px;
			box-shadow: 0 0 45px rgba(255, 220, 170, 0.7), inset 0 0 25px rgba(255, 255, 255, 0.35);
			animation: openingOutline 1s ease-out forwards;
		}

		@keyframes pulseAura {
			0% {
				opacity: 0;
			}
			50% {
				opacity: 1;
			}
			100% {
				opacity: 0;
			}
		}

		@keyframes doorEpicSwing {
			0% {
				transform: rotateY(0deg) translateX(0);
			}
			55% {
				transform: rotateY(-110deg) translateX(-6%);
			}
			100% {
				transform: rotateY(-65deg) translateX(-4%);
			}
		}

		@keyframes burstFlash {
			0% {
				opacity: 0;
				transform: scale(0.25);
			}
			50% {
				opacity: 0.95;
				transform: scale(1.2);
			}
			100% {
				opacity: 0.18;
				transform: scale(1);
			}
		}

		@keyframes interiorPulse {
			0% {
				opacity: 0;
				transform: scale(0.6);
			}
			60% {
				opacity: 0.85;
				transform: scale(1.05);
			}
			100% {
				opacity: 0.3;
				transform: scale(1.2);
			}
		}

		@keyframes lightRays {
			0% {
				opacity: 0;
				transform: scale(0.4) rotate(0deg);
			}
			70% {
				opacity: 0.8;
			}
			100% {
				opacity: 0;
				transform: scale(1.5) rotate(25deg);
			}
		}

		@keyframes openingOutline {
			0% {
				opacity: 0.2;
			}
			40% {
				opacity: 1;
			}
			100% {
				opacity: 0;
			}
		}

		.rewardModal {
			position: fixed;
			inset: 0;
			background: rgba(3, 7, 16, 0.75);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 32px;
			z-index: 999;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.3s ease;
		}

		.rewardModal.visible {
			opacity: 1;
			pointer-events: auto;
		}

		.rewardContent {
			background: linear-gradient(160deg, rgba(17, 20, 38, 0.95), rgba(32, 35, 72, 0.95));
			border-radius: 24px;
			border: 1px solid rgba(255, 255, 255, 0.12);
			padding: 32px;
			width: min(520px, 95vw);
			text-align: center;
			position: relative;
			overflow: hidden;
		}

		.rewardDayTag {
			color: #ffd479;
			font-size: 14px;
			letter-spacing: 0.4em;
			display: block;
			margin-bottom: 12px;
			text-transform: uppercase;
		}

		.rewardTitle {
			font-size: 28px;
			margin: 0 0 10px;
			color: #9cd9ff;
		}

		.rewardName {
			font-size: 20px;
			color: #ffffff;
			margin: 0 0 12px;
		}

		.rewardText {
			font-size: 15px;
			line-height: 1.5;
			color: rgba(255, 255, 255, 0.8);
		}

		.rewardButtons {
			margin-top: 24px;
			display: flex;
			justify-content: center;
			gap: 14px;
		}

		.rewardButtons button {
			padding: 10px 20px;
			border-radius: 999px;
			border: 1px solid rgba(255, 255, 255, 0.22);
			background: rgba(255, 255, 255, 0.08);
			color: #fff;
			font-family: 'moonGetHeavy';
			cursor: pointer;
		}

		.rewardButtons button:hover {
			background: rgba(255, 255, 255, 0.2);
		}

		.sparkles {
			position: absolute;
			inset: 0;
			pointer-events: none;
			overflow: hidden;
		}

		.sparkle {
			position: absolute;
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: #ffd479;
			opacity: 0;
			animation: sparkleFloat 1.8s linear forwards;
		}

		@keyframes sparkleFloat {
			0% {
				transform: translateY(30px) scale(0.5);
				opacity: 0;
			}
			30% {
				opacity: 1;
			}
			100% {
				transform: translateY(-80px) scale(1.4);
				opacity: 0;
			}
		}

		.toast {
			position: fixed;
			bottom: 30px;
			right: 30px;
			padding: 14px 20px;
			border-radius: 12px;
			background: rgba(255, 82, 82, 0.92);
			color: #fff;
			font-size: 14px;
			box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
			opacity: 0;
			transform: translateY(20px);
			transition: opacity 0.3s ease, transform 0.3s ease;
			z-index: 1000;
		}

		.toast.visible {
			opacity: 1;
			transform: translateY(0);
		}

		@media (max-width: 768px) {
			.calendarGrid {
				width: 100%;
				aspect-ratio: 1 / 1;
				max-width: 100%;
			}
			.dayCard {
				min-width: 70px;
			}
			.rewardContent {
				padding: 24px 18px;
			}
		}
	</style>
</head>
<body>
	{$header}
	<div class="advientoLayout">
		<section class="heroCard">
			<h1 class="heroTitle">Calendario de Adviento</h1>
			<p class="heroSubtitle">
				Cada día de diciembre abre una ventana distinta para descubrir recompensas.
				Solo puedes abrir el día actual.
			</p>
		</section>

		<section class="calendarWrapper">
			<div class="calendarHeader">
				<h2>Diciembre 2025</h2>
				<div class="calendarMessage" id="calendarMessage">Solo puedes abrir el día que corresponda.</div>
			</div>
			<div class="calendarGrid" id="calendarGrid"></div>
		</section>
	</div>

	<div class="rewardModal" id="rewardModal" hidden>
		<div class="rewardContent">
			<div class="sparkles" id="sparkles"></div>
			<span class="rewardDayTag" id="rewardDay">Día 1</span>
			<h3 class="rewardTitle" id="rewardTitle">Título del día</h3>
			<p class="rewardName" id="rewardName">Premio</p>
			<p class="rewardText" id="rewardText">Descripción</p>
			<div class="rewardButtons">
				<button type="button" id="openAnother">Abrir otro día</button>
				<button type="button" id="closeReward">Cerrar</button>
			</div>
		</div>
	</div>

	<div class="toast" id="toast"></div>

				{ top: 32, left: 23, width: 11, height: 11, rotation: -3 },
				{ top: 33, left: 41, width: 12, height: 12, rotation: 4 },
				{ top: 31, left: 59, width: 11, height: 11, rotation: -1 },
				{ top: 34, left: 76, width: 12, height: 12, rotation: 2 },
				{ top: 50, left: 9, width: 13, height: 12, rotation: -2 },
				{ top: 46, left: 27, width: 11, height: 11, rotation: 3 },
				{ top: 48, left: 45, width: 12, height: 11, rotation: -4 },
				{ top: 49, left: 63, width: 11, height: 11, rotation: 1 },
				{ top: 52, left: 80, width: 12, height: 12, rotation: -1 },
				{ top: 66, left: 6, width: 12, height: 11, rotation: 2 },
				{ top: 64, left: 24, width: 11, height: 11, rotation: -3 },
				{ top: 62, left: 42, width: 13, height: 12, rotation: 4 },
				{ top: 63, left: 60, width: 12, height: 11, rotation: -2 },
				{ top: 65, left: 78, width: 11, height: 11, rotation: 1 },
				{ top: 80, left: 9, width: 13, height: 12, rotation: -1 },
				{ top: 78, left: 27, width: 11, height: 11, rotation: 2 },
				{ top: 79, left: 45, width: 12, height: 12, rotation: -2 },
				{ top: 82, left: 63, width: 11, height: 11, rotation: 3 },
				{ top: 83, left: 81, width: 12, height: 12, rotation: -3 },
				{ top: 90, left: 36, width: 16, height: 13, rotation: 0 }
			];

			var today = new Date();
			var isDecember = today.getMonth() === 11;
			var unlockDay = isDecember ? Math.min(today.getDate(), 31) : 1;

			function updateCalendar() {
				renderCalendar();
				refreshMessage();
			}

			function renderCalendar() {
				calendarGrid.innerHTML = '';
				for (var day = 1; day <= 31; day++) {
					var card = document.createElement('button');
					card.setAttribute('type', 'button');
					var isOpened = openedDays.has(day);
					var isActive = day === unlockDay;
					var isPast = day < unlockDay;
					var classes = ['dayCard'];
					if (isActive && !isOpened) {
						classes.push('available');
					}
					if (isPast && !isOpened) {
						classes.push('past');
					}
					if (!isPast && !isActive && !isOpened) {
						classes.push('future');
					}
					if (isOpened) {
						classes.push('opened');
					}
					card.className = classes.join(' ');
					card.dataset.day = day;
					card.setAttribute('aria-label', 'Día ' + day);
					card.tabIndex = (isActive || isOpened) ? 0 : -1;
					var data = rewards[day];
					var statusText = getStatusText(isOpened, isActive, isPast);
					var frontNumber = isOpened ? '' : '<span class="dayNumber">' + day + '</span>';
					var interiorTag = isOpened ? '' : '<span class="doorInteriorTag">' + statusText + '</span>';
					card.innerHTML = '' +
						'<div class="doorFrame">' +
						'	<div class="doorPanel">' +
						'		<span class="doorBurst"></span>' +
						'		<div class="doorFront">' +
						'			' + frontNumber +
						'			<span class="doorShine"></span>' +
						'		</div>' +
						'		<div class="doorInterior">' +
						'			' + interiorTag +
						'		</div>' +
						'	</div>' +
						'</div>';
					applyLayout(card, day);
					card.addEventListener('click', handleDayClick);
					calendarGrid.appendChild(card);
				}
			}

			function applyLayout(card, day) {
				var layout = layoutBlueprint[day - 1] || {};
				var width = typeof layout.width === 'number' ? layout.width : 11;
				var height = typeof layout.height === 'number' ? layout.height : 11;
				var left = typeof layout.left === 'number' ? layout.left : ((day % 6) * 15);
				var top = typeof layout.top === 'number' ? layout.top : (Math.floor(day / 6) * 12 + 5);
				card.style.width = (width * WINDOW_WIDTH_SCALE) + '%';
				card.style.height = (height * WINDOW_HEIGHT_SCALE) + '%';
				card.style.left = left + '%';
				card.style.top = top + '%';
				card.style.setProperty('--card-tilt', (layout.rotation || 0) + 'deg');
			}

			function handleDayClick(event) {
				var card = event.currentTarget;
				var day = parseInt(card.dataset.day, 10);
				var alreadyOpened = openedDays.has(day);
				
				// Si ya está abierto, solo mostrar el modal
				if (alreadyOpened) {
					var data = rewards[day];
					openReward(day, data);
					return;
				}
				
				// Deshabilitar el botón mientras se procesa
				card.disabled = true;
				
				// Hacer petición AJAX al backend
				fetch('/op/adviento.php?action=abrir_dia', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded',
						'X-Requested-With': 'XMLHttpRequest'
					},
					body: 'dia=' + day
				})
				.then(function(response) {
					return response.json();
				})
				.then(function(data) {
					card.disabled = false;
					
					if (data.success) {
						// Animación de apertura
						triggerOpeningAnimation(card);
						
						// Marcar como abierto
						markDayOpened(day);
						
						// Mostrar recompensa
						var rewardData = rewards[day];
						openReward(day, rewardData);
					} else {
						// Mostrar error
						showToast(data.message || 'Error al abrir el día');
					}
				})
				.catch(function(error) {
					card.disabled = false;
					console.error('Error:', error);
					showToast('Error de conexión. Por favor, intenta de nuevo.');
				});
			}

			function triggerOpeningAnimation(card) {
				if (!card) {
					return;
				}
				card.classList.add('opening');
				setTimeout(function () {
					card.classList.remove('opening');
				}, 1200);
			}

			function openReward(day, data) {
				rewardDay.textContent = 'Día ' + day;
				if (data) {
					rewardTitle.textContent = data.title;
					rewardName.textContent = data.reward;
					rewardText.textContent = data.text;
				} else {
					rewardTitle.textContent = 'Sorpresa sin catalogar';
					rewardName.textContent = '???';
					rewardText.textContent = 'La narración decidirá qué recibes.';
				}
				modal.hidden = false;
				modal.classList.add('visible');
				spawnSparkles();
			}

			function closeModal() {
				modal.classList.remove('visible');
				setTimeout(function () {
					modal.hidden = true;
					sparkles.innerHTML = '';
				}, 250);
			}

			function spawnSparkles() {
				sparkles.innerHTML = '';
				for (var i = 0; i < 24; i++) {
					var dot = document.createElement('span');
					dot.className = 'sparkle';
					dot.style.left = Math.random() * 100 + '%';
					dot.style.bottom = Math.random() * 40 + 'px';
					dot.style.animationDelay = (Math.random() * 0.6) + 's';
					dot.style.background = Math.random() > 0.5 ? '#ffd479' : '#8ce0ff';
					sparkles.appendChild(dot);
				}
			}

			function showToast(text) {
				toast.textContent = text;
				toast.classList.add('visible');
				clearTimeout(showToast.timer);
				showToast.timer = setTimeout(function () {
					toast.classList.remove('visible');
				}, 2200);
			}

			function getStatusText(isOpened, isActive, isPast) {
				if (isOpened) {
					return 'Recompensa obtenida';
				}
				if (isActive) {
					return 'Abrir hoy';
				}
				return isPast ? 'Día cerrado' : 'Muy pronto';
			}

			function loadOpenedDays() {
				if (typeof window === 'undefined' || typeof window.localStorage === 'undefined') {
					return new Set();
				}
				try {
					var raw = window.localStorage.getItem(STORAGE_KEY);
					var parsed = raw ? JSON.parse(raw) : [];
					if (Array.isArray(parsed)) {
						return new Set(parsed.map(function (num) { return parseInt(num, 10); }).filter(function (n) { return !isNaN(n); }));
					}
				} catch (err) {
					return new Set();
				}
				return new Set();
			}

			function persistOpenedDays() {
				if (typeof window === 'undefined' || typeof window.localStorage === 'undefined') {
					return;
				}
				try {
					window.localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(openedDays).sort(function (a, b) { return a - b; })));
				} catch (err) {
					/* Ignorar almacenamiento lleno */
				}
			}

			function markDayOpened(day) {
				if (!openedDays.has(day)) {
					openedDays.add(day);
					persistOpenedDays();
				}
				var card = calendarGrid.querySelector('.dayCard[data-day="' + day + '"]');
				if (card) {
					card.classList.add('opened');
					card.classList.remove('available');
					var number = card.querySelector('.dayNumber');
					if (number) {
						number.remove();
					}
					var tag = card.querySelector('.doorInteriorTag');
					if (tag) {
						tag.remove();
					}
				}
			}

			function refreshMessage() {
				message.textContent = 'Hoy solo se puede abrir el día ' + unlockDay + '.';
			}

			closeReward.addEventListener('click', closeModal);
			openAnother.addEventListener('click', closeModal);
			modal.addEventListener('click', function (event) {
				if (event.target === modal) {
					closeModal();
				}
			});
			document.addEventListener('keydown', function (event) {
				if (event.key === 'Escape' && !modal.hidden) {
					closeModal();
				}
			});

			// Función para cargar estado desde el servidor
			function cargarEstadoDesdeServidor() {
				fetch('/op/adviento.php?action=verificar_dias', {
					headers: {
						'X-Requested-With': 'XMLHttpRequest'
					}
				})
				.then(function(response) {
					return response.json();
				})
				.then(function(data) {
					if (data.success) {
						// Actualizar el día actual según el servidor
						if (data.dia_actual && data.dia_actual > 0) {
							unlockDay = data.dia_actual;
						}
						
						// Cargar días ya abiertos - SIEMPRE desde el servidor
						openedDays.clear();
						if (data.dias_abiertos && data.dias_abiertos.length > 0) {
							data.dias_abiertos.forEach(function(dia) {
								openedDays.add(dia);
							});
						}
						// Sobrescribir localStorage con lo que hay en el servidor
						persistOpenedDays();
						
						updateCalendar();
					}
				})
				.catch(function(error) {
					console.error('Error cargando días abiertos:', error);
					// Si falla, limpiar y actualizar
					openedDays.clear();
					persistOpenedDays();
					updateCalendar();
				});
			}
			
			// Cargar al inicio
			cargarEstadoDesdeServidor();
			
			// Recargar cuando la ventana vuelve a tener foco
			window.addEventListener('focus', function() {
				cargarEstadoDesdeServidor();
			});
		})();
	</script>
	{$footer}
</body>
</html>
