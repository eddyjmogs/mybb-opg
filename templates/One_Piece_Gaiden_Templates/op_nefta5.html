<script type="text/javascript">
// One Piece Gaiden - Sistema de Colección de Cartas Compatible con MyBB
(function() {
    'use strict';
    
    // Esperar a que el DOM esté completamente cargado
    function initCardGame() {
        // Verificar compatibilidad con MyBB
        if (typeof MyBB !== 'undefined') {
            console.log('MyBB detectado - Inicializando modo compatible');
        }
        
        // Verificar que los datos externos estén cargados
        if (typeof window.CardGameData === 'undefined' || typeof window.CardGameConfig === 'undefined') {
            console.error('Error: No se han cargado los datos de cartas. Verifica que cartas.js esté cargado.');
            return;
        }
        
        // Objeto principal del juego
        var CardGame = {
            initialized: false,
            playerData: {
                money: 999999,
                cards: {},
                inventory: {}
            },
            
            // Usar configuración externa
            config: window.CardGameConfig,
            
            // Usar base de datos externa
            packsData: window.CardGameData,
            
            // Función para determinar si una carta es legendaria (especial + 5 estrellas)
            isLegendaryCard: function(card) {
                return card.type === 'especial' && card.rarity === 5;
            },
            
            // Aplicar efecto iridiscente a elementos
            applyIridescentEffect: function(element, card) {
                if (this.isLegendaryCard(card)) {
                    // Verificar si el elemento tiene la clase 'not-owned'
                    if (element.className.indexOf('not-owned') !== -1) {
                        // No aplicar efecto a cartas no poseídas
                        return;
                    }
                    
                    // Para cartas en la colección, verificar si se posee
                    var cardId = element.getAttribute('data-card-id');
                    var owned = element.getAttribute('data-owned');
                    
                    if (cardId && owned !== null && parseInt(owned) === 0) {
                        // No aplicar efecto si no se posee la carta
                        return;
                    }
                    
                    if (element.className.indexOf('legendary-5-star') === -1) {
                        element.className += ' legendary-5-star';
                    }
                    
                    // Agregar atributo para identificar cartas legendarias
                    element.setAttribute('data-legendary', 'true');
                    
                    // Si es una carta recién revelada, agregar animación especial
                    if (element.className.indexOf('revealed-card') !== -1) {
                        element.className += ' newly-revealed';
                        
                        // Remover la clase de nueva revelación después de la animación
                        setTimeout(function() {
                            element.className = element.className.replace(' newly-revealed', '');
                        }, 2000);
                    }
                } else if (card.type === 'especial') {
                    // Para cartas especiales no legendarias
                    if (element.className.indexOf('revealed-card') !== -1) {
                        element.className += ' special-revealed';
                    } else if (element.className.indexOf('card-item') !== -1) {
                        element.className += ' special-card';
                    }
                }
            },
            
            // Inicialización
            init: function() {
                if (this.initialized) return;
                
                try {
                    console.log('Inicializando CardGame...');
                    this.loadPlayerData();
                    this.initializeUI();
                    this.loadShop();
                    this.showSection('tienda');
                    this.initialized = true;
                    
                    // Actualizar debug si existe
                    var debugEl = document.getElementById('debug-cardgame');
                    if (debugEl) debugEl.innerHTML = 'Sí (Compatible)';
                    
                    console.log('CardGame inicializado correctamente');
                } catch (e) {
                    console.error('Error inicializando CardGame:', e);
                }
            },
            
            // Cargar datos del jugador
            loadPlayerData: function() {
                try {
                    var savedData = localStorage.getItem('opCardGameData');
                    if (savedData) {
                        var parsedData = JSON.parse(savedData);
                        this.playerData = {
                            money: parsedData.money || 999999,
                            cards: parsedData.cards || {},
                            inventory: parsedData.inventory || {}
                        };
                    }
                } catch (e) {
                    console.warn('Error cargando datos:', e);
                    this.resetPlayerData();
                }
                this.updateUI();
            },
            
            // Guardar datos
            savePlayerData: function() {
                try {
                    localStorage.setItem('opCardGameData', JSON.stringify(this.playerData));
                } catch (e) {
                    console.error('Error guardando datos:', e);
                }
            },
            
            // Resetear datos
            resetPlayerData: function() {
                this.playerData = {
                    money: 999999,
                    cards: {},
                    inventory: {}
                };
                this.savePlayerData();
                this.updateUI();
            },
            
            // Inicializar UI
            initializeUI: function() {
                this.updateUI();
                this.loadCollectionFilters();
            },
            
            // Actualizar interfaz
            updateUI: function() {
                var moneyElement = document.getElementById('player-money');
                if (moneyElement) {
                    moneyElement.innerHTML = this.playerData.money.toLocaleString();
                }
                this.updateCollectionStats();
            },
            
            // Actualizar estadísticas
            updateCollectionStats: function() {
                var collectedElement = document.getElementById('cards-collected');
                var totalElement = document.getElementById('total-cards');
                
                if (collectedElement && totalElement) {
                    var collectedCount = Object.keys(this.playerData.cards).length;
                    var totalCount = this.getTotalCardsCount();
                    
                    collectedElement.innerHTML = collectedCount;
                    totalElement.innerHTML = totalCount;
                }
            },
            
            // Total de cartas
            getTotalCardsCount: function() {
                var total = 0;
                for (var packId in this.packsData) {
                    total += Object.keys(this.packsData[packId].cards).length;
                }
                return total;
            },
            
            // Cargar tienda
            loadShop: function() {
                var container = document.getElementById('packs-container');
                if (!container) return;
                
                container.innerHTML = '';
                
                for (var packId in this.packsData) {
                    var pack = this.packsData[packId];
                    var packElement = this.createPackElement(pack);
                    container.appendChild(packElement);
                }
            },
            
            // Crear elemento de pack
            createPackElement: function(pack) {
                var packDiv = document.createElement('div');
                packDiv.className = 'pack-item';
                packDiv.style.cssText = 'background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin: 10px; min-width: 250px;';
                
                // Verificar que la imagen existe antes de usarla
                var imageUrl = pack.image || 'https://i.imgur.com/baUibTp.png';
                
                packDiv.innerHTML = 
                    '<img src="' + imageUrl + '" alt="' + pack.name + '" style="width: 100%; max-width: 200px; height: auto; border-radius: 10px; margin-bottom: 15px;" onerror="this.src=\'https://i.imgur.com/baUibTp.png\'">' +
                    '<div style="font-size: 1.4em; font-weight: bold; color: #333; margin-bottom: 10px;">' + pack.name + '</div>' +
                    '<div style="font-size: 1.2em; color: #28a745; font-weight: bold; margin-bottom: 15px;">' + pack.price.toLocaleString() + ' Berries</div>' +
                    '<p style="color: #666; font-size: 0.9em; margin: 10px 0;">' + pack.description + '</p>' +
                    '<button class="buy-pack-btn" data-pack-id="' + pack.id + '" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 1.1em; font-weight: bold; width: 100%;">Comprar Sobre</button>';
                
                return packDiv;
            },
            
            // Comprar pack
            buyPack: function(packId) {
                var pack = this.packsData[packId];
                if (!pack) {
                    this.showNotification('Pack no encontrado', 'error');
                    return;
                }
                
                if (this.playerData.money < pack.price) {
                    this.showNotification('No tienes suficientes Berries', 'error');
                    return;
                }
                
                this.playerData.money -= pack.price;
                
                if (!this.playerData.inventory[packId]) {
                    this.playerData.inventory[packId] = 0;
                }
                this.playerData.inventory[packId]++;
                
                this.savePlayerData();
                this.updateUI();
                this.showNotification('¡Sobre de ' + pack.name + ' comprado!', 'success');
                
                var inventarioSection = document.getElementById('inventario-section');
                if (inventarioSection && inventarioSection.className.indexOf('active') !== -1) {
                    this.loadInventory();
                }
            },
            
            // Cargar inventario
            loadInventory: function() {
                var container = document.getElementById('inventory-grid');
                if (!container) return;
                
                container.innerHTML = '';
                
                var hasItems = false;
                for (var packId in this.playerData.inventory) {
                    var count = this.playerData.inventory[packId];
                    if (count > 0) {
                        hasItems = true;
                        var pack = this.packsData[packId];
                        if (pack) {
                            var inventoryElement = this.createInventoryElement(pack, count);
                            container.appendChild(inventoryElement);
                        }
                    }
                }
                
                if (!hasItems) {
                    container.innerHTML = '<p style="text-align: center; color: #666; grid-column: 1/-1; padding: 40px;">No tienes sobres en tu inventario. ¡Ve a la tienda!</p>';
                }
            },
            
            // Crear elemento de inventario
            createInventoryElement: function(pack, count) {
                var div = document.createElement('div');
                div.className = 'inventory-pack';
                div.style.cssText = 'background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin: 10px;';
                
                var imageUrl = pack.image || 'https://i.imgur.com/baUibTp.png';
                
                div.innerHTML = 
                    '<img src="' + imageUrl + '" alt="' + pack.name + '" style="width: 100%; max-width: 180px; height: auto; border-radius: 10px; margin-bottom: 15px;" onerror="this.src=\'https://i.imgur.com/baUibTp.png\'">' +
                    '<div style="font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 10px;">' + pack.name + '</div>' +
                    '<div style="color: #666; margin: 10px 0;">Cantidad: ' + count + '</div>' +
                    '<button class="open-pack-btn" data-pack-id="' + pack.id + '" style="background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 1.1em; font-weight: bold;">Elegir Sobre</button>';
                
                return div;
            },
            
            // Abrir sobre
            openPack: function(packId) {
                if (!this.playerData.inventory[packId] || this.playerData.inventory[packId] <= 0) {
                    this.showNotification('No tienes sobres de este tipo', 'error');
                    return;
                }
                
                var pack = this.packsData[packId];
                if (!pack) {
                    this.showNotification('Pack no encontrado', 'error');
                    return;
                }
                
                this.executePackOpening(pack);
            },
            
            // Modificar executePackOpening para usar la nueva animación
            executePackOpening: function(pack) {
                // Consumir el sobre del inventario
                this.playerData.inventory[pack.id]--;
                if (this.playerData.inventory[pack.id] <= 0) {
                    delete this.playerData.inventory[pack.id];
                }
                
                // Generar cartas
                var drawnCards = this.drawCards(pack);
                
                // Agregar cartas a la colección
                for (var i = 0; i < drawnCards.length; i++) {
                    var card = drawnCards[i];
                    if (!this.playerData.cards[card.id]) {
                        this.playerData.cards[card.id] = 0;
                    }
                    this.playerData.cards[card.id]++;
                }
                
                // Guardar datos y actualizar UI
                this.savePlayerData();
                this.updateUI();
                
                // Mostrar modal con la nueva animación
                this.showPackOpeningModal(pack, drawnCards);
            },
            
            // NUEVA FUNCIÓN: Mostrar modal de apertura con animación
            showPackOpeningModal: function(pack, drawnCards) {
                var modal = document.getElementById('pack-opening-modal');
                var modalContent = modal.querySelector('.modal-content');
                
                if (!modal || !modalContent) {
                    console.error('Elementos del modal no encontrados');
                    return;
                }
                
                // Limpiar contenido previo
                modalContent.innerHTML = '';
                
                // Crear estructura de la animación de apertura
                var packContainer = document.createElement('div');
                packContainer.className = 'pack-animation-container';
                packContainer.innerHTML = 
                    '<div class="pack-opening-stage">' +
                        '<div class="pack-wrapper">' +
                            '<div class="pack-envelope" id="pack-envelope">' +
                                '<div class="pack-top" id="pack-top"></div>' +
                                '<div class="pack-body" id="pack-body">' +
                                    '<img src="' + pack.image + '" alt="' + pack.name + '" class="pack-image">' +
                                '</div>' +
                            '</div>' +
                            '<div class="pack-glow-effect"></div>' +
                        '</div>' +
                        '<div class="pack-instruction">' +
                            '<p>¡Haz clic en el sobre para abrirlo!</p>' +
                        '</div>' +
                        '<div class="cards-container" id="cards-container" style="display: none;">' +
                            '<div class="cards-instruction">' +
                                '<p>¡Haz clic en cada carta para revelarla!</p>' +
                            '</div>' +
                            '<div class="cards-grid" id="cards-grid">' +
                            '</div>' +
                            '<div class="reveal-all-container" style="display: none;">' +
                                '<button id="reveal-all-btn" class="reveal-all-button">Revelar Todas</button>' +
                            '</div>' +
                            '<button id="close-pack-modal" class="close-modal-button" style="display: none;">Continuar</button>' +
                        '</div>' +
                    '</div>';
                
                modalContent.appendChild(packContainer);
                modal.style.display = 'flex';
                
                // Event listeners para la animación
                this.setupPackAnimation(pack, drawnCards);
            },

            // NUEVA FUNCIÓN: Configurar animación del sobre
            setupPackAnimation: function(pack, drawnCards) {
                var self = this;
                var packEnvelope = document.getElementById('pack-envelope');
                var packTop = document.getElementById('pack-top');
                var packBody = document.getElementById('pack-body');
                var cardsContainer = document.getElementById('cards-container');
                var revealAllBtn = document.getElementById('reveal-all-btn');
                var closeBtn = document.getElementById('close-pack-modal');
                
                // Click en el sobre para abrir
                if (packEnvelope) {
                    packEnvelope.onclick = function() {
                        self.animatePackOpening(packTop, packBody, cardsContainer, drawnCards);
                    };
                }
                
                // Botón para revelar todas las cartas
                if (revealAllBtn) {
                    revealAllBtn.onclick = function() {
                        self.revealAllCards();
                    };
                }
                
                // Botón para cerrar
                if (closeBtn) {
                    closeBtn.onclick = function() {
                        self.closeModal();
                        var inventarioSection = document.getElementById('inventario-section');
                        if (inventarioSection && inventarioSection.className.indexOf('active') !== -1) {
                            self.loadInventory();
                        }
                    };
                }
            },

            // NUEVA FUNCIÓN: Animación de apertura del sobre
            animatePackOpening: function(packTop, packBody, cardsContainer, drawnCards) {
                var self = this;
                
                // Deshabilitar click en el sobre
                var packEnvelope = document.getElementById('pack-envelope');
                if (packEnvelope) {
                    packEnvelope.style.pointerEvents = 'none';
                }
                
                // Ocultar instrucción
                var instruction = document.querySelector('.pack-instruction');
                if (instruction) {
                    instruction.style.opacity = '0';
                    instruction.style.transform = 'translateY(-20px)';
                }
                
                // Animar apertura del sobre
                if (packTop) {
                    packTop.style.animation = 'packTopOpen 1.5s ease-out forwards';
                }
                
                if (packBody) {
                    packBody.style.animation = 'packBodyShake 1.5s ease-out forwards';
                }
                
                // Después de la animación del sobre, mostrar las cartas
                setTimeout(function() {
                    self.showCardsFromPack(cardsContainer, drawnCards);
                }, 1800);
            },

            // NUEVA FUNCIÓN: Mostrar cartas saliendo del sobre
            showCardsFromPack: function(cardsContainer, drawnCards) {
                var self = this;
                var cardsGrid = document.getElementById('cards-grid');
                
                if (!cardsContainer || !cardsGrid) return;
                
                // Limpiar grid
                cardsGrid.innerHTML = '';
                
                // Mostrar contenedor de cartas
                cardsContainer.style.display = 'block';
                cardsContainer.style.animation = 'fadeInUp 0.8s ease-out forwards';
                
                // Crear cartas de espaldas con animación de aparición
                for (var i = 0; i < drawnCards.length; i++) {
                    var card = drawnCards[i];
                    var cardWrapper = this.createFlippableCard(card, i);
                    cardsGrid.appendChild(cardWrapper);
                    
                    // Animar entrada de cada carta con delay usando closure
                    (function(wrapper, index) {
                        setTimeout(function() {
                            wrapper.style.animation = 'cardFlyIn 0.6s ease-out forwards';
                            wrapper.style.animationDelay = (index * 0.1) + 's';
                        }, 100);
                    })(cardWrapper, i);
                }
                
                // Mostrar botón de revelar todas después de que aparezcan las cartas
                setTimeout(function() {
                    var revealAllContainer = document.querySelector('.reveal-all-container');
                    if (revealAllContainer) {
                        revealAllContainer.style.display = 'block';
                        revealAllContainer.style.animation = 'fadeInUp 0.5s ease-out forwards';
                    }
                }, 1000);
            },

            // NUEVA FUNCIÓN: Crear carta volteable
            createFlippableCard: function(card, index) {
                var wrapper = document.createElement('div');
                wrapper.className = 'pack-card-wrapper';
                wrapper.setAttribute('data-card-index', index);
                wrapper.setAttribute('data-card-id', card.id);
                wrapper.setAttribute('data-rarity', card.rarity);
                wrapper.style.opacity = '0';
                
                // Verificar si es una carta nueva (no poseída antes)
                var isNewCard = !this.playerData.cards[card.id] || this.playerData.cards[card.id] === 0;
                if (isNewCard) {
                    wrapper.setAttribute('data-new-card', 'true');
                    wrapper.className += ' new-card';
                }
                
                // Aplicar efecto especial si es legendaria
                if (this.isLegendaryCard(card)) {
                    wrapper.setAttribute('data-legendary', 'true');
                }
                
                var cardInner = document.createElement('div');
                cardInner.className = 'pack-card-inner';
                
                var cardBack = document.createElement('div');
                cardBack.className = 'pack-card-back';
                cardBack.innerHTML = 
                    '<img src="' + this.config.cardBackImage + '" alt="Reverso de carta">' +
                    '<div class="card-shine-effect"></div>';
                
                var cardFront = document.createElement('div');
                cardFront.className = 'pack-card-front';
                
                // Crear estructura con marco y badge de rareza igual que en colección
                var cardContent = '';
                
                // Imagen de la carta
                cardContent += '<img src="' + card.image + '" alt="' + card.name + '" class="pack-card-image">';
                
                // Efecto de revelación
                cardContent += '<div class="card-reveal-effect"></div>';
                
                cardFront.innerHTML = cardContent;
                
                // Aplicar clases de marco según el tipo de carta (igual que en colección)
                if (this.isLegendaryCard(card)) {
                    cardFront.className += ' legendary-front pack-legendary-frame';
                    wrapper.className += ' pack-legendary-card';
                } else if (card.type === 'especial') {
                    cardFront.className += ' special-front pack-special-frame';
                    wrapper.className += ' pack-special-card';
                } else {
                    cardFront.className += ' pack-normal-frame';
                    wrapper.className += ' pack-normal-card';
                }
                
                cardInner.appendChild(cardBack);
                cardInner.appendChild(cardFront);
                wrapper.appendChild(cardInner);
                
                // Event listener para voltear la carta
                var self = this;
                wrapper.onclick = function() {
                    var innerElement = this.querySelector('.pack-card-inner');
                    if (innerElement && innerElement.style.transform.indexOf('rotateY(180deg)') === -1) {
                        self.flipCard(this, card);
                    }
                };
                
                return wrapper;
            },

            // NUEVA FUNCIÓN: Animación de apertura del sobre estilo TCG Pokémon (ACTUALIZADA)
            animatePackOpening: function(packTop, packBody, cardsContainer, drawnCards) {
                var self = this;
                
                // Deshabilitar click en el sobre
                var packEnvelope = document.getElementById('pack-envelope');
                if (packEnvelope) {
                    packEnvelope.style.pointerEvents = 'none';
                }
                
                // Ocultar instrucción
                var instruction = document.querySelector('.pack-instruction');
                if (instruction) {
                    instruction.style.opacity = '0';
                    instruction.style.transform = 'translateY(-20px)';
                }
                
                // Animar apertura del sobre estilo TCG Pokémon - corte de izquierda a derecha
                if (packTop) {
                    packTop.style.animation = 'packTopSlice 2s ease-out forwards';
                }
                
                if (packBody) {
                    packBody.style.animation = 'packBodyReveal 2s ease-out forwards';
                }
                
                // Crear efecto de destello cuando se abre
                var flashEffect = document.createElement('div');
                flashEffect.className = 'pack-open-flash';
                flashEffect.style.cssText = 
                    'position: absolute;' +
                    'top: 0;' +
                    'left: 0;' +
                    'right: 0;' +
                    'bottom: 0;' +
                    'background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.8) 50%, transparent 100%);' +
                    'z-index: 50;' +
                    'animation: packFlash 0.8s ease-out forwards;' +
                    'pointer-events: none;';
                
                if (packEnvelope) {
                    packEnvelope.appendChild(flashEffect);
                    
                    // Remover el efecto después de la animación
                    setTimeout(function() {
                        if (flashEffect.parentNode) {
                            flashEffect.parentNode.removeChild(flashEffect);
                        }
                    }, 800);
                }
                
                // Después de la animación del sobre, mostrar las cartas
                setTimeout(function() {
                    self.showCardsFromPack(cardsContainer, drawnCards);
                }, 2200);
            },

            // NUEVA FUNCIÓN: Voltear carta individual
            flipCard: function(cardWrapper, card) {
                var self = this;
                
                // Animación de volteo
                var cardInner = cardWrapper.querySelector('.pack-card-inner');
                if (cardInner) {
                    cardInner.style.transform = 'rotateY(180deg)';
                }
                
                // Marcar como volteada para mostrar badges y marcos
                cardWrapper.setAttribute('data-flipped', 'true');
                
                cardWrapper.style.pointerEvents = 'none';
                
                // Verificar si es carta nueva para mostrar efecto especial
                var isNewCard = cardWrapper.getAttribute('data-new-card') === 'true';
                
                // Efectos especiales según el tipo de carta
                if (this.isLegendaryCard(card)) {
                    this.triggerLegendaryRevealEffect(cardWrapper);
                } else if (card.type === 'especial') {
                    this.triggerSpecialRevealEffect(cardWrapper);
                }
                
                // Efecto especial para cartas nuevas
                if (isNewCard) {
                    this.triggerNewCardEffect(cardWrapper);
                }
                
                // Agregar información de la carta después del volteo
                setTimeout(function() {
                    self.addCardInfo(cardWrapper, card);
                }, 400);
                
                // Verificar si todas las cartas están reveladas
                setTimeout(function() {
                    self.checkAllCardsRevealed();
                }, 500);
            },

            triggerNewCardEffect: function(cardWrapper) {
                // Crear efecto de brillo verde
                var newCardGlow = document.createElement('div');
                newCardGlow.className = 'new-card-glow';
                newCardGlow.style.cssText = 
                    'position: absolute;' +
                    'top: -10px;' +
                    'left: -10px;' +
                    'right: -10px;' +
                    'bottom: -10px;' +
                    'border-radius: 15px;' +
                    'background: radial-gradient(circle, rgba(0, 255, 0, 0.6) 0%, rgba(0, 255, 0, 0.3) 50%, transparent 70%);' +
                    'pointer-events: none;' +
                    'z-index: 100;' +
                    'animation: newCardPulse 2s ease-in-out infinite;';
                
                cardWrapper.appendChild(newCardGlow);
                
                // Crear texto "¡NUEVA!"
                var newLabel = document.createElement('div');
                newLabel.className = 'new-card-label';
                newLabel.innerHTML = '¡NUEVA!';
                newLabel.style.cssText = 
                    'position: absolute;' +
                    'top: -35px;' +
                    'left: 50%;' +
                    'transform: translateX(-50%);' +
                    'background: linear-gradient(45deg, #00ff00, #32cd32);' +
                    'color: white;' +
                    'padding: 4px 12px;' +
                    'border-radius: 15px;' +
                    'font-size: 0.8em;' +
                    'font-weight: bold;' +
                    'z-index: 101;' +
                    'pointer-events: none;' +
                    'text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);' +
                    'box-shadow: 0 2px 8px rgba(0, 255, 0, 0.5);' +
                    'animation: newLabelBounce 0.6s ease-out forwards;';
                
                cardWrapper.appendChild(newLabel);
                
                // Remover efectos después de un tiempo

            // Sacar cartas
            drawCards: function(pack) {
                var cards = [];
                var availableCards = [];
                
                for (var cardId in pack.cards) {
                    availableCards.push(pack.cards[cardId]);
                }
                
                var normalCards = [];
                var specialCards = [];
                
                for (var i = 0; i < availableCards.length; i++) {
                    if (availableCards[i].type === 'normal') {
                        normalCards.push(availableCards[i]);
                    } else {
                        specialCards.push(availableCards[i]);
                    }
                }
                
                // Garantizar al menos una carta de 2+ estrellas cada 3 cartas
                var guaranteedRareCard = false;
                
                for (var i = 0; i < this.config.cardsPerPack; i++) {
                    var drawnCard;
                    
                    // Última carta y aún no hay carta rara garantizada
                    if (i === this.config.cardsPerPack - 1 && !guaranteedRareCard) {
                        // Forzar una carta de al menos 2 estrellas
                        var rareCards = normalCards.filter(function(card) {
                            return card.rarity >= 2;
                        });
                        if (rareCards.length > 0) {
                            drawnCard = this.drawCardByRarity(rareCards);
                            guaranteedRareCard = true;
                        } else {
                            drawnCard = this.drawCardByRarity(normalCards);
                        }
                    } else {
                        // Proceso normal con probabilidades
                        var specialRoll = Math.random();
                        var rareRoll = Math.random();
                        
                        if (specialRoll < this.config.specialCardChance && specialCards.length > 0) {
                            // Carta especial (muy rara)
                            drawnCard = specialCards[Math.floor(Math.random() * specialCards.length)];
                            guaranteedRareCard = true;
                        } else if (rareRoll < 0.3 && normalCards.length > 0) {
                            // 30% de probabilidad de carta de alta rareza (3+ estrellas)
                            var highRareCards = normalCards.filter(function(card) {
                                return card.rarity >= 3;
                            });
                            if (highRareCards.length > 0) {
                                drawnCard = this.drawCardByRarity(highRareCards);
                                guaranteedRareCard = true;
                            } else {
                                drawnCard = this.drawCardByRarity(normalCards);
                            }
                        } else {
                            // Carta normal con sistema de pesos
                            drawnCard = this.drawCardByRarity(normalCards);
                            if (drawnCard && drawnCard.rarity >= 2) {
                                guaranteedRareCard = true;
                            }
                        }
                    }
                    
                    if (drawnCard) {
                        cards.push(drawnCard);
                    }
                }
                
                return cards;
            },
            
            // Sacar carta por rareza
            drawCardByRarity: function(cards) {
                if (cards.length === 0) return null;
                
                var cardPool = [];
                
                for (var i = 0; i < cards.length; i++) {
                    var card = cards[i];
                    var weight;
                    
                    // Sistema de pesos mejorado - más cartas comunes, menos legendarias
                    switch(card.rarity) {
                        case 1: weight = 50; break;
                        case 2: weight = 25; break;
                        case 3: weight = 15; break;
                        case 4: weight = 8; break;
                        case 5: weight = 2; break;
                        default: weight = 10; break;
                    }
                    
                    // Añadir la carta múltiples veces según su peso
                    for (var j = 0; j < weight; j++) {
                        cardPool.push(card);
                    }
                }
                
                return cardPool[Math.floor(Math.random() * cardPool.length)];
            },
            
            // Cargar colección
            loadCollection: function() {
                var container = document.getElementById('collection-grid');
                if (!container) return;
                
                container.innerHTML = '';
                
                var allCards = this.getAllCards();
                var filteredCards = this.applyFilters(allCards);
                
                if (filteredCards.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #666; grid-column: 1/-1; padding: 40px;">No hay cartas que coincidan con los filtros</p>';
                    return;
                }
                
                for (var i = 0; i < filteredCards.length; i++) {
                    var cardElement = this.createCollectionCardElement(filteredCards[i]);
                    container.appendChild(cardElement);
                }
            },
            
            // Obtener todas las cartas
            getAllCards: function() {
                var cards = [];
                for (var packId in this.packsData) {
                    var pack = this.packsData[packId];
                    for (var cardId in pack.cards) {
                        var card = {};
                        for (var prop in pack.cards[cardId]) {
                            card[prop] = pack.cards[cardId][prop];
                        }
                        card.packName = pack.name;
                        cards.push(card);
                    }
                }
                return cards;
            },
            
            // Aplicar filtros
            applyFilters: function(cards) {
                var packFilter = document.getElementById('pack-filter');
                var rarityFilter = document.getElementById('rarity-filter');
                var typeFilter = document.getElementById('type-filter');
                
                var filtered = cards.slice();
                
                if (packFilter && packFilter.value !== 'all') {
                    var selectedPack = this.packsData[packFilter.value];
                    if (selectedPack) {
                        var newFiltered = [];
                        for (var i = 0; i < filtered.length; i++) {
                            if (selectedPack.cards[filtered[i].id]) {
                                newFiltered.push(filtered[i]);
                            }
                        }
                        filtered = newFiltered;
                    }
                }
                
                if (rarityFilter && rarityFilter.value !== 'all') {
                    var targetRarity = parseInt(rarityFilter.value);
                    var newFiltered = [];
                    for (var i = 0; i < filtered.length; i++) {
                        if (filtered[i].rarity === targetRarity) {
                            newFiltered.push(filtered[i]);
                        }
                    }
                    filtered = newFiltered;
                }
                
                if (typeFilter && typeFilter.value !== 'all') {
                    var newFiltered = [];
                    for (var i = 0; i < filtered.length; i++) {
                        if (filtered[i].type === typeFilter.value) {
                            newFiltered.push(filtered[i]);
                        }
                    }
                    filtered = newFiltered;
                }
                
                return filtered;
            },

                navButtons[i].onclick = function(e) {
                    if (e && e.preventDefault) e.preventDefault();
                    var section = this.getAttribute('data-section');
                    CardGame.showSection(section);
                    return false;
                };
            }
            
            // Event delegation para botones dinámicos
            document.onclick = function(e) {
                var target = e.target || e.srcElement;
                
                if (target && target.className && target.className.indexOf('buy-pack-btn') !== -1) {
                    if (e && e.preventDefault) e.preventDefault();
                    var packId = target.getAttribute('data-pack-id');
                    if (packId) {
                        CardGame.buyPack(packId);
                    }
                    return false;
                }
                
                if (target && target.className && target.className.indexOf('open-pack-btn') !== -1) {
                    if (e && e.preventDefault) e.preventDefault();
                    var packId = target.getAttribute('data-pack-id');
                    if (packId) {
                        CardGame.openPack(packId);
                    }
                    return false;
                }
                
                if (target && target.className && target.className.indexOf('close-modal') !== -1) {
                    CardGame.closeModal();
                    return false;
                }
                
                if (target && target.className && target.className.indexOf('modal') !== -1) {
                    CardGame.closeModal();
                    return false;
                }
            };
            
            // Filtros
            var packFilter = document.getElementById('pack-filter');
            var rarityFilter = document.getElementById('rarity-filter');
            var typeFilter = document.getElementById('type-filter');
            
            if (packFilter) {
                packFilter.onchange = function() {
                    CardGame.filterCollection();
                };
            }
            if (rarityFilter) {
                rarityFilter.onchange = function() {
                    CardGame.filterCollection();
                };
            }
            if (typeFilter) {
                typeFilter.onchange = function() {
                    CardGame.filterCollection();
                };
            }
        }
