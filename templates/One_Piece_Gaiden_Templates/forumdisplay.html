<style>
	
	.subforoAnchor {
		overflow: hidden;

	}

	.subforoImagenOP {
		width: 328px !important;
		height: 165px !important;
		position: relative;
		transition: all 0.25s ease;
		opacity: 0.9;
		filter: grayscale(0.2);
		width: 495px;
		height: 250px;
		box-sizing: border-box;
	}
	
	.subforoOP {
		width: 327px !important;
		height: 165px !important;
		position: relative;
		box-sizing: border-box;
	}	
	
	.subforoImagenOP:hover, .subforoImagenHover {
		transform: scale(1.1);
		opacity: 1;
		filter: grayscale(0);
	}
	
	.subforoTexto {
		font-size: 32px !important;
		margin-top: 0px !important;
		position: absolute;
		top: 47%;
		transform: translateY(-50%);
		width: 328px;
	}
