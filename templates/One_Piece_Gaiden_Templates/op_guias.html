<html>

<head>
  <title>One Piece Gaiden - Guías del Rol</title>
  {$headerinclude}
  <style>
    /* Estilos generales */
    .guias-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-left: 10px;
      gap: 40px;
      padding: 0px;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Título principal con efecto de trazo dorado */
    .main-title {
      text-align: center; 
      color: #f8d78e; 
      margin-bottom: 30px; 
      text-shadow: 0 0 10px #8b4513, 0 0 15px #000;
      font-size: 40px;
      font-family: moonGetHeavy, sans-serif;
      letter-spacing: 2px;
      position: relative;
      padding-bottom: 15px;
      width: 100%;
    }

    .main-title:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #f8d78e, transparent);
    }

    /* Diseño de pergamino para categorías */
    .categoria {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
      position: relative;
      background-color: rgba(31, 28, 24, 0.85);
      border: 2px solid #8b4513;
      text-align: center;
    }    /* Estilo pergamino para guías básicas */
    .categoria.basicas {
      background-image: url('/images/op/uploads/IslaGrande35_One_Piece_Gaiden_Foro_Rol.jpg');
      background-size: cover;
      background-position: center;
    }

    .categoria.basicas:before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }

    /* Usar imágenes como fondos para cada categoría */
    .categoria.belicas {
      background-image: url('/images/op/uploads/IslaGrande37_One_Piece_Gaiden_Foro_Rol.jpg');
      background-size: cover;
      background-position: center;
    }

    .categoria.otras {
      background-image: url('/images/op/uploads/IslaGrande38_One_Piece_Gaiden_Foro_Rol.jpg');
      background-size: cover;
      background-position: center;
    }

    .categoria.enciclopedia {
      background-image: url('/images/op/uploads/IslaGrande33_One_Piece_Gaiden_Foro_Rol.jpg');
      background-size: cover;
      background-position: center;
    }
    
    /* Overlay para categorías no básicas */
    .categoria.belicas:before,
    .categoria.otras:before,
    .categoria.enciclopedia:before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }    .categoria-header {
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      padding: 20px 0;
    }    /* Efecto de brújula para los títulos de las categorías */
    .categoria-title {
      position: relative;
      color: #f8d78e;
      padding: 5px;
      font-size: 26px;
      text-shadow: 2px 2px 4px #000;
      text-align: center;
      font-family: moonGetHeavy, sans-serif;
      background: rgba(0, 0, 0, 0);
      border-bottom: 1px solid #8b4513;
      margin-top: -20px;
      width: 100%;
      z-index: 1;
    }

    /* Decoración para los títulos */
    .categoria-title:before,
    .categoria-title:after {
      content: '✦';
      margin: 0 10px;
      color: #f8d78e;
    }

    /* Contenido de las categorías */
    .categoria-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.6s ease-in-out;
      text-align: center;
      position: relative;
      z-index: 1;
    }    .categoria.active .categoria-content {
      max-height: 2500px;
    }

    /* Lista de guías */
    .guias-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    /* Efecto de tarjeta para cada guía */
    .guia-item {
      width: calc(50% - 20px);
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
    }

    @media (max-width: 768px) {
      .guia-item {
        width: 100%;
      }
    }

    .guia-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    }

    .guia-item img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
      margin: 0 auto;
    }

    .guia-item:hover img {
      transform: scale(1.1);
    }

    /* Overlay para títulos de guías con efecto de revelado */
    .guia-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.8) 50%, rgba(0, 0, 0, 0.9));
      color: #fff;
      padding: 30px 10px 10px;
      font-size: 14px;
      font-weight: normal;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      text-shadow: 1px 1px 3px #000;
      text-align: center;
    }

    .guia-item:hover .guia-title {
      transform: translateY(0);
    }

    /* Iconos decorativos piratas */
    .pirate-icon {
      font-size: 24px;
      color: #f8d78e;
      margin: 0 10px;
    }

    /* Indicador de expansión */
    .expand-indicator {
      position: relative;
      color: #f8d78e;
      font-size: 20px;
      transition: transform 0.3s ease;
      margin-top: 10px;
    }

    .categoria.active .expand-indicator {
      transform: rotate(180deg);
    }

    /* Contenedor principal - Fondo invisible */
    .tripulacion-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      /* Eliminada la imagen de fondo */
      background-color: transparent;
      padding: 20px 0;
      position: relative;
    }

    .tripulacion-container:before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      /* Fondo negro sólido en lugar del semi-transparente */
      background: rgba(0, 0, 0, 1);
      z-index: 0;
    }

    .inner-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    /* Estilo para el botón de Enciclopedia */
    .categoria.enciclopedia {
      cursor: pointer;
      padding: 5px;
      transition: transform 0.3s ease;
      margin-top: -20px;
      margin: 0 auto;
      max-width: 100%;
    }

    .categoria.enciclopedia:hover {
      transform: translateY(-5px);
    }

    .enciclopedia .categoria-title {
      padding: 5px -20px;
      font-size: 28px;
      text-align: center;
    }
  </style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Animación de entrada
      const categorias = document.querySelectorAll('.categoria');
      categorias.forEach((categoria, index) => {
        categoria.style.opacity = '0';
        setTimeout(() => {
          categoria.style.opacity = '1';
        }, index * 200);
      });
        // Hacer que las categorías se expandan al hacer clic (excepto enciclopedia)
      const categoriasToggle = document.querySelectorAll('.categoria:not(.enciclopedia) .categoria-header');
      categoriasToggle.forEach(header => {
        header.addEventListener('click', () => {
          const parent = header.parentElement;
          parent.classList.toggle('active');
        });
      });
      
      // Efecto de revelado al hacer scroll
      function revealOnScroll() {
        const elementos = document.querySelectorAll('.guia-item');
        elementos.forEach(elem => {
          const elementTop = elem.getBoundingClientRect().top;
          const elementVisible = 150;
          if (elementTop < window.innerHeight - elementVisible) {
            elem.classList.add('visible');
          }
        });
      }
      
      window.addEventListener('scroll', revealOnScroll);
      revealOnScroll(); // Verificar al cargar la página
    });
  </script>
