<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Gaiden - Sistema de Cartas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .game-title {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .player-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-label {
            font-size: 1.1em;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #FFD700;
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tienda */
        #packs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .pack-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .pack-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .pack-image-container {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .pack-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pack-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #FFD700;
        }

        .pack-price {
            font-size: 1.2em;
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .pack-description {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .buy-pack-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            width: 100%;
        }

        .buy-pack-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        /* Inventario */
        #inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .inventory-pack {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .inventory-pack:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .inventory-pack-image-container {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .inventory-pack-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .inventory-pack-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #FFD700;
        }

        .inventory-pack-count {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #4CAF50;
        }

        .open-pack-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A6F 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            width: 100%;
        }

        .open-pack-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .empty-inventory {
            text-align: center;
            font-size: 1.5em;
            opacity: 0.6;
            padding: 60px 20px;
        }

        /* Colección */
        .collection-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .filter-group select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1em;
            cursor: pointer;
        }

        #collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .card-item:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 215, 0, 0.7);
        }

        .card-item.not-owned {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .card-item.not-owned:hover {
            opacity: 0.6;
        }

        .card-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .card-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1em;
        }

        .card-rarity {
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .card-count {
            font-size: 0.9em;
            color: #4CAF50;
            font-weight: bold;
        }

        /* Cartas Legendarias 5 estrellas */
        .legendary-5-star {
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #ffa500, #ffff00, #00ff00, #00bfff, #8a2be2);
            background-size: 300% 300%;
            animation: rainbow 2s ease infinite;
            border: 3px solid gold !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.6);
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .legendary-5-star::before {
            content: '✨';
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 1.5em;
            animation: sparkle 1.5s ease infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.5; transform: scale(1.2) rotate(180deg); }
        }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        /* Modal de apertura de pack */
        #pack-opening-title {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            color: #FFD700;
        }

        #pack-animation-container {
            text-align: center;
            padding: 40px;
        }

        #pack-opening-image {
            max-width: 300px;
            max-height: 300px;
            cursor: pointer;
            transition: all 0.5s ease;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        #pack-opening-image:hover {
            transform: scale(1.1);
        }

        .click-to-open {
            text-align: center;
            font-size: 1.2em;
            margin-top: 20px;
            animation: blink 1.5s ease infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #pack-results {
            display: none;
        }

        #cards-revealed {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .revealed-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            animation: cardReveal 0.5s ease;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .revealed-card:hover {
            transform: scale(1.05);
            border-color: rgba(255, 215, 0, 0.5);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: rotateY(90deg) scale(0.5);
            }
            to {
                opacity: 1;
                transform: rotateY(0) scale(1);
            }
        }

        .revealed-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .revealed-card-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .revealed-card-rarity {
            font-size: 1.2em;
        }

        .new-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-top: 5px;
            font-weight: bold;
        }

        /* Modal detalle de carta */
        .card-detail-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        #card-detail-image {
            max-width: 300px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .card-detail-info {
            flex: 1;
            min-width: 300px;
        }

        .detail-row {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .detail-label {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3em;
            font-weight: bold;
        }

        /* Notificaciones */
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notification {
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.3s ease;
            min-width: 250px;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .notification.success {
            border-left: 5px solid #4CAF50;
        }

        .notification.error {
            border-left: 5px solid #f44336;
        }

        .notification.info {
            border-left: 5px solid #2196F3;
        }

        /* Botón de reinicio */
        .reset-btn {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            margin-top: 20px;
        }

        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .game-title {
                font-size: 2em;
            }

            .player-stats {
                gap: 20px;
            }

            .nav-btn {
                padding: 12px 20px;
                font-size: 1em;
            }

            #packs-container,
            #inventory-grid,
            #collection-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .modal-content {
                padding: 20px;
            }

            .card-detail-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Contenedor de notificaciones -->
    <div id="notification-container"></div>

    <div class="game-container">
        <!-- Cabecera -->
        <div class="game-header">
            <h1 class="game-title">⚓ ONE PIECE GAIDEN ⚓</h1>
            <div class="player-stats">
                <div class="stat-item">
                    <span class="stat-label">? Berries:</span>
                    <span class="stat-value" id="player-money">999999</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">? Cartas:</span>
                    <span class="stat-value"><span id="cards-collected">0</span>/<span id="total-cards">0</span></span>
                </div>
            </div>
        </div>

        <!-- Menú de navegación -->
        <div class="nav-menu">
            <button class="nav-btn active" onclick="showSection('tienda')">? Tienda</button>
            <button class="nav-btn" onclick="showSection('inventario')">? Inventario</button>
            <button class="nav-btn" onclick="showSection('coleccion')">? Colección</button>
        </div>

        <!-- Sección: Tienda -->
        <div id="tienda-section" class="game-section active">
            <h2 style="text-align: center; margin-bottom: 20px; font-size: 2em;">? Tienda de Sobres</h2>
            <div id="packs-container"></div>
        </div>

        <!-- Sección: Inventario -->
        <div id="inventario-section" class="game-section">
            <h2 style="text-align: center; margin-bottom: 20px; font-size: 2em;">? Tu Inventario</h2>
            <div id="inventory-grid"></div>
        </div>

        <!-- Sección: Colección -->
        <div id="coleccion-section" class="game-section">
            <h2 style="text-align: center; margin-bottom: 20px; font-size: 2em;">? Tu Colección</h2>
            
            <!-- Filtros -->
            <div class="collection-filters">
                <div class="filter-group">
                    <label>Pack:</label>
                    <select id="pack-filter" onchange="filterCollection()">
                        <option value="">Todos los Packs</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Rareza:</label>
                    <select id="rarity-filter" onchange="filterCollection()">
                        <option value="">Todas</option>
                        <option value="1">⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="3">⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="5">⭐⭐⭐⭐⭐</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Tipo:</label>
                    <select id="type-filter" onchange="filterCollection()">
                        <option value="">Todos</option>
                        <option value="personaje">Personaje</option>
                        <option value="akuma">Akuma</option>
                        <option value="especial">Especial</option>
                        <option value="objeto">Objeto</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Estado:</label>
                    <select id="owned-filter" onchange="filterCollection()">
                        <option value="">Todas</option>
                        <option value="owned">Obtenidas</option>
                        <option value="missing">Faltantes</option>
                    </select>
                </div>
            </div>
            
            <div id="collection-grid"></div>
        </div>

        <!-- Botón de reinicio -->
        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 2px solid rgba(255, 255, 255, 0.2);">
            <button class="reset-btn" onclick="resetPlayerData()">? Reiniciar Datos</button>
        </div>
    </div>

    <!-- Modal: Apertura de Pack -->
    <div id="pack-opening-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 id="pack-opening-title">? Abriendo Pack</h2>
            
            <div id="pack-animation-container">
                <img id="pack-opening-image" src="" alt="Pack">
                <div class="click-to-open">? Haz clic en el sobre para abrirlo</div>
            </div>
            
            <div id="pack-results">
                <h3 style="text-align: center; margin-bottom: 20px;">✨ ¡Cartas Obtenidas! ✨</h3>
                <div id="cards-revealed"></div>
            </div>
        </div>
    </div>

    <!-- Modal: Detalle de Carta -->
    <div id="card-detail-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="card-detail-container">
                <img id="card-detail-image" src="" alt="Carta">
                <div class="card-detail-info">
                    <div class="detail-row">
                        <div class="detail-label">Nombre</div>
                        <div class="detail-value" id="card-detail-name"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Pack</div>
                        <div class="detail-value" id="card-detail-pack"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Rareza</div>
                        <div class="detail-value" id="card-detail-rarity"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Tipo</div>
                        <div class="detail-value" id="card-detail-type"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Descripción</div>
                        <div class="detail-value" id="card-detail-description"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Cantidad en tu colección</div>
                        <div class="detail-value" id="card-detail-count"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Cargar primero la base de datos de cartas -->
    <script src="cartas.js"></script>
    
    <!-- Script principal del juego -->
    <script src="op_ficha_script2.js"></script>
</body>
</html>
