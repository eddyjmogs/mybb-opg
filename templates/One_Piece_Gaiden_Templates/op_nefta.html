    }

        text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
    }
    .boton:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 15px rgba(153, 50, 204, 0.4);
        color: #ff3333 !important; /* Texto rojo al hacer hover */
    }
    .boton:before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: 0.5s;
    }
    .boton:hover:before {
